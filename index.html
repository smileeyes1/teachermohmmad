<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الخبير التربوي V6</title>

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.7.2/mammoth.browser.min.js"></script>

<style>
body{font-family:Tahoma;background:#f4f6f8;margin:0}
.container{max-width:1000px;margin:auto;padding:15px}
.card{background:#fff;padding:16px;margin-bottom:15px;border-radius:12px}
button{width:100%;padding:14px;margin-top:10px;background:#0d47a1;color:#fff;border:none;border-radius:10px}
.box{background:#eef3ff;padding:10px;border-radius:10px;margin-top:10px;white-space:pre-wrap}
.progress{height:8px;background:#ddd;border-radius:10px}
.progress span{display:block;height:100%;width:0;background:#0d47a1}
@media (min-width:768px){
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h3>📂 رفع الملف</h3>
<input type="file" id="file">
<button id="analyzeBtn">تحليل</button>
<div class="progress"><span id="bar"></span></div>
<div id="status" class="box">جاهز</div>
</div>

<div class="grid">

<div class="card">
<h3>🧠 التحليل</h3>
<div id="analysis" class="box"></div>
<button id="generateBtn" disabled>توليد التحضير</button>
</div>

<div class="card">
<h3>📘 التحضير</h3>
<div id="lesson" class="box"></div>
</div>

</div>

<div class="grid">

<div class="card">
<h3>🎤 سكربت المعلم</h3>
<div id="script" class="box"></div>
</div>

<div class="card">
<h3>🧩 الأسئلة</h3>
<div id="questions" class="box"></div>
</div>

</div>

<div class="card">
<h3>🧮 تمارين</h3>
<div id="exercises" class="box"></div>
</div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.js';

let textData = "";
let ai = null;

document.getElementById("analyzeBtn").addEventListener("click", start);
document.getElementById("generateBtn").addEventListener("click", generate);

// ===== قراءة =====
async function start(){
  const file = document.getElementById("file").files[0];
  if(!file) return alert("اختر ملف");

  update("📄 قراءة...");
  textData = "";

  if(file.name.endsWith(".pdf")){
    const pdf = await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;

    for(let i=1;i<=pdf.numPages;i++){
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      textData += content.items.map(i=>i.str).join(" ");
      progress(i/pdf.numPages);
    }

  }else if(file.name.endsWith(".docx")){
    const res = await mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()});
    textData = res.value;
  }

  update("🧠 تحليل...");
  ai = runAI(textData);

  showAnalysis(ai);
  document.getElementById("generateBtn").disabled = false;
}

// ===== AI =====
function runAI(text){

  const clean = text.replace(/[^\u0600-\u06FF\s]/g,"");
  const sentences = clean.split(/[.!؟\n]/).filter(s=>s.length>10);
  const words = clean.split(/\s+/).filter(w=>w.length>2);

  // ===== تكرار =====
  const freq = {};
  words.forEach(w=>freq[w]=(freq[w]||0)+1);

  const sorted = Object.entries(freq).sort((a,b)=>b[1]-a[1]);
  const keywords = sorted.slice(0,5).map(x=>x[0]);

  // ===== تصنيف =====
  let subject="عام";
  let skill="فهم";

  if(words.includes("جمع")){subject="رياضيات";skill="الجمع";}
  if(words.includes("طرح")){subject="رياضيات";skill="الطرح";}
  if(words.includes("نص")||words.includes("قرأ")){subject="لغة عربية";skill="فهم المقروء";}

  // ===== صف =====
  let avg = words.reduce((a,b)=>a+b.length,0)/words.length;
  let grade = avg<=4 ? "صف 1" : "صف 2";

  // ===== فكرة من جملة =====
  const mainSentence = sentences[0] || "";
  const main = keywords[0] || "المفهوم";

  // ===== تمارين =====
  let exercises = "";

  if(subject==="رياضيات"){
    exercises = `
1) 2 + 3 = __
2) 5 + 1 = __
3) 4 + 2 = __`;
  }else{
    exercises = `
اقرأ الجملة:
"${mainSentence}"

ثم أجب:
- ما الفكرة؟
- اختر كلمة جديدة`;
  }

  return {
    subject, skill, grade,
    keywords,
    main,
    mainSentence,
    exercises
  };
}

// ===== عرض =====
function showAnalysis(r){
  document.getElementById("analysis").textContent =
`📘 المادة: ${r.subject}
🎯 المهارة: ${r.skill}
👦 الصف: ${r.grade}
🧩 كلمات: ${r.keywords.join(" - ")}`;
}

// ===== توليد =====
function generate(){

  document.getElementById("lesson").textContent =
`🎯 الفكرة:
فهم "${ai.main}"

❓ السؤال:
كيف نستخدم "${ai.main}"؟

🚀 النشاط:
مثال + مشاركة

🔚 الإغلاق:
تعزيز إيجابي`;

  document.getElementById("script").textContent =
`👩‍🏫
"اليوم سنتعلم ${ai.main}"
"فكروا قليلاً"
"من يشارك؟"
"أحسنتم"`;

  document.getElementById("questions").textContent =
`1) ما معنى ${ai.main}؟
2) أعط مثالاً
3) متى نستخدمه؟`;

  document.getElementById("exercises").textContent = ai.exercises;
}

// ===== مساعد =====
function update(msg){
  document.getElementById("status").textContent = msg;
}

function progress(p){
  document.getElementById("bar").style.width = (p*100)+"%";
}

</script>
</body>
</html>
