<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التحضير السيادي للحصّة</title>

<meta name="description" content="نظام تحضير سيادي للحصص الصفية — سؤال واحد، فكرة واحدة، صمت واعٍ.">

<style>
:root{
  --main:#2c7be5;
  --dark:#1a4fa0;
  --bg:#f4f6f8;
  --card:#ffffff;
  --ink:#222;
  --soft:#f0f3f7;
  --danger:#c0392b;
  --success:#1b5e20;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Tahoma, Arial, sans-serif;
  background:var(--bg);
  color:var(--ink);
}

.container{
  max-width:760px;
  margin:20px auto;
  background:var(--card);
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}

h1{
  margin-top:0;
  text-align:center;
  color:var(--dark);
  font-size:22px;
}

.sub{
  text-align:center;
  font-size:14px;
  color:#555;
  margin-bottom:16px;
}

label{
  display:block;
  margin-top:14px;
  font-weight:bold;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:15px;
  direction:rtl;
}

textarea{
  resize:vertical;
}

.hint{
  margin-top:6px;
  background:var(--soft);
  padding:8px 10px;
  border-radius:8px;
  font-size:13px;
  color:#555;
}

.file-box{
  margin-top:10px;
  background:var(--soft);
  padding:10px;
  border-radius:8px;
  font-size:14px;
}

button{
  margin-top:18px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--main);
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

button:hover{background:var(--dark)}

#error{
  margin-top:10px;
  font-weight:bold;
  color:var(--danger);
}

#output{
  margin-top:20px;
  height:280px;
  background:#fafafa;
  white-space:pre-wrap;
  line-height:1.8;
}

.footer{
  margin-top:12px;
  text-align:center;
  font-size:13px;
  color:#777;
}

@media print{
  label,input,button,.hint,#error,.file-box,.footer,.sub{display:none}
  #output{
    border:none;
    height:auto;
    font-size:14pt;
    background:#fff;
  }
}
</style>
</head>

<body>

<div class="container">
<h1>التحضير السيادي للحصّة</h1>
<div class="sub">
إعداد: <b>محمد وجيه</b> — مدرسة <b>عاطوف المختلطة</b>
</div>

<label>المادة</label>
<input id="subject" placeholder="مثال: اللغة العربية">

<label>الصف</label>
<input id="grade" placeholder="مثال: الصف الأول">

<label>عنوان الدرس</label>
<input id="lesson" placeholder="كما ورد في الكتاب">

<label>مدة الحصة (بالدقائق)</label>
<input id="duration" inputmode="numeric" placeholder="٤٠">

<label>سؤال الحصة الواحد 🔒</label>
<input id="question" placeholder="سؤال واحد ثابت">
<div class="hint">
يُطرح من الدقيقة الأولى حتى الإغلاق. لا يُغيَّر.
</div>

<label>الفكرة المقفولة 🔒</label>
<input id="concept" placeholder="جملة قصيرة ينطقها تلميذ">
<div class="hint">
إن لم تُنطق بصوت تلميذ → لم يحدث تعلّم.
</div>

<label>ملف الكتاب (اختياري)</label>
<input type="file" id="bookFile" accept=".pdf,image/*">
<div id="fileInfo" class="file-box">لم يتم إرفاق ملف</div>

<div id="error"></div>

<button onclick="build()">✅ توليد التحضير السيادي</button>

<textarea id="output" readonly placeholder="سيظهر التحضير هنا..."></textarea>

<div class="footer">
الصمت أداة • التفكير هدف • النطق دليل الفهم
</div>
</div>

<script>
"use strict";

const $ = id => document.getElementById(id);
const output = $("output");
const errorBox = $("error");
const fileBox = $("fileInfo");
const fileInput = $("bookFile");

function sanitize(t){
  return t.replace(/[<>]/g,"").trim();
}

/* ملف */
fileInput.addEventListener("change",()=>{
  errorBox.textContent="";
  fileBox.textContent="لم يتم إرفاق ملف";
  const f=fileInput.files[0];
  if(!f)return;

  const ok = f.type==="application/pdf" || f.type.startsWith("image/");
  if(!ok){
    fileInput.value="";
    errorBox.textContent="❌ نوع الملف غير مدعوم (PDF أو صورة فقط)";
    return;
  }

  const size=(f.size/1024/1024).toFixed(2);
  fileBox.textContent=`📘 ${sanitize(f.name)} — ${size} MB`;
});

/* بناء */
function build(){
  errorBox.textContent="";

  const question=sanitize($("question").value);
  const concept=sanitize($("concept").value);

  if(!question || !concept){
    errorBox.textContent="❌ سؤال الحصة والفكرة المقفولة عنصران إلزاميان";
    return;
  }

  const subject=sanitize($("subject").value)||"—";
  const grade=sanitize($("grade").value)||"—";
  const lesson=sanitize($("lesson").value)||"—";
  const duration=sanitize($("duration").value)||"—";
  const file=fileInput.files[0];

  output.value=`
تحضير حصة صفّية سيادية

المدرسة: عاطوف المختلطة
المعلّم: محمد وجيه

المادة: ${subject}
الصف: ${grade}
الدرس: ${lesson}
المدة: ${duration} دقيقة

ملف الكتاب:
${file ? sanitize(file.name) : "غير مرفق"}

سؤال الحصة الواحد:
«${question}»

الفكرة المقفولة:
«${concept}»

بنية التنفيذ:
١) طرح السؤال فقط.
٢) مثال واحد من الكتاب.
٣) صمت مقصود للتفكير.
٤) نطق تلميذ واحد.
٥) تثبيت ثم إغلاق.

مبدأ الحصة:
الصمت أداة.
التفكير غاية.
النطق دليل.
`.trim();
}
</script>

</body>
</html>
