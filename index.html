<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الخبير التربوي المرافق</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #333;
            padding: 15px;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: #0d47a1;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 20px;
        }
        .card {
            padding: 20px;
        }
        input, button, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            background: #0d47a1;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 17px;
        }
        button:disabled {
            background: #999;
        }
        .box {
            background: #f8fbff;
            padding: 15px;
            border-radius: 12px;
            min-height: 120px;
            margin: 10px 0;
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.6;
        }
        .status {
            text-align: center;
            padding: 15px;
            background: #e8f0fe;
            border-radius: 8px;
            margin: 10px 0;
        }
        h3 {
            color: #0d47a1;
            margin: 20px 0 10px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        الخبير التربوي المرافق داخل الصف
    </div>

    <div class="card">
        <h3>📂 رفع محتوى الدرس (نص فقط)</h3>
        <textarea id="lessonText" rows="8" placeholder="الصق هنا نص الدرس أو الصفحة من الكتاب..."></textarea>
        
        <h3>🔑 مفتاح API (اختياري - للتحليل المتقدم)</h3>
        <input type="password" id="apiKey" placeholder="الصق مفتاح API هنا إذا أردت استخدام الذكاء الاصطناعي">
        
        <button id="startBtn">🚀 ابدأ التحليل</button>
        
        <div id="status" class="status">جاهز للعمل - الصق النص واضغط ابدأ التحليل</div>
    </div>

    <div class="card">
        <h3>🧠 التحليل</h3>
        <div id="analysis" class="box">لم يتم التحليل بعد...</div>
    </div>

    <div class="card">
        <h3>📘 خطة الدرس المقترحة</h3>
        <div id="lessonPlan" class="box">ستظهر هنا بعد التحليل</div>
    </div>

    <div class="card">
        <h3>🎤 سكربت المعلم (نص حرفي)</h3>
        <div id="script" class="box">ستظهر هنا...</div>
    </div>

    <div class="card">
        <button id="clearBtn">مسح كل شيء والبدء من جديد</button>
    </div>
</div>

<script>
// الوظائف الأساسية
const startBtn = document.getElementById("startBtn");
const clearBtn = document.getElementById("clearBtn");
const statusBox = document.getElementById("status");

startBtn.addEventListener("click", startAnalysis);
clearBtn.addEventListener("click", clearAll);

function startAnalysis() {
    const text = document.getElementById("lessonText").value.trim();
    const apiKey = document.getElementById("apiKey").value.trim();

    if (!text) {
        statusBox.textContent = "❌ يرجى إدخال نص الدرس أولاً";
        statusBox.style.background = "#ffebee";
        return;
    }

    startBtn.disabled = true;
    statusBox.textContent = "جاري التحليل...";
    statusBox.style.background = "#e8f0fe";

    // تحليل بسيط محلي (بدون أي مصدر خارجي)
    setTimeout(() => {
        const result = simpleLocalAnalysis(text);
        
        document.getElementById("analysis").innerHTML = result.analysis;
        document.getElementById("lessonPlan").innerHTML = result.lessonPlan;
        document.getElementById("script").innerHTML = result.script;

        statusBox.textContent = "✅ تم التحليل بنجاح";
        startBtn.disabled = false;
    }, 800);
}

function simpleLocalAnalysis(text) {
    // استخراج كلمات مفتاحية بسيطة
    const words = text.replace(/[^\u0600-\u06FF\s]/g, " ")
                      .split(/\s+/)
                      .filter(w => w.length > 2);
    
    const mainIdea = words.slice(0, 5).join(" ") || "الفكرة الرئيسية في النص";

    return {
        analysis: `
            <strong>عدد الكلمات:</strong> ${words.length}<br>
            <strong>الموضوع الرئيسي المكتشف:</strong> ${mainIdea}
        `,
        lessonPlan: `
            🎯 <strong>الفكرة الواحدة لهذه الحصة:</strong><br>
            ${mainIdea}<br><br>
            ❓ <strong>السؤال المركزي المقترح:</strong><br>
            ما هي ${mainIdea} وكيف نفهمها من خلال النص؟
        `,
        script: `
            "السلام عليكم ورحمة الله...<br>
            اليوم سنركز على فكرة واحدة فقط: ${mainIdea}<br><br>
            أريد منكم أن تقرأوا الفقرة بهدوء...<br>
            (صمت)<br><br>
            ما الذي فهمتموه من هذه الفكرة؟"<br><br>
            "ممتاز... (صمت)<br>
            سنتوقف هنا اليوم."
        `
    };
}

function clearAll() {
    if (confirm("هل تريد مسح كل المحتوى والبدء من جديد؟")) {
        document.getElementById("lessonText").value = "";
        document.getElementById("apiKey").value = "";
        document.getElementById("analysis").innerHTML = "لم يتم التحليل بعد...";
        document.getElementById("lessonPlan").innerHTML = "ستظهر هنا بعد التحليل";
        document.getElementById("script").innerHTML = "ستظهر هنا...";
        statusBox.textContent = "جاهز للعمل - الصق النص واضغط ابدأ التحليل";
        statusBox.style.background = "#e8f0fe";
    }
}
</script>

</body>
</html>
