<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الخبير التربوي المرافق — النسخة النهائية المستقرة</title>

<!-- ✅ تحميل صحيح لمكتبة OCR -->
https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.jsscript>

<meta http-equiv="Content-Security-Policy"
content="
default-src 'self';
script-src 'self' https://cdn.jsdelivr.net 'unsafe-eval';
worker-src 'self' blob: https://cdn.jsdelivr.net;
connect-src 'self' https://cdn.jsdelivr.net;
img-src 'self' data: blob:;
style-src 'self' 'unsafe-inline';
base-uri 'none';
">

<style>
:root{
  --main:#0d47a1;--bg:#f4f6f8;--card:#fff;--ink:#1f2937;
  --muted:#6b7280;--ok:#166534;--soft:#e3f2fd;
}
*{box-sizing:border-box}
body{margin:0;font-family:Tahoma,Arial;background:var(--bg);color:var(--ink);line-height:1.8}
.app{max-width:1200px;margin:auto;padding:16px}
.header{background:var(--card);padding:18px;border-radius:16px;
box-shadow:0 6px 20px rgba(0,0,0,.08);text-align:center;margin-bottom:16px}
.card{background:var(--card);padding:16px;border-radius:14px;
box-shadow:0 6px 20px rgba(0,0,0,.08);margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
button,input,select{width:100%;padding:12px;border:none;border-radius:12px;font-size:15px;margin-top:8px}
button{background:var(--main);color:#fff;cursor:pointer}
button.ok{background:var(--ok)}
button:disabled{opacity:.6}
.box{background:var(--soft);padding:12px;border-radius:12px;margin-top:10px;white-space:pre-wrap}
.progress{height:8px;background:#e5e7eb;border-radius:8px;overflow:hidden}
.progress span{display:block;height:100%;width:0%;background:var(--main);transition:.2s}
.small{font-size:13px;color:var(--muted)}
</style>
</head>

<body>
<div class="app">
  <div class="header">
    <p>بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</p>
    <h2 style="color:var(--main)">الخبير التربوي المرافق — دعم سيادي للمعلم</h2>
    <p class="small">نسخة مستقرة • حدّ أقصى ٣ صور • ضغط تلقائي</p>
  </div>

  <div class="grid">
    <div class="card">
      <h3>📷 إدخال صور الدرس (٣ صور كحد أقصى)</h3>
      <input type="file" id="files" accept="image/*" multiple>
      <div class="progress"><span id="bar"></span></div>
      <div id="status" class="box">— بانتظار الصور —</div>
      <button class="ok" id="start" disabled>ابدأ القراءة</button>
    </div>

    <div class="card">
      <h3>🧭 التحضير</h3>
      <button id="prepBtn" disabled class="ok">إنشاء التحضير</button>
      <div id="prep" class="box"></div>
    </div>
  </div>
</div>

<script>
const filesInput=document.getElementById("files");
const statusBox=document.getElementById("status");
const bar=document.getElementById("bar");
const startBtn=document.getElementById("start");
const prepBtn=document.getElementById("prepBtn");
const prepBox=document.getElementById("prep");

let images=[]; let extractedText="";

filesInput.onchange=async()=>{
  images=[...filesInput.files].slice(0,3);
  if(filesInput.files.length>3){
    statusBox.textContent="⚠️ تم قبول أول ٣ صور فقط.";
  }
  if(!images.length){return}
  statusBox.textContent=`✅ تم إدخال ${images.length} صورة.`;
  startBtn.disabled=false;
};

async function compressImage(file){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement("canvas");
      const scale=Math.min(1200/img.width,1);
      canvas.width=img.width*scale;
      canvas.height=img.height*scale;
      const ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      canvas.toBlob(b=>res(b),"image/jpeg",0.7);
    };
    img.src=URL.createObjectURL(file);
  });
}

startBtn.onclick=async()=>{
  extractedText="";
  bar.style.width="5%";
  for(let i=0;i<images.length;i++){
    const blob=await compressImage(images[i]);
    try{
      const r=await Tesseract.recognize(blob,"ara",{logger:m=>{
        if(m.progress!=null){
          bar.style.width=Math.round((i+m.progress)/images.length*90)+"%";
        }
      }});
      extractedText+=r.data.text+" ";
    }catch(e){}
  }
  bar.style.width="100%";
  statusBox.textContent=extractedText? "✅ تمت القراءة بنجاح."
  :"⚠️ تعذّر الاستخراج — سيتم العمل من الصور.";
  prepBtn.disabled=false;
};

prepBtn.onclick=()=>{
  prepBox.textContent=
`📘 تحضير مهني:
"انظروا إلى الصفحة."
سؤال واحد.
صمت.
محاولة.
إغلاق عند نطق الفكرة.`;
};
</script>
</body>
</html>
