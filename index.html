<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الخبير التربوي المرافق — النسخة السيادية المُصححة</title>

<!-- ✅ تحميل Tesseract.js v5 بشكل صحيح -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
:root{
  --main:#0d47a1;
  --ok:#2e7d32;
  --warn:#455a64;
  --bg:#f4f6f8;
  --card:#ffffff;
  --ink:#222;
  --soft:#e3f2fd;
  --muted:#6b7280;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Tahoma,Arial,sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.85;
}
.app{max-width:1000px;margin:auto;padding:16px}
.header{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
  text-align:center;
  margin-bottom:16px;
}
.card{
  background:var(--card);
  padding:18px;
  border-radius:16px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
  margin-bottom:16px;
}
h1,h2,h3{margin:0 0 10px;text-align:center;color:var(--main)}
input,button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  font-size:16px;
}
button{background:var(--main);color:#fff;cursor:pointer}
button.ok{background:var(--ok)}
button.warn{background:var(--warn)}
button.ghost{background:#eef2f7;color:#111}
button:disabled{opacity:.6;cursor:not-allowed}
.box{
  background:var(--soft);
  padding:14px;
  border-radius:14px;
  margin-top:12px;
  white-space:pre-wrap;
  font-size:15px;
}
.progress{
  height:8px;
  background:#ddd;
  border-radius:8px;
  overflow:hidden;
  margin:12px 0;
}
.progress span{
  display:block;
  height:100%;
  width:0%;
  background:var(--main);
  transition:.3s;
}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.badges span{
  background:#eef2f7;
  border-radius:999px;
  padding:6px 10px;
  font-size:13px;
}
.small{font-size:13px;color:var(--muted)}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <p>بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</p>
  <h1>الخبير التربوي المرافق</h1>
  <p class="small">Camera-First • اختيار من الملفات • فكرة واحدة • سؤال واحد</p>
</div>

<div class="card">
  <h3>📷 تصوير أو اختيار صورة من الملفات</h3>
  <input id="fileInput" type="file" accept="image/*" capture="environment">
  <p class="small">اختر من الكاميرا أو الملفات (حد أقصى: ٣ صور)</p>
  
  <!-- زر تجريبي لتجنب "لم يتم اختيار ملف" -->
  <button id="demoBtn" class="ghost">جرب بصورة تجريبية</button>
  
  <div class="progress"><span id="bar"></span></div>
  <div id="pages" class="badges"></div>
  <div id="status" class="box">— بانتظار الصور —</div>
  <button id="startBtn" class="ok" disabled>ابدأ القراءة</button>
</div>

<div class="card">
  <h3>🧭 داخل الحصّة</h3>
  <div id="idea" class="box">🔹 الفكرة ستظهر هنا</div>
  <div id="question" class="box">❓ السؤال سيظهر هنا</div>
  <div id="prep" class="box"></div>
  <button id="buildBtn" class="ok" disabled>أنشئ التحضير</button>
</div>

<div class="card">
  <h3>🎛️ الرادار الصفّي</h3>
  <button class="warn" onclick="support('🛑 صمت مهني مُدار')">صمت مهني</button>
  <button class="ghost" onclick="support('🔁 ارجع للسؤال الواحد')">ارجع للسؤال</button>
  <button class="ok" onclick="support('✅ نُطقت الفكرة — أُغلِقت الحصّة')">إغلاق الحصّة</button>
  <button class="ghost" onclick="window.print()">🖨️ طباعة</button>
  <div id="support" class="box"></div>
</div>

</div>

<script>
// ================== المتغيرات ==================
const input = document.getElementById("fileInput");
const demoBtn = document.getElementById("demoBtn");
const bar = document.getElementById("bar");
const statusBox = document.getElementById("status");
const pages = document.getElementById("pages");
const startBtn = document.getElementById("startBtn");
const buildBtn = document.getElementById("buildBtn");

let images = [];
let ocrText = "";
let worker = null;

// ================== تحميل Worker مرة واحدة ==================
async function initTesseract() {
  if (worker) return worker;
  statusBox.textContent = "⏳ جارٍ تحميل محرك القراءة...";
  worker = await Tesseract.createWorker('ara', 1, {
    logger: m => {
      if (m.status === 'recognizing text') {
        bar.style.width = Math.round(m.progress * 100) + '%';
      }
    }
  });
  statusBox.textContent = "✅ محرك القراءة جاهز (عربي)";
  return worker;
}

// ================== اختيار الملفات ==================
input.onchange = () => {
  images = Array.from(input.files).slice(0, 3);
  updateUIAfterSelect();
};

demoBtn.onclick = async () => {
  // صورة تجريبية عامة (يمكنك استبدالها برابط صورة كتاب عربي)
  const demoUrl = "https://picsum.photos/id/1015/800/600"; // صورة واضحة للتجربة
  statusBox.textContent = "⏳ جارٍ تحميل صورة تجريبية...";
  const response = await fetch(demoUrl);
  const blob = await response.blob();
  images = [new File([blob], "demo.jpg", {type: "image/jpeg"})];
  updateUIAfterSelect();
};

function updateUIAfterSelect() {
  pages.innerHTML = "";
  if (images.length === 0) {
    statusBox.textContent = "— بانتظار الصور —";
    startBtn.disabled = true;
    return;
  }
  images.forEach((_, i) => {
    const s = document.createElement("span");
    s.textContent = `صورة ${i+1}`;
    pages.appendChild(s);
  });
  statusBox.textContent = `✅ تم اختيار ${images.length} صورة`;
  startBtn.disabled = false;
}

// ================== بدء القراءة ==================
startBtn.onclick = async () => {
  if (images.length === 0) return;

  bar.style.width = "5%";
  statusBox.textContent = "🔍 جارٍ قراءة النص العربي...";

  await initTesseract();

  ocrText = "";

  for (let i = 0; i < images.length; i++) {
    const blob = await compressImage(images[i]);
    const result = await worker.recognize(blob);
    ocrText += (result.data.text || "") + "\n\n";
    bar.style.width = Math.round(((i+1)/images.length)*100) + "%";
  }

  bar.style.width = "100%";
  statusBox.textContent = "✅ انتهت القراءة بنجاح! يمكنك الآن إنشاء التحضير.";
  buildBtn.disabled = false;

  // عرض النص المستخرج للتحقق
  console.log("النص المستخرج:", ocrText);
};

// ضغط الصورة لتسريع العملية
function compressImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const scale = Math.min(1200 / img.width, 1);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.75);
    };
    img.src = URL.createObjectURL(file);
  });
}

// ================== تحليل وإنشاء التحضير ==================
buildBtn.onclick = () => {
  const lower = ocrText.toLowerCase();
  let idea = "ربط المحتوى المرئي بالمفاهيم";
  let q = "ماذا تلاحظ في هذه الصفحة؟";

  if (/جمع|طرح|ضرب|قسم|احسب|مساحة|حجم/.test(lower)) {
    idea = "ربط العمليات الحسابية بالأمثلة المرئية";
    q = "كيف يمكننا حل هذه المسألة خطوة بخطوة؟";
  } else if (/قصة|نص|كتاب|شعر/.test(lower)) {
    idea = "فهم النص من خلال الأسئلة الموجهة";
    q = "ما الفكرة الرئيسية في هذا النص؟";
  }

  document.getElementById("idea").textContent = `🔹 الفكرة: ${idea}`;
  document.getElementById("question").textContent = `❓ السؤال: ${q}`;
  document.getElementById("prep").innerHTML = `
    <strong>ما سيقوله المعلم:</strong><br>
    "انظروا جيداً إلى الصفحة..."<br>
    ${q}<br><br>
    [صمت واعٍ ١٥-٢٠ ثانية]<br>
    محاولة واحدة من الطلاب.<br>
    إغلاق الحصة عند نطق الفكرة الصحيحة.
  `;
};

function support(msg) {
  document.getElementById("support").textContent = msg;
}
</script>
</body>
</html>
