<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النظام السيادي الذكي الشامل لدعم المعلّم</title>

<!-- ✅ تحميل Tesseract بشكل صحيح -->
https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.jsscript>

<style>
:root{
  --main:#0d47a1;
  --bg:#f4f6f8;
  --card:#ffffff;
  --ink:#222;
  --ok:#2e7d32;
  --expert:#6a1b9a;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Tahoma, Arial, sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.8;
}

.app{
  max-width:900px;
  margin:auto;
  padding:16px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  box-shadow:0 6px 20px rgba(0,0,0,.1);
  margin-bottom:16px;
}

h1{text-align:center;color:var(--main)}
h3{margin-top:0}

button,input,select{
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:14px;
  font-size:16px;
}

button{
  background:var(--main);
  color:#fff;
  cursor:pointer;
}

button.ok{background:var(--ok)}
button.warn{background:#777}

.box{
  background:#fafafa;
  padding:16px;
  border-radius:14px;
  margin-top:12px;
  white-space:pre-wrap;
}

.expert{border-right:6px solid var(--expert)}
.hidden{display:none}

/* وضع الصف */
.class-mode .card:not(#lessonCard){display:none}
.class-mode h1{display:none}
.class-mode body{background:#fff}
</style>
</head>

<body>

<div class="app">

<h1>النظام السيادي الذكي الشامل</h1>

<div class="card">
  <h3>📘 إدراج صفحة الدرس</h3>
  <input type="file" id="fileInput" accept="image/*">
  <div id="status" class="box">— بانتظار رفع الصورة —</div>
</div>

<div class="card hidden" id="lessonCard">
  <label>مدة الحصّة</label>
  <select id="duration">
    <option value="30">٣٠ دقيقة</option>
    <option value="40">٤٠ دقيقة</option>
    <option value="45">٤٥ دقيقة</option>
  </select>

  <button class="ok" id="startBtn">▶ ابدأ الحصّة (أقل جهد)</button>
  <button class="warn" onclick="enterClassMode()">🎯 وضع الصف</button>
  <button class="warn" onclick="smartSilence()">🛑 لا تقترح شيئًا</button>

  <div id="prep" class="box"></div>
  <div id="sim" class="box"></div>
  <div id="expertBox" class="box expert"></div>
  <div id="support" class="box"></div>
</div>

</div>

<script>
const statusBox = document.getElementById("status");
const fileInput = document.getElementById("fileInput");
const lessonCard = document.getElementById("lessonCard");
const duration = document.getElementById("duration");
const prep = document.getElementById("prep");
const sim = document.getElementById("sim");
const expertBox = document.getElementById("expertBox");
const support = document.getElementById("support");
const startBtn = document.getElementById("startBtn");

let extractedText = "";
let lessonType = "استكشاف";
let coreQuestion = "ماذا لاحظت؟";
let attempts = 0;
let startTime = 0;

fileInput.addEventListener("change", handleImage);
startBtn.addEventListener("click", startLesson);

async function handleImage(){
  const file = fileInput.files[0];
  if(!file) return;

  statusBox.textContent = "🔍 جارٍ قراءة الصفحة…";

  try{
    const result = await Tesseract.recognize(file,"ara");
    extractedText = result.data.text || "";
    statusBox.textContent = "✅ تم استخراج النص من الصفحة";
  }catch(e){
    extractedText = "";
    statusBox.textContent = "⚠️ تعذّر الاستخراج – سنكمل بطريقة آمنة";
  }

  analyzeText();
  lessonCard.classList.remove("hidden");
}

function analyzeText(){
  if(/جمع|طرح|احسب|يساوي|عدد/.test(extractedText)){
    lessonType = "رياضيات";
    coreQuestion = "كيف توصلت إلى الناتج؟";
  }else if(/اقرأ|نص|كلمة|جملة/.test(extractedText)){
    lessonType = "لغة عربية";
    coreQuestion = "ماذا فهمت من النص؟";
  }else{
    lessonType = "استكشاف";
    coreQuestion = "ماذا لاحظت في الصفحة؟";
  }
}

function startLesson(){
  attempts = 1;
  startTime = Date.now();

  prep.textContent =
`📘 التحضير التنفيذي:

نوع الدرس: ${lessonType}

ما يقوله المعلّم حرفيًا:
"انظروا إلى الصفحة."
ثم:
«${coreQuestion}»
صمت.
محاولة واحدة.
توقّف.`;

  sim.textContent =
`🎬 المحاكاة الصفّية:
عرض المحتوى كما هو.
سؤال واحد.
صمت.
تثبيت.
إنهاء.`;

  expertBox.textContent =
`🧠 توصية الخبير:
لا تُضِف شيئًا خارج الصفحة.
الإنهاء المبكر جودة.`;

  support.textContent =
`📊 الدعم:
عدد المحاولات: ${attempts}
الزمن التقريبي: ${Math.round((Date.now()-startTime)/60000)} دقيقة

جملة رحيمة واحدة ثم التوقّف.`;
}

function smartSilence(){
  prep.textContent = "✅ الصف يعمل.";
  sim.textContent = "";
  expertBox.textContent = "";
  support.textContent = "";
}

function enterClassMode(){
  document.body.classList.toggle("class-mode");
}
</script>

</body>
</html>
