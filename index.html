<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الحكمة في الحصّة</title>

<style>
body{
  margin:0;
  font-family:Tahoma, Arial, sans-serif;
  background:#f4f6f8;
  color:#222;
}
.box{
  max-width:820px;
  margin:16px auto;
  background:#ffffff;
  padding:18px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}
h1{
  text-align:center;
  color:#1565c0;
  margin:0;
}
.sub{
  text-align:center;
  font-size:14px;
  margin:10px 0;
  color:#555;
}
label{
  display:block;
  font-weight:bold;
  margin-top:14px;
}
input,textarea,button{
  width:100%;
  padding:10px;
  margin-top:6px;
  font-size:15px;
  direction:rtl;
}
textarea{
  resize:vertical;
}
button{
  margin-top:14px;
  background:#1565c0;
  color:#fff;
  border:none;
  cursor:pointer;
}
.note{
  margin-top:10px;
  background:#faf6e8;
  padding:10px;
  border-radius:8px;
  font-size:14px;
  color:#7a5c00;
}
#output{
  margin-top:16px;
  height:360px;
  background:#fafafa;
  white-space:pre-wrap;
  line-height:1.8;
}
</style>
</head>

<body>

<div class="box">
<h1>الحِكمة في الحصّة</h1>
<div class="sub">
ليس المطلوب أن تملأ الوقت… بل أن تُنهيه في موضعه
</div>

<label>سؤال الحصّة</label>
<input id="q" placeholder="سؤال واحد يكفي">

<label>الكلمة التي إن نُطقت انتهى الدرس</label>
<input id="c" placeholder="جملة صادقة من فم طفل">

<div class="note">
🪶 حِكمة المعلّم:  
إذا أردت أن تُعلِّم، فاصمت.  
وإذا نطق الطفل، فتوقّف.
</div>

<button onclick="build()">اكتب الحكمة</button>

<textarea id="output" readonly placeholder="ستظهر هنا حكمة الحصّة…"></textarea>
</div>

<script>
function build(){
  const q=document.getElementById("q").value.trim();
  const c=document.getElementById("c").value.trim();
  if(!q||!c){
    alert("الحكمة لا تُستعجل");
    return;
  }

  document.getElementById("output").value=
`حِكمة هذه الحصّة:

سأطرح سؤالاً واحدًا:
«${q}»

ثم سأنتظر.
لأن الانتظار تربية.

وعندما يقول طفل:
«${c}»

سأتوقف.
لأن التوقّف حكمة.

فالدرس الذي انتهى في وقته،
أبقى أثرًا من درسٍ طال شرحه.`;
}
</script>

</body>
</html>
