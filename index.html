<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المحاكاة السيادية المرتبطة بالكتاب — نسخة موحَّدة</title>

<style>
body{
  font-family: Tahoma, Arial, sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:16px;
}
.container{
  background:#fff;
  max-width:960px;
  margin:auto;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 8px rgba(0,0,0,.1);
}
h1{text-align:center;margin-bottom:12px;}
label{font-weight:bold;margin-top:10px;display:block;}
input,select,textarea{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:15px;
  direction:rtl;
}
textarea{resize:vertical;}
.actions{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:16px 0;
}
button{
  padding:12px;
  font-size:15px;
  border:none;
  border-radius:6px;
  background:#1976d2;
  color:#fff;
  cursor:pointer;
}
button.alt{background:#009688;}
button.warn{background:#ffa000;}
button.danger{background:#d32f2f;}
button.dark{background:#455a64;}
button:hover{opacity:.9;}
.output textarea{
  height:650px;
  white-space:pre-wrap;
  font-size:14.5px;
  line-height:1.8;
}
.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:6px;
  font-size:14px;
  margin-bottom:8px;
}
.green{background:#e8f5e9;color:#1b5e20;}
.yellow{background:#fff8e1;color:#7f6000;}
.red{background:#fde0dc;color:#b71c1c;}
small{color:#555;}
@media print{
  .actions,label,input,select,small,.badge{display:none}
  .container{box-shadow:none}
  textarea{border:none;height:auto;font-size:14pt}
}
</style>
</head>

<body>

<div class="container">
<h1>محاكاة حصة صفية سيادية مرتبطة بالكتاب</h1>

<label>المادة</label>
<input id="subject">

<label>الصف</label>
<input id="grade">

<label>الدرس</label>
<input id="lesson">

<label>هدف الحصة (سلوك ذهني قابل للرصد)</label>
<input id="goal" placeholder="مثال: أن يبرّر اختياره بسبب واحد">

<label>سؤال الحصة الواحد</label>
<input id="coreQuestion" placeholder="سؤال واحد تُدار حوله الحصة كاملة">

<label>المفهوم المقفول</label>
<input id="lockedConcept" placeholder="المفهوم الذي لا يُتجاوز حتى ينضج">

<label>مدة الحصة</label>
<select id="duration">
  <option value="٤٠">٤٠ دقيقة</option>
  <option value="٤٥">٤٥ دقيقة</option>
</select>

<label>طريقة التنفيذ</label>
<select id="delivery">
  <option value="face">وجاهي</option>
  <option value="teams">عن بُعد</option>
</select>

<label>رفع ملف الكتاب (TXT أو PDF)</label>
<input type="file" id="bookFile" accept=".txt,.pdf">
<small>يُستخدم لتحديد نطاق الدرس والأمثلة المسموح بها</small>

<div class="actions">
  <button onclick="build()">🧠 إنشاء المحاكاة</button>
  <button class="alt" onclick="path('good')">🟢 تفاعل مرتفع</button>
  <button class="warn" onclick="path('mixed')">🟡 تفاعل متباين</button>
  <button class="danger" onclick="path('weak')">🔴 تعثّر</button>
  <button class="dark" onclick="silentCheck()">⏱️ فحص الصمت</button>
  <button onclick="window.print()">🖨️ طباعة</button>
</div>

<div id="gauge" class="badge green">🟢 توازن الحصة</div>

<div class="output">
<textarea id="out" placeholder="ستظهر المحاكاة هنا..."></textarea>
</div>
</div>

<!-- pdf.js -->
https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.jsscript>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<script>
const subject = document.getElementById("subject");
const grade = document.getElementById("grade");
const lesson = document.getElementById("lesson");
const goal = document.getElementById("goal");
const coreQuestion = document.getElementById("coreQuestion");
const lockedConcept = document.getElementById("lockedConcept");
const duration = document.getElementById("duration");
const delivery = document.getElementById("delivery");
const bookFile = document.getElementById("bookFile");
const out = document.getElementById("out");
const gauge = document.getElementById("gauge");

let bookText = "";
let keywords = [];
let built = false;
let talkRatio = 0.5;
let diversity = 0.5;

/* قراءة الكتاب */
bookFile.addEventListener("change", async e => {
  const f = e.target.files[0];
  if(!f) return;

  if(f.name.endsWith(".txt")){
    const r = new FileReader();
    r.onload = x => {
      bookText = x.target.result || "";
      keywords = extractKeywords(bookText);
      alert("تم تحميل الكتاب وتحديد نطاق الدرس");
    };
    r.readAsText(f,"UTF-8");
  }else{
    const buf = await f.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data:buf}).promise;
    let t="";
    for(let i=1;i<=pdf.numPages;i++){
      const p = await pdf.getPage(i);
      const c = await p.getTextContent();
      c.items.forEach(it=>t+=it.str+" ");
    }
    bookText = t;
    keywords = extractKeywords(bookText);
    alert("تم تحميل كتاب PDF وتحديد نطاق الدرس");
  }
});

/* استخراج كلمات النطاق */
function extractKeywords(text){
  if(!text) return [];
  const words = text.split(/\s+/).filter(w=>w.length>3);
  const freq = {};
  words.forEach(w=>freq[w]=(freq[w]||0)+1);
  return Object.entries(freq)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5)
    .map(e=>e[0]);
}

/* التحقق من توافق الهدف */
function goalAligned(goalText, keys){
  if(!keys.length) return true;
  return keys.some(k => goalText.includes(k));
}

/* إنشاء المحاكاة */
function build(){
  if(!goal.value || !coreQuestion.value || !lockedConcept.value){
    alert("الهدف، السؤال الواحد، والمفهوم المقفول عناصر إلزامية");
    return;
  }
  if(bookText && !goalAligned(goal.value, keywords)){
    alert("الهدف لا يرتبط بنطاق الكتاب المرفق");
    return;
  }

  built = true;
  out.value =
`محاكاة حصة صفية سيادية — مرتبطة بالكتاب

المادة: ${subject.value||"—"}
الصف: ${grade.value||"—"}
الدرس: ${lesson.value||"—"}
المدة: ${duration.value} دقيقة
النمط: ${delivery.value==="face"?"وجاهي":"عن بُعد"}

الهدف السلوكي للحصة:
«${goal.value}»

سؤال الحصة الواحد:
«${coreQuestion.value}»

المفهوم المقفول:
«${lockedConcept.value}»

نطاق الدرس المستخلص من الكتاب:
${keywords.length?keywords.join("، "):"—"}

قواعد ضابطة:
— كل مثال يجب أن يخدم السؤال الواحد.
— لا انتقال معرفي قبل نضج المفهوم المقفول.
— القاعدة لا تُذكر إلا إذا نطق بها طالب.
— الصمت المقصود أداة تفكير.

بنية التنفيذ:
١) إثارة بسؤال فقط.
٢) أمثلة من نطاق الكتاب حصراً.
٣) انتظار دليل نضج واحد.
٤) فتح القفل دقيقتين ثم الإغلاق.

مرجع الكتاب:
${bookText?bookText.slice(0,500):"—"}
`;
  updateGauge();
}

/* مسارات التفاعل */
function path(t){
  if(!built) return;
  if(t==="good"){
    diversity=0.8;
    out.value+="\n\n🟢 مسار تفاعل مرتفع:\n— مثال أعمق من نفس النطاق.\n— امتنع عن القاعدة.";
  }
  if(t==="mixed"){
    diversity=0.5;
    out.value+="\n\n🟡 مسار متباين:\n— تفكيك خطوة واحدة.\n— سؤال: لماذا؟";
  }
  if(t==="weak"){
    diversity=0.2;
    out.value+="\n\n🔴 مسار تعثّر:\n— مثال واحد فقط.\n— تمثيل حسي.\n— صمت.";
  }
  updateGauge();
}

/* فحص الصمت */
function silentCheck(){
  talkRatio=Math.max(0,talkRatio-0.1);
  updateGauge();
}

/* تحديث المؤشر */
function updateGauge(){
  if(talkRatio<0.4 && diversity>0.6){
    gauge.textContent="🟢 توازن الحصة";
    gauge.className="badge green";
  }else if(talkRatio<0.7){
    gauge.textContent="🟡 قابل للتحسين";
    gauge.className="badge yellow";
  }else{
    gauge.textContent="🔴 اختلال";
    gauge.className="badge red";
  }
}
</script>

</body>
</html>
