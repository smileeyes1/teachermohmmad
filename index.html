<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>محاكاة حصة صفية سيادية — نسخة الهاتف</title>

<style>
body{
  font-family: Tahoma, Arial, sans-serif;
  background:#f2f4f7;
  margin:0;
  padding:12px;
}
.container{
  background:#fff;
  margin:auto;
  padding:16px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}
h1{
  text-align:center;
  font-size:20px;
  margin-bottom:16px;
}
label{
  font-weight:bold;
  margin-top:12px;
  display:block;
  font-size:14.5px;
}
input,select,textarea{
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:15px;
  direction:rtl;
}
textarea{
  resize:vertical;
}
.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:18px 0;
}
button{
  padding:14px;
  font-size:15px;
  border:none;
  border-radius:10px;
  background:#1976d2;
  color:#fff;
  cursor:pointer;
}
button.alt{background:#009688;}
button.warn{background:#f9a825;color:#000;}
button.danger{background:#d32f2f;}
button.dark{background:#455a64;}
button:active{opacity:0.85;}

.badge{
  display:block;
  text-align:center;
  padding:8px;
  border-radius:8px;
  font-size:14.5px;
  margin-bottom:10px;
}
.green{background:#e8f5e9;color:#1b5e20;}
.yellow{background:#fff8e1;color:#7f6000;}
.red{background:#fde0dc;color:#b71c1c;}

.output textarea{
  height:520px;
  white-space:pre-wrap;
  font-size:14.5px;
  line-height:1.9;
}

small{color:#555;font-size:13px;}

@media print{
  .actions,label,input,select,small,.badge{display:none}
  textarea{
    border:none;
    height:auto;
    font-size:14pt;
  }
}
</style>
</head>

<body>

<div class="container">
<h1>محاكاة حصة صفية سيادية</h1>

<label>المادة</label>
<input id="subject">

<label>الصف</label>
<input id="grade">

<label>الدرس</label>
<input id="lesson">

<label>هدف الحصة</label>
<input id="goal" placeholder="سلوك ذهني قابل للرصد">

<label>سؤال الحصة الواحد</label>
<input id="coreQuestion">

<label>المفهوم المقفول</label>
<input id="lockedConcept">

<label>مدة الحصة</label>
<select id="duration">
  <option value="٤٠">٤٠ دقيقة</option>
  <option value="٤٥">٤٥ دقيقة</option>
</select>

<label>النمط</label>
<select id="delivery">
  <option value="face">وجاهي</option>
  <option value="teams">عن بُعد</option>
</select>

<label>رفع كتاب (TXT أو PDF)</label>
<input type="file" id="bookFile" accept=".txt,.pdf">
<small>يُستخدم لضبط الأمثلة ضمن نطاق الكتاب</small>

<div class="actions">
  <button onclick="build()">🧠 إنشاء</button>
  <button class="alt" onclick="path('good')">🟢 مرتفع</button>
  <button class="warn" onclick="path('mixed')">🟡 متباين</button>
  <button class="danger" onclick="path('weak')">🔴 تعثّر</button>
  <button class="dark" onclick="silentCheck()">⏱️ صمت</button>
  <button onclick="window.print()">🖨️ طباعة</button>
</div>

<div id="gauge" class="badge green">🟢 توازن الحصة</div>

<div class="output">
<textarea id="out" placeholder="ستظهر المحاكاة هنا..."></textarea>
</div>
</div>

<!-- pdf.js (تصحيح نهائي) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<script>
const el = id => document.getElementById(id);

const subject = el("subject"),
      grade = el("grade"),
      lesson = el("lesson"),
      goal = el("goal"),
      coreQuestion = el("coreQuestion"),
      lockedConcept = el("lockedConcept"),
      duration = el("duration"),
      delivery = el("delivery"),
      bookFile = el("bookFile"),
      out = el("out"),
      gauge = el("gauge");

let bookText="", keywords=[], built=false;
let talkRatio=0.5, diversity=0.5;

/* قراءة الكتاب */
bookFile.addEventListener("change", async e=>{
  const f=e.target.files[0]; if(!f) return;
  if(f.name.endsWith(".txt")){
    const r=new FileReader();
    r.onload=()=>{ bookText=r.result||""; extract(); alert("تم تحميل الملف النصي"); };
    r.readAsText(f,"UTF-8");
  }else{
    const buf=await f.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let t="";
    for(let i=1;i<=pdf.numPages;i++){
      const p=await pdf.getPage(i);
      const c=await p.getTextContent();
      c.items.forEach(it=>t+=it.str+" ");
    }
    bookText=t; extract(); alert("تم تحميل PDF");
  }
});

function extract(){
  const words=bookText.replace(/[^\u0600-\u06FF\s]/g,"")
    .split(/\s+/).filter(w=>w.length>3);
  const freq={};
  words.forEach(w=>freq[w]=(freq[w]||0)+1);
  keywords=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,5).map(e=>e[0]);
}

function build(){
  if(!goal.value||!coreQuestion.value||!lockedConcept.value){
    alert("الهدف، السؤال، والمفهوم المقفول إلزامية");
    return;
  }
  built=true;
  out.value=`
محاكاة حصة صفية سيادية

المادة: ${subject.value||"—"}
الصف: ${grade.value||"—"}
الدرس: ${lesson.value||"—"}
المدة: ${duration.value} دقيقة
النمط: ${delivery.value==="face"?"وجاهي":"عن بُعد"}

الهدف:
«${goal.value}»

سؤال الحصة:
«${coreQuestion.value}»

المفهوم المقفول:
«${lockedConcept.value}»

نطاق الكتاب:
${keywords.length?keywords.join("، "):"—"}

بنية الحصة:
١) سؤال فقط.
٢) مثال واحد.
٣) صمت مقصود.
٤) نطق طالب.
`;
  updateGauge();
}

function path(t){
  if(!built)return;
  diversity={good:0.8,mixed:0.5,weak:0.2}[t];
  updateGauge();
}

function silentCheck(){
  talkRatio=Math.max(0,talkRatio-0.1);
  updateGauge();
}

function updateGauge(){
  if(talkRatio<0.4&&diversity>0.6){
    gauge.className="badge green"; gauge.textContent="🟢 توازن";
  }else if(talkRatio<0.7){
    gauge.className="badge yellow"; gauge.textContent="🟡 قابل للتحسين";
  }else{
    gauge.className="badge red"; gauge.textContent="🔴 اختلال";
  }
}
</script>

</body>
</html>
