<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=١.٠">
<title>النظام السيادي لدعم المعلّم — وضع الحصّة المباشرة</title>

<!-- OCR اختياري عند توفر الإنترنت -->
<script>
(function(){
  try{
    const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
    s.onload=()=>window.OCR_READY=true;
    s.onerror=()=>window.OCR_READY=false;
    document.head.appendChild(s);
  }catch(e){ window.OCR_READY=false; }
})();
</script>

<style>
:root{
  --bg:#f٤f٦f٨;
  --card:#ffffff;
  --main:#١٥٦٥c٠;
  --alt:#٤٥٥a٦٤;
  --ok:#٢e٧d٣٢;
  --soft:#eef٢f٦;
  --ink:#٢٢٢;
  --muted:#٦b٧٢٨٠;
}
*{box-sizing:border-box}
body{
  margin:٠;
  font-family:Tahoma,Arial,sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:١.٩;
}
.app{
  max-width:٩٦٠px;
  margin:٢٠px auto;
  padding:١٦px;
}
.card{
  background:var(--card);
  padding:٢٢px;
  border-radius:١٦px;
  box-shadow:٠ ٤px ١٦px rgba(٠,٠,٠,.٠٨);
  margin-bottom:٢٠px;
}
.header{text-align:center}
.header h١{
  margin:٠;
  font-size:٢٢px;
  color:var(--main);
}
.header p{
  margin-top:٨px;
  font-size:١٤px;
  color:var(--muted);
}
h٢{
  margin:٠ ٠ ١٢px ٠;
  font-size:١٨px;
}
button{
  width:١٠٠%;
  padding:١٤px;
  margin-top:١٠px;
  border-radius:١٤px;
  border:none;
  font-size:١٥px;
  cursor:pointer;
  background:var(--main);
  color:#fff;
}
button.alt{background:var(--alt)}
button.ok{background:var(--ok)}
.buttons{
  display:flex;
  flex-wrap:wrap;
  gap:١٢px;
  margin-top:١٤px;
}
video,canvas{
  width:١٠٠%;
  border-radius:١٤px;
}
.note{
  background:var(--soft);
  padding:١٤px;
  border-radius:١٤px;
  font-size:١٤px;
  margin-top:١٢px;
}
.output{
  background:#fafafa;
  padding:١٨px;
  border-radius:١٤px;
  white-space:pre-wrap;
  margin-top:١٤px;
  font-size:١٥px;
}
.log{
  background:#fafafa;
  padding:١٤px;
  border-radius:١٤px;
  margin-top:١٢px;
  white-space:pre-wrap;
  font-size:١٤px;
}
.hidden{display:none}
.footer{
  text-align:center;
  font-size:١٣px;
  color:var(--muted);
  margin-top:٢٠px;
}
@media print{
  video,button,.buttons,.footer{display:none}
  body{background:#fff}
  .output,.log{font-size:١٤pt}
}
</style>
</head>

<body>

<div class="app">

<!-- العنوان -->
<div class="card header">
  <h١>النظام السيادي لدعم المعلّم</h١>
  <p>تصوير الدرس → التزام بالمنهاج → وضع حصّة مباشر مضبوط</p>
</div>

<!-- خطوة التصوير -->
<div class="card" id="cameraStep">
  <h٢>١) تصوير صفحة الدرس (كاميرا خلفية)</h٢>
  <button onclick="startCamera()">📸 تشغيل الكاميرا الخلفية</button>
  <video id="video" autoplay playsinline class="hidden"></video>
  <button id="captureBtn" class="hidden" onclick="capture()">التقاط صفحة الدرس</button>
  <div class="note">
    ✔ المرجع الوحيد هو الصورة<br>
    ✔ OCR فقط لاستخراج العنوان عند توفر الإنترنت
  </div>
</div>

<!-- المعالجة -->
<div class="card hidden" id="processStep">
  <canvas id="canvas"></canvas>
  <div id="lessonTitle" class="note">⏳ تحديد عنوان الدرس…</div>

  <div class="buttons hidden" id="supportActions">
    <button onclick="prep()">📘 تحضير</button>
    <button onclick="simulate()">🧪 محاكاة</button>
    <button onclick="observe()">📋 رصد</button>
    <button class="ok" onclick="startLesson()">▶ بدء الحصّة المباشرة</button>
  </div>

  <div id="output" class="output hidden"></div>
</div>

<!-- وضع الحصّة المباشرة -->
<div class="card hidden" id="liveLesson">
  <h٢>وضع الحصّة المباشرة</h٢>
  <div class="buttons">
    <button onclick="act('طُرح السؤال')">اطرح السؤال</button>
    <button class="alt" onclick="act('صمت')">صمت</button>
    <button class="alt" onclick="act('محاولة')">محاولة</button>
    <button class="ok" onclick="closeLesson()">نُطقت الفكرة ← توقّف</button>
  </div>
  <div class="log" id="log">سجل الحصّة:</div>
</div>

<div class="footer">
  أقل فعل كافٍ — التوقّف قرار مهني — الأثر قبل الكم
</div>

</div>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("٢d");
const lessonTitle=document.getElementById("lessonTitle");
const output=document.getElementById("output");
const supportActions=document.getElementById("supportActions");
const liveLesson=document.getElementById("liveLesson");
const log=document.getElementById("log");

let lessonName="الدرس وفق الصورة";
let closed=false;

/* تشغيل الكاميرا */
function startCamera(){
  video.classList.remove("hidden");
  document.getElementById("captureBtn").classList.remove("hidden");
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:{ideal:"environment"}},
    audio:false
  }).then(s=>video.srcObject=s)
   .catch(()=>alert("تعذّر تشغيل الكاميرا"));
}

/* التقاط */
function capture(){
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  ctx.drawImage(video,٠,٠);
  video.srcObject.getTracks().forEach(t=>t.stop());
  document.getElementById("processStep").classList.remove("hidden");
  processImage();
}

/* معالجة الصورة */
function processImage(){
  const cropH=Math.floor(canvas.height*٠.٢٥);
  const crop=document.createElement("canvas");
  crop.width=canvas.width;
  crop.height=cropH;
  crop.getContext("٢d").drawImage(canvas,٠,٠,canvas.width,cropH,٠,٠,canvas.width,cropH);

  if(!window.OCR_READY || !window.Tesseract){
    finalizeLesson();
    return;
  }

  Tesseract.recognize(crop,"ara").then(res=>{
    const text=res.data.text.trim();
    lessonName=text.split("\n")[٠]||lessonName;
    finalizeLesson();
  }).catch(finalizeLesson);
}

function finalizeLesson(){
  lessonTitle.textContent="📘 "+lessonName;
  supportActions.classList.remove("hidden");
}

function show(text){
  output.textContent=text;
  output.classList.remove("hidden");
}

/* تحضير وخطط */
function prep(){
  show(
`تحضير حصّة – ${lessonName}

• مثال واحد من الصفحة.
• سؤال واحد.
• محاولة واحدة.
• توقّف عند الفهم.`
  );
}
function simulate(){
  show(
`محاكاة صفّية – ${lessonName}

عرض المثال ← صمت ← محاولة ← تثبيت ← انتهت.`
  );
}
function observe(){
  show(
`قائمة رصد – ${lessonName}

☐ حاول
☐ تردّد
☐ نطق الفكرة
☐ احتاج دعم`
  );
}

/* الحصّة المباشرة */
function startLesson(){
  liveLesson.classList.remove("hidden");
  log.textContent="سجل الحصّة:";
}
function act(text){
  if(closed) return;
  log.textContent+="\n• "+text;
}
function closeLesson(){
  if(closed) return;
  closed=true;
  log.textContent+="\n• نُطقت الفكرة — انتهت الحصّة";
}
</script>

</body>
</html>
