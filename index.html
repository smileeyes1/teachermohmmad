<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=١.٠">
<title>النظام السيادي الذكي الشامل لدعم المعلّم</title>

<!-- ✅ تحميل OCR بالطريقة الصحيحة ١٠٠٪ -->
https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js</script>

<style>
:root{
  --main:#٠d٤٧a١;
  --bg:#f٤f٦f٨;
  --card:#ffffff;
  --ink:#٢٢٢;
  --ok:#٢e٧d٣٢;
  --warn:#f٩a٨٢٥;
  --expert:#٦a١b٩a;
}

*{box-sizing:border-box}

body{
  margin:٠;
  font-family:Tahoma, Arial, sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:١.٩;
}

.app{
  max-width:٩٠٠px;
  margin:auto;
  padding:١٦px;
}

.card{
  background:var(--card);
  padding:٢٠px;
  border-radius:١٦px;
  box-shadow:٠ ٦px ٢٠px rgba(٠,٠,٠,.١);
  margin-bottom:١٦px;
}

h١{text-align:center;color:var(--main)}

button,input,select{
  width:١٠٠%;
  padding:١٤px;
  margin-top:٨px;
  border:none;
  border-radius:١٤px;
  font-size:١٦px;
}

button{
  background:var(--main);
  color:#fff;
  cursor:pointer;
}

button.ok{background:var(--ok)}

.box{
  background:#fafafa;
  padding:١٦px;
  border-radius:١٤px;
  margin-top:١٢px;
  white-space:pre-wrap;
}

.expert{border-right:٦px solid var(--expert)}
.hidden{display:none}
</style>
</head>

<body>

<div class="app">

<h١>النظام السيادي الذكي الشامل</h١>

<div class="card">
  <h٣>📘 إدراج صفحة الدرس</h٣>
  <input type="file" accept="image/*" onchange="loadImage(event)">
  <div id="status" class="box">— بانتظار رفع الصورة —</div>
</div>

<div class="card hidden" id="controls">
  <label>مدة الحصّة</label>
  <select id="duration">
    <option value="٣٠">٣٠ دقيقة</option>
    <option value="٤٠">٤٠ دقيقة</option>
    <option value="٤٥">٤٥ دقيقة</option>
  </select>

  <button class="ok" onclick="startLesson()">▶ ابدأ الحصّة الآن (أقل جهد)</button>

  <div id="prep" class="box"></div>
  <div id="sim" class="box"></div>
  <div id="expertBox" class="box expert"></div>
  <div id="support" class="box"></div>
</div>

</div>

<script>
let imageFile=null;
let extractedText="";
let coreQuestion="ماذا لاحظت؟";
let lessonType="عام";
let attempts=٠;
let startTime=٠;

/* تحميل الصورة */
function loadImage(e){
  imageFile=e.target.files[٠];
  status.textContent="🔍 جارٍ قراءة الصفحة…";
  readImage();
}

/* OCR */
async function readImage(){
  try{
    const result = await Tesseract.recognize(imageFile,"ara");
    extractedText=result.data.text||"";
    status.textContent="✅ تم استخراج النص من الصفحة";
  }catch(e){
    extractedText="";
    status.textContent="⚠️ تعذّر الاستخراج – استخدام خطة آمنة";
  }
  analyzeText();
  controls.classList.remove("hidden");
}

/* تحليل النص */
function analyzeText(){
  if(/جمع|طرح|احسب|يساوي|عدد/.test(extractedText)){
    lessonType="رياضيات";
    coreQuestion="كيف توصلت إلى الناتج؟";
  }else if(/اقرأ|نص|كلمة|جملة/.test(extractedText)){
    lessonType="لغة عربية";
    coreQuestion="ماذا فهمت من النص؟";
  }else{
    lessonType="استكشاف";
    coreQuestion="ماذا لاحظت في الصفحة؟";
  }
}

/* تشغيل الحصّة */
function startLesson(){
  attempts=١;
  startTime=Date.now();
  const mins=parseInt(duration.value,١٠);

  prep.textContent=
`📘 التحضير التنفيذي المبني على الصفحة:

نوع الدرس: ${lessonType}

ما يقوله المعلم حرفيًا:
"انظروا إلى الصفحة."
ثم:
«${coreQuestion}»
صمت ٣٠ ثانية.
محاولة طالب واحد فقط.
توقّف عند الفهم.`;

  sim.textContent=
`🎬 المحاكاة الصفّية الواقعية:

عرض المحتوى كما هو.
سؤال من نفس النص.
صمت.
محاولة واحدة.
تثبيت بجملة قصيرة.
إنهاء.`;

  expertBox.textContent=
`🧠 الخبير التربوي:
لا تُضِف شيئًا خارج الصفحة.
الصمت هنا يعمل.
الإنهاء المبكر جودة تربوية.`;

  support.textContent=
`📊 الدعم الكمي والنوعي والسلوكي:
عدد المحاولات: ${attempts}
الزمن التقريبي: ${Math.round((Date.now()-startTime)/٦٠٠٠٠)} دقيقة

الوصف النوعي:
"محاولة واحدة مستقلة – أداء مناسب."

التوصية السلوكية:
جملة رحيمة واحدة ثم التوقّف.`;
}
</script>

</body>
</html>
