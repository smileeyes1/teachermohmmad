<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الخبير التربوي المرافق — النسخة السيادية المُحسّنة</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
:root{
  --main:#0d47a1;
  --ok:#2e7d32;
  --warn:#455a64;
  --bg:#f4f6f8;
  --card:#ffffff;
  --ink:#222;
  --soft:#e3f2fd;
}
*{box-sizing:border-box}
body{margin:0;font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.85}
.app{max-width:1000px;margin:auto;padding:16px}
.header{background:var(--card);padding:24px 20px;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);text-align:center;margin-bottom:20px}
.card{background:var(--card);padding:20px;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);margin-bottom:20px}
h1,h3{margin:0 0 12px;text-align:center;color:var(--main)}
input,button{width:100%;padding:16px;margin-top:12px;border:none;border-radius:14px;font-size:17px}
button{background:var(--main);color:#fff;cursor:pointer}
button.ok{background:var(--ok)}
button.warn{background:var(--warn)}
button.ghost{background:#eef2f7;color:#111}
button:disabled{opacity:.6;cursor:not-allowed}
.box{background:var(--soft);padding:16px;border-radius:14px;margin-top:12px;white-space:pre-wrap;font-size:15.5px}
.progress{height:10px;background:#ddd;border-radius:8px;overflow:hidden;margin:16px 0}
.progress span{display:block;height:100%;width:0%;background:var(--main);transition:.4s}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.badges span{background:#eef2f7;border-radius:999px;padding:8px 14px;font-size:14px}
.small{font-size:13.5px;color:#6b7280;text-align:center}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <p>بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</p>
  <h1>الخبير التربوي المرافق</h1>
  <p class="small">Camera-First • تصوير مباشر • فكرة واحدة • سؤال واحد</p>
</div>

<div class="card">
  <h3>📷 التصوير المباشر بالكاميرا</h3>
  
  <!-- زر التصوير المباشر (الأساسي) -->
  <button id="cameraBtn" class="ok">📸 افتح الكاميرا وصوّر</button>
  
  <!-- خيار إضافي لاختيار من المعرض (للحالات التي لا يعمل فيها الـ capture) -->
  <input id="fileInput" type="file" accept="image/*" style="display:none">
  <button id="galleryBtn" class="ghost">📁 اختيار صورة من المعرض</button>
  
  <p class="small">حد أقصى: ٣ صور — يتم ضغطها تلقائياً</p>
  
  <div class="badges" id="pages"></div>
  <div class="progress"><span id="bar"></span></div>
  <div id="status" class="box">— بانتظار التصوير —</div>
  
  <button id="startBtn" class="ok" disabled>ابدأ القراءة والتحليل</button>
</div>

<div class="card">
  <h3>🧭 التحضير التنفيذي</h3>
  <div id="idea" class="box">🔹 الفكرة ستظهر هنا</div>
  <div id="question" class="box">❓ السؤال سيظهر هنا</div>
  <div id="prep" class="box"></div>
  <button id="buildBtn" class="ok" disabled>أنشئ التحضير</button>
</div>

<div class="card">
  <h3>🎛️ الرادار الصفّي</h3>
  <button class="warn" onclick="support('🛑 صمت مهني مُدار')">صمت مهني</button>
  <button class="ghost" onclick="support('🔁 ارجع للسؤال الواحد')">ارجع للسؤال</button>
  <button class="ok" onclick="closeSession()">✅ أُغلِقت الحصة</button>
  <button class="ghost" onclick="window.print()">🖨️ طباعة</button>
  <div id="support" class="box"></div>
</div>

</div>

<script>
// ================== متغيرات ==================
const cameraBtn = document.getElementById("cameraBtn");
const galleryBtn = document.getElementById("galleryBtn");
const fileInput = document.getElementById("fileInput");
const bar = document.getElementById("bar");
const statusBox = document.getElementById("status");
const pagesContainer = document.getElementById("pages");
const startBtn = document.getElementById("startBtn");
const buildBtn = document.getElementById("buildBtn");

let images = [];
let ocrText = "";
let worker = null;
let isClosed = false;

// ================== فتح الكاميرا مباشرة ==================
cameraBtn.onclick = () => {
  if (isClosed) return;
  // إنشاء input مؤقت للتصوير فقط
  const tempInput = document.createElement("input");
  tempInput.type = "file";
  tempInput.accept = "image/*";
  tempInput.capture = "environment";   // الكاميرا الخلفية
  tempInput.style.display = "none";
  
  tempInput.onchange = (e) => {
    if (e.target.files.length > 0) {
      images = Array.from(e.target.files).slice(0, 3);
      updateUI();
    }
  };
  
  tempInput.click();
};

// ================== اختيار من المعرض ==================
galleryBtn.onclick = () => {
  if (isClosed) return;
  fileInput.click();
};

fileInput.onchange = () => {
  if (fileInput.files.length > 0) {
    images = Array.from(fileInput.files).slice(0, 3);
    updateUI();
  }
};

function updateUI() {
  pagesContainer.innerHTML = "";
  images.forEach((_, i) => {
    const span = document.createElement("span");
    span.textContent = `صورة ${i+1}`;
    pagesContainer.appendChild(span);
  });
  statusBox.textContent = `✅ تم اختيار ${images.length} صورة`;
  startBtn.disabled = false;
}

// ================== باقي الكود (ضغط + OCR + تحليل + تحضير) نفس النسخة السابقة مع تحسين بسيط ==================
async function compressImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const scale = Math.min(1100 / img.width, 1);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(b => resolve(b), "image/jpeg", 0.72);
    };
    img.src = URL.createObjectURL(file);
  });
}

async function initWorker() {
  if (worker) return;
  statusBox.textContent = "⏳ جارٍ تحميل محرك القراءة...";
  worker = await Tesseract.createWorker('ara', 1);
}

startBtn.onclick = async () => {
  if (images.length === 0 || isClosed) return;
  bar.style.width = "5%";
  statusBox.textContent = "🔍 جارٍ قراءة الصور...";
  startBtn.disabled = true;

  await initWorker();
  ocrText = "";

  for (let i = 0; i < images.length; i++) {
    const blob = await compressImage(images[i]);
    const result = await worker.recognize(blob);
    ocrText += result.data.text + "\n\n";
    bar.style.width = Math.round(((i+1)/images.length)*100) + "%";
  }

  bar.style.width = "100%";
  statusBox.textContent = "✅ انتهت القراءة — اضغط أنشئ التحضير";
  buildBtn.disabled = false;
  analyzeContent();
};

function analyzeContent() {
  const text = ocrText.toLowerCase();
  let idea = "استكشاف المحتوى المرئي في الصور";
  let q = "ماذا ترى في الصور التي أمامك؟";

  if (/جمع|طرح|ضرب|احسب/.test(text)) {
    idea = "ربط العمليات الحسابية بالصور";
    q = "كيف نحل هذه المسألة باستخدام ما نراه؟";
  } else if (/حرف|كلمة|قصة/.test(text)) {
    idea = "فهم النص من خلال الملاحظة";
    q = "ما الفكرة الرئيسية في هذا النص؟";
  }

  document.getElementById("idea").textContent = `🔹 الفكرة: ${idea}`;
  document.getElementById("question").textContent = `❓ السؤال: ${q}`;
}

buildBtn.onclick = () => {
  if (isClosed) return;
  const idea = document.getElementById("idea").textContent.replace("🔹 الفكرة: ", "");
  const q = document.getElementById("question").textContent.replace("❓ السؤال: ", "");
  
  document.getElementById("prep").innerHTML = `
<strong>ما يقوله المعلم:</strong><br><br>
"انظروا جيداً إلى الصور..."<br><br>
${q}<br><br>
[ صمت واعٍ ١٥-٢٥ ثانية ]<br><br>
محاولة واحدة من الطالب.<br>
عند نطق الفكرة: نغلق الحصة بهدوء.
  `;
};

function support(msg) { document.getElementById("support").textContent = msg; }
function closeSession() {
  isClosed = true;
  statusBox.textContent = "✅ تم إغلاق الحصة";
  startBtn.disabled = buildBtn.disabled = true;
}
</script>
</body>
</html>
