<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>النظام السيادي لتحضير الحصة</title>

<style>
:root{
  --main:#1565c0;
  --bg:#f0f3f7;
  --card:#ffffff;
  --ink:#333;
}
body{
  margin:0;
  padding:12px;
  font-family:Tahoma, Arial, sans-serif;
  background:var(--bg);
  color:var(--ink);
}
.container{
  max-width:850px;
  margin:auto;
  background:var(--card);
  padding:20px;
  border-radius:16px;
  box-shadow:0 6px 16px rgba(0,0,0,.12);
}
header{
  text-align:center;
  margin-bottom:20px;
}
header h1{
  margin:0;
  font-size:22px;
  color:var(--main);
}
header .sub{
  margin-top:6px;
  font-size:14.5px;
  color:#444;
}
label{
  display:block;
  margin-top:14px;
  font-weight:bold;
  font-size:15px;
}
input,select,textarea,button{
  width:100%;
  margin-top:6px;
  padding:14px;
  font-size:15px;
  border-radius:10px;
  border:1px solid #ccc;
  direction:rtl;
}
textarea{
  height:540px;
  resize:vertical;
  white-space:pre-wrap;
  line-height:1.9;
}
.hint{
  margin-top:6px;
  padding:8px 10px;
  background:#f9fafa;
  border:1px dashed #ccc;
  border-radius:8px;
  font-size:13.5px;
  color:#555;
}
.file-box{
  margin-top:12px;
  background:#f1f5ff;
  border:1px solid #c3d3ff;
  border-radius:10px;
  padding:12px;
}
.file-name{
  margin-top:8px;
  font-size:14px;
  color:#0d47a1;
}
.actions{
  display:flex;
  gap:10px;
  margin-top:20px;
}
button{
  flex:1;
  background:var(--main);
  color:#fff;
  border:none;
  font-size:16px;
  cursor:pointer;
}
button.secondary{
  background:#455a64;
}
button:active{opacity:.85}
.badge{
  margin-top:16px;
  padding:10px;
  text-align:center;
  font-size:14.5px;
  border-radius:10px;
  background:#e8f5e9;
  color:#1b5e20;
}
.error{
  margin-top:10px;
  font-weight:bold;
  color:#b71c1c;
}

@media print{
  header,label,input,select,button,.hint,.badge,.file-box,.error{display:none}
  textarea{
    border:none;
    height:auto;
    font-size:14pt;
  }
}
</style>
</head>

<body>

<div class="container">

<header>
  <h1>النظام السيادي لتحضير الحصة</h1>
  <div class="sub">
    إعداد: <b>محمد وجيه</b> — مدرسة <b>عاطوف المختلطة</b>
  </div>
</header>

<label>المادة</label>
<select id="subject">
  <option>اللغة العربية</option>
  <option>الرياضيات</option>
</select>

<label>الصف</label>
<select id="grade">
  <option>الصف الأول</option>
  <option>الصف الثاني</option>
</select>

<label>عنوان الدرس</label>
<input id="lesson" placeholder="كما ورد في الكتاب">

<label>رفع ملف الكتاب (PDF أو صورة)</label>
<div class="file-box">
  <input type="file" id="bookFile" accept=".pdf,image/*">
  <div id="fileName" class="file-name">لم يتم رفع ملف بعد</div>
  <div class="hint">الغرض تنظيمي فقط — لا شرح ولا تحليل محتوى</div>
</div>

<div id="err" class="error"></div>

<label>سؤال الحصة الواحد 🔒</label>
<input id="question" placeholder="سؤال ثابت من البداية للنهاية">

<label>الفكرة المقفولة 🔒</label>
<input id="concept" placeholder="جملة قصيرة سينطقها تلميذ">

<label>مدة الحصة</label>
<select id="duration">
  <option value="40">٤٠ دقيقة</option>
  <option value="45">٤٥ دقيقة</option>
</select>

<div class="actions">
  <button onclick="build()">✅ توليد الحصة</button>
  <button class="secondary" onclick="window.print()">🖨️ طباعة</button>
</div>

<div class="badge">🛡️ التلميذ يفكّر — المعلّم يُدير الصمت</div>

<textarea id="output" placeholder="ستظهر الحصة الجاهزة هنا..."></textarea>

</div>

<script>
const MAX_SIZE_MB = 5;

const fileInput = document.getElementById("bookFile");
const fileNameBox = document.getElementById("fileName");
const errBox = document.getElementById("err");

fileInput.addEventListener("change", () => {
  const f = fileInput.files[0];
  errBox.textContent = "";
  fileNameBox.textContent = "لم يتم رفع ملف بعد";

  if (!f) return;

  const allowed = f.type === "application/pdf" || f.type.startsWith("image/");
  if (!allowed) {
    fileInput.value = "";
    showError("❌ نوع الملف غير مدعوم (PDF أو صورة فقط)");
    return;
  }

  const sizeMB = (f.size / (1024 * 1024)).toFixed(2);
  if (sizeMB > MAX_SIZE_MB) {
    fileInput.value = "";
    showError("❌ حجم الملف أكبر من المسموح (٥ MB)");
    return;
  }

  fileNameBox.innerHTML =
    `📘 <b>${f.name}</b><br>الحجم: ${sizeMB} MB`;

  if (f.type.startsWith("image/")) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.createElement("img");
      img.src = e.target.result;
      img.style.maxWidth = "100%";
      img.style.marginTop = "10px";
      img.style.borderRadius = "10px";
      fileNameBox.appendChild(img);
    };
    reader.readAsDataURL(f);
  }
});

function showError(msg){
  errBox.textContent = msg;
}

function build(){
  errBox.textContent = "";

  const subject  = document.getElementById("subject").value;
  const grade    = document.getElementById("grade").value;
  const lesson   = document.getElementById("lesson").value || "—";
  const question = document.getElementById("question").value.trim();
  const concept  = document.getElementById("concept").value.trim();
  const duration = document.getElementById("duration").value;
  const file     = fileInput.files[0];
  const out      = document.getElementById("output");

  if (!question || !concept) {
    showError("❌ سؤال الحصة والفكرة المقفولة عنصران إلزاميان");
    return;
  }

  out.value =
`تحضير حصة صفّية سيادية

المدرسة: عاطوف المختلطة
المعلّم: محمد وجيه

المادة: ${subject}
الصف: ${grade}
الدرس: ${lesson}
المدة: ${duration === "40" ? "٤٠" : "٤٥"} دقيقة

ملف الكتاب:
${file ? file.name : "غير مرفق"}

سؤال الحصة الواحد:
«${question}»

الفكرة المقفولة:
«${concept}»

بنية التنفيذ:
١) سؤال واحد فقط.
٢) مثال واحد.
٣) صمت مقصود.
٤) نطق تلميذ.
٥) إغلاق الحصة.

مبدأ الحصة:
الصمت أداة.
التفكير هدف.
النطق دليل الفهم.
`;
}
</script>

</body>
</html>
