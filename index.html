<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام دعم المعلّم المتقدّم — درس واحد، ثلاث أدوات</title>

<style>
:root{
  --main:#1565c0;
  --bg:#f4f6f8;
  --card:#ffffff;
  --soft:#eef2f6;
  --ink:#222;
  --muted:#6b7280;
  --ok:#2e7d32;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Tahoma, Arial, sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.9;
}

.app{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.header{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  text-align:center;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
  margin-bottom:20px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
  margin-bottom:20px;
}

h2{
  margin:0 0 12px 0;
  font-size:18px;
}

input[type="file"]{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px dashed #ccc;
}

.buttons{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:10px;
}

button{
  flex:1;
  min-width:150px;
  padding:12px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  background:var(--main);
  color:#fff;
  font-size:15px;
}

button.alt{background:#455a64}
button.ok{background:var(--ok)}

#output{
  display:none;
  background:#fafafa;
  padding:18px;
  border-radius:14px;
  white-space:pre-wrap;
  font-size:15px;
}

.footer{
  text-align:center;
  font-size:13px;
  color:var(--muted);
}

@media(max-width:600px){
  .buttons{flex-direction:column}
}
</style>
</head>

<body>

<div class="app">

<div class="header">
  <h1>دعم المعلّم المتقدّم</h1>
  <p>درس واحد — اختيار واحد — تنفيذ مهني هادئ</p>
</div>

<!-- اعتماد الكتاب -->
<div class="card">
  <h2>اعتماد الكتاب</h2>
  <input type="file" accept=".pdf,image/*" onchange="activateLesson(this)">
</div>

<!-- اختيار الدرس -->
<div class="card" id="lessonBox" style="display:none">
  <h2>اختر اسم الدرس</h2>
  <div class="buttons">
    <button onclick="selectLesson()">الجمع حتى ٥</button>
  </div>
</div>

<!-- ما الذي تريده لهذا الدرس -->
<div class="card" id="actionsBox" style="display:none">
  <h2>ماذا تريد لهذا الدرس؟</h2>
  <div class="buttons">
    <button onclick="showPrep()">📘 تحضير الدرس</button>
    <button onclick="showSim()">🧪 محاكاة الدرس</button>
    <button onclick="showObs()">📋 قوائم رصد</button>
  </div>
</div>

<div id="output"></div>

<div class="footer">
  نظام مساند — بلا كتابة — بلا تحليل — بلا محاسبة
</div>

</div>

<script>
// تفعيل الكتاب
function activateLesson(input){
  if(input.files.length>0){
    document.getElementById("lessonBox").style.display="block";
  }
}

function selectLesson(){
  document.getElementById("actionsBox").style.display="block";
}

// تحضير خاص بالدرس
function showPrep(){
  show(`
تحضير درس: الجمع حتى ٥

• نقطة الدخول: تمثيل مجموعتين بصريًا
• الإجراء الصفّي: محاولة طالب واحد
• لحظة التوقّف: عند أول نطق صحيح للمجموع
  `);
}

// محاكاة واقعية خاصة بالدرس
function showSim(){
  show(`
محاكاة هذا الدرس:

1) اعرض مجموعتين لا تتجاوزان ٥
2) اسمح بمحاولة واحدة
3) صمت
4) توقّف عند الفهم
  `);
}

// قوائم رصد مرتبطة بالدرس
function showObs(){
  show(`
قوائم رصد — الجمع حتى ٥:

☐ حاول العد
☐ استخدم التمثيل البصري
☐ نطق الناتج
☐ احتاج دعم
  `);
}

function show(text){
  const o=document.getElementById("output");
  o.style.display="block";
  o.textContent=text;
}
</script>

</body>
</html>
