<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الخبير التربوي V4</title>

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.7.2/mammoth.browser.min.js"></script>

<style>
body{font-family:Tahoma;background:#f4f6f8;margin:0}
.container{max-width:1000px;margin:auto;padding:15px}
.card{background:#fff;padding:16px;margin-bottom:15px;border-radius:12px}
button{width:100%;padding:14px;margin-top:10px;background:#0d47a1;color:#fff;border:none;border-radius:10px}
.box{background:#eef3ff;padding:10px;border-radius:10px;margin-top:10px;white-space:pre-wrap}
.progress{height:8px;background:#ddd;border-radius:10px}
.progress span{display:block;height:100%;width:0;background:#0d47a1}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h3>📂 رفع الملف</h3>
<input type="file" id="file">
<button id="analyzeBtn">تحليل</button>
<div class="progress"><span id="bar"></span></div>
<div id="status" class="box"></div>
</div>

<div class="card">
<h3>🧠 التحليل</h3>
<div id="analysis" class="box"></div>
<button id="generateBtn" disabled>توليد التحضير الذكي</button>
</div>

<div class="card">
<h3>📘 التحضير</h3>
<div id="lesson" class="box"></div>
</div>

<div class="card">
<h3>🎤 ماذا أقول للطلاب</h3>
<div id="script" class="box"></div>
</div>

<div class="card">
<h3>🧩 أسئلة للطلاب</h3>
<div id="questions" class="box"></div>
</div>

</div>

<script>

// ===== إعداد =====
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.js';

const analyzeBtn = document.getElementById("analyzeBtn");
const generateBtn = document.getElementById("generateBtn");

let textData = "";
let analysisData = null;

// ===== الأحداث =====
analyzeBtn.addEventListener("click", start);
generateBtn.addEventListener("click", generateAll);

// ===== قراءة =====
async function start(){
  const file = document.getElementById("file").files[0];
  if(!file) return alert("اختر ملف");

  update("🔍 قراءة الملف...");

  if(file.name.endsWith(".pdf")){
    textData = await readPDF(file);
  }else if(file.name.endsWith(".docx")){
    textData = await readDOCX(file);
  }

  update("🧠 تحليل...");
  analysisData = analyzeText(textData);

  showAnalysis(analysisData);
  generateBtn.disabled = false;
}

// ===== PDF =====
async function readPDF(file){
  const pdf = await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const content=await page.getTextContent();
    text+=content.items.map(i=>i.str).join(" ");
    progress(i/pdf.numPages);
  }
  return text;
}

// ===== DOCX =====
async function readDOCX(file){
  const res = await mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()});
  return res.value;
}

// ===== تحليل =====
function analyzeText(text){

  const words = text.split(/\s+/).filter(w=>w.length>2);

  let subject="عام";
  if(text.includes("جمع")) subject="رياضيات";
  if(text.includes("نص")) subject="لغة عربية";

  return {
    subject,
    wordCount: words.length,
    keyword: words[0] || "مفهوم"
  };
}

function showAnalysis(d){
  document.getElementById("analysis").textContent =
`📘 المادة: ${d.subject}
📊 عدد الكلمات: ${d.wordCount}
🧩 كلمة محورية: ${d.keyword}`;
}

// ===== توليد =====
async function generateAll(){

  // ===== بدون AI =====
  const lesson = `
🎯 الفكرة:
فهم "${analysisData.keyword}"

❓ السؤال:
كيف نستخدم "${analysisData.keyword}"؟

🚀 النشاط:
مثال بسيط ومشاركة
`;

  const script = `
👩‍🏫 المعلم يقول:
"اليوم سنتعلم ${analysisData.keyword} بطريقة سهلة"
"من يعرف مثالاً؟"
`;

  const questions = `
❓ سهل:
ما معنى ${analysisData.keyword}؟

❓ متوسط:
أعط مثالاً

❓ متقدم:
استخدمه في جملة
`;

  document.getElementById("lesson").textContent = lesson;
  document.getElementById("script").textContent = script;
  document.getElementById("questions").textContent = questions;

  // ===== AI (اختياري) =====
  // إذا أضفت API لاحقًا نربطه هنا
}

// ===== مساعد =====
function update(msg){
  document.getElementById("status").textContent = msg;
}

function progress(p){
  document.getElementById("bar").style.width = (p*100)+"%";
}

</script>

</body>
</html>
