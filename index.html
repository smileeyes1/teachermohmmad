<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام القيادة الصفّية التنفيذية — النسخة العليا المحصّنة</title>

<style>
:root{
  --main:#0d47a1;
  --bg:#f4f6f8;
  --card:#ffffff;
  --ink:#1f2937;
  --muted:#6b7280;
  --ok:#2e7d32;
  --warn:#f9a825;
  --danger:#c62828;
  --soft:#eef2f6;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Tahoma, Arial, sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.9;
}

.app{
  max-width:1200px;
  margin:auto;
  padding:16px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
  margin-bottom:16px;
}

.header{text-align:center}

.header h1{
  margin:0;
  color:var(--main);
  font-size:22px;
}

.header p{
  margin-top:6px;
  color:var(--muted);
  font-size:14px;
}

label{
  display:block;
  margin-top:10px;
  font-size:14px;
}

button,select{
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:14px;
  font-size:15px;
}

button{
  background:var(--main);
  color:#ffffff;
  cursor:pointer;
}

button.ok{background:var(--ok)}
button.warn{background:var(--warn); color:#000}
button.danger{background:var(--danger)}

.output{
  background:#fafafa;
  padding:16px;
  border-radius:14px;
  white-space:pre-wrap;
  margin-top:12px;
  font-size:14px;
}

.radar{
  background:#fffaf0;
  padding:16px;
  border-radius:14px;
  border-right:6px solid var(--warn);
  white-space:pre-wrap;
  margin-top:12px;
  font-size:14px;
}

.badge{
  display:inline-block;
  padding:6px 12px;
  border-radius:12px;
  font-size:13px;
}

.b-ready{background:#e3f2fd}
.b-work{background:#fff3cd}
.b-done{background:#e8f5e9;color:var(--ok)}

@media print{
  button,select{display:none}
  body{background:#ffffff}
  .output,.radar{font-size:14pt}
}
</style>
</head>

<body>

<div class="app">

<!-- ================= العنوان ================= -->
<div class="card header">
  <h1>نظام القيادة الصفّية التنفيذية</h1>
  <p>تحضير حرفي • محاكاة تنفيذية • رادار تربوي • حماية وارتقاء</p>
</div>

<!-- ================= الإعداد ================= -->
<div class="card">
  <label>نوع الحصّة</label>
  <select id="mode">
    <option>وجاهي</option>
    <option>تيمز</option>
  </select>

  <label>مدة الحصّة</label>
  <select id="time">
    <option>٣٠ دقيقة</option>
    <option>٤٠ دقيقة</option>
    <option>٤٥ دقيقة</option>
  </select>

  <button onclick="runSystem()">تشغيل النظام التنفيذي</button>
</div>

<!-- ================= التحضير ================= -->
<div class="card">
  <span id="status" class="badge b-ready">جاهز</span>
  <h2>📘 التحضير التنفيذي الحرفي</h2>
  <div id="prep" class="output"></div>
</div>

<!-- ================= المحاكاة ================= -->
<div class="card">
  <h2>🎬 المحاكاة الواقعية القابلة للتنفيذ</h2>
  <div id="simulation" class="output"></div>
</div>

<!-- ================= الرادار ================= -->
<div class="card">
  <h2>🛡️ الرادار والإرشاد التربوي</h2>
  <div id="radar" class="radar"></div>
</div>

</div>

<script>
function runSystem(){

  const mode = document.getElementById("mode").value;
  const time = document.getElementById("time").value;

  document.getElementById("status").className = "badge b-work";
  document.getElementById("status").textContent = "قيد التنفيذ";

  document.getElementById("prep").textContent =
`نوع الحصّة: ${mode}
مدة الحصّة: ${time}

الدقيقة ٠ – ٢:
المعلّم يقول حرفيًا:
"افتحوا الصفحة."
"ضعوا إصبعكم هنا."
"انظروا فقط."

⛔ لا شرح
⛔ لا سؤال

الدقيقة ٢ – ٤:
المعلّم يقرأ المثال ببطء.
ثم يقول:
"استمعوا فقط."
صمت ٢٠ ثانية كاملة.

الدقيقة ٤ – ٦:
المعلّم يقول:
"ماذا لاحظت؟"
صمت ٣٠ ثانية.

إذا لم تحدث مشاركة:
قل فقط:
"انظر مرة أخرى."
ثم صمت إضافي ٢٠ ثانية.

الدقيقة ٦ – ١٠:
اختر تلميذًا واحدًا فقط.
قل:
"حاول."
لا تصويب، لا مقاطعة.

إذا أخطأ:
قل:
"حاول مرة ثانية."
صمت ١٥ ثانية.

الدقيقة ١٠ – ١٢:
عند الفهم:
قل:
"إذن نقول: ………"
يردّدها تلميذ واحد.

✅ هنا الاكتمال التربوي.
✅ التوقّف صحيح ومهني.`;

  document.getElementById("simulation").textContent =
`السيناريو التنفيذي الواقعي:

المعلّم يعرض المثال.
(صمت)
تلميذ يحاول.
المعلّم لا يتدخّل.
التلميذ يعيد.
المعلّم يثبت الفكرة بجملة واحدة.

لا نشاط إضافي.
لا تعميم.
لا إنقاذ.

إذا تجاوز الوقت ٢٠ دقيقة دون فهم:
✋ توقّف فوري.
👣 مثال أبسط لاحقًا.
✔ الإنهاء صحيح تربويًا.`;

  document.getElementById("radar").textContent =
`رادارات الحماية أثناء الحصّة:

⚠️ رادار الاسترسال:
٣ جمل متتالية = توقّف.

⚠️ رادار التوتر:
ارتفاع الصوت = صمت ١٠ ثوانٍ.

⚠️ رادار الإنهاك:
انصراف الطلاب = إنهاء الحصّة.

✅ رادار الاكتمال:
نطق الفكرة بوضوح = توقّف فوري.

🧠 تذكير خبير:
"ما اكتمل اليوم كافٍ."`;

}
</script>

</body>
</html>
