<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعم المعلّم – ملف واحد شامل</title>

<!-- تحميل OCR فقط إن وُجد إنترنت -->
<script>
(function(){
  try{
    const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
    s.onload=()=>window.OCR_READY=true;
    s.onerror=()=>window.OCR_READY=false;
    document.head.appendChild(s);
  }catch(e){
    window.OCR_READY=false;
  }
})();
</script>

<style>
body{
  margin:0;
  font-family:Tahoma,Arial,sans-serif;
  background:#f4f6f8;
  padding:12px;
  line-height:1.8;
}
.card{
  background:#fff;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.12);
}
video,canvas{width:100%;border-radius:10px}
button,input[type=file]{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:8px;
  font-size:14px;
}
button{background:#1565c0;color:#fff}
.actions button{background:#455a64}
#lessonTitle{font-weight:bold;margin-bottom:6px}
#info{font-size:13px;color:#555}
</style>
</head>

<body>

<!-- إدخال الدرس -->
<div class="card">
  <h3>📘 إدخال صفحة الدرس</h3>
  <button onclick="startCamera()">📸 استخدام الكاميرا الخلفية</button>
  <input type="file" accept="image/*" onchange="loadImage(event)">
  <div id="info">
    • يعمل مع الإنترنت وبدونه<br>
    • OCR يُستخدم لاستخراج اسم الدرس فقط عند توفر الإنترنت
  </div>
</div>

<!-- الكاميرا -->
<div class="card" id="cameraBox" style="display:none">
  <video id="video" autoplay playsinline></video>
  <button onclick="capture()">التقاط الصورة</button>
</div>

<!-- المعالجة -->
<div class="card">
  <canvas id="canvas"></canvas>
  <div id="lessonTitle">— لم يتم تحديد الدرس بعد —</div>
</div>

<!-- الأفعال -->
<div class="card actions" id="actions" style="display:none">
  <button onclick="prep()">📘 تحضير</button>
  <button onclick="sim()">🧪 محاكاة واقعية</button>
  <button onclick="obs()">📋 قوائم رصد</button>
</div>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const lessonTitle=document.getElementById("lessonTitle");
const actions=document.getElementById("actions");

let lessonName="اسم الدرس";

// تشغيل الكاميرا الخلفية
function startCamera(){
  document.getElementById("cameraBox").style.display="block";
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:{ideal:"environment"}},
    audio:false
  }).then(s=>video.srcObject=s)
    .catch(()=>alert("تعذّر تشغيل الكاميرا الخلفية"));
}

// التقاط صورة
function capture(){
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  ctx.drawImage(video,0,0);
  processImage();
}

// تحميل صورة
function loadImage(e){
  const img=new Image();
  img.onload=()=>{
    canvas.width=img.width;
    canvas.height=img.height;
    ctx.drawImage(img,0,0);
    processImage();
  };
  img.src=URL.createObjectURL(e.target.files[0]);
}

// المعالجة الذكية للصورة
function processImage(){
  actions.style.display="none";
  lessonTitle.textContent="⏳ تحديد اسم الدرس...";

  // قص أعلى 25% فقط من الصفحة
  const cropHeight=Math.floor(canvas.height*0.25);
  const crop=document.createElement("canvas");
  crop.width=canvas.width;
  crop.height=cropHeight;
  crop.getContext("2d").drawImage(canvas,0,0,canvas.width,cropHeight,0,0,canvas.width,cropHeight);

  // بدون إنترنت: تخطّي OCR
  if(!window.OCR_READY || !window.Tesseract){
    lessonName="الدرس (بدون OCR)";
    lessonTitle.textContent="📘 "+lessonName;
    actions.style.display="block";
    return;
  }

  // OCR انتقائي
  Tesseract.recognize(crop,"ara").then(res=>{
    const text=res.data.text.trim();
    // اسم الدرس = أول سطر واضح
    lessonName=text.split("\n")[0]||"اسم الدرس";
    lessonTitle.textContent="📘 "+lessonName;
    actions.style.display="block";
  }).catch(()=>{
    lessonName="اسم الدرس";
    lessonTitle.textContent="📘 "+lessonName;
    actions.style.display="block";
  });
}

// ===== الدعم =====
function prep(){
alert(
`تحضير مختصر – ${lessonName}
• بداية من المثال الأول
• مشاركة طالب واحد
• توقّف عند الفهم`
);
}

function sim(){
alert(
`محاكاة صفّية – ${lessonName}
1) عرض المثال
2) صمت
3) محاولة
4) انتهِ`
);
}

function obs(){
alert(
`قوائم رصد – ${lessonName}
☐ حاول
☐ شارك
☐ نطق الفكرة`
);
}
</script>

</body>
</html>
