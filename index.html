<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الخبير التربوي PRO</title>

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.7.2/mammoth.browser.min.js"></script>

<style>
:root{
  --main:#0d47a1;
  --bg:#f4f6f8;
  --card:#fff;
}

body{
  margin:0;
  font-family:Tahoma;
  background:var(--bg);
}

.container{
  max-width:1000px;
  margin:auto;
  padding:15px;
}

.card{
  background:var(--card);
  padding:16px;
  border-radius:14px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,.08);
}

h2{
  text-align:center;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:var(--main);
  color:white;
  font-size:16px;
}

button:disabled{
  opacity:.6;
}

.box{
  background:#eef3ff;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  white-space:pre-wrap;
}

.progress{
  height:8px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.progress span{
  display:block;
  height:100%;
  width:0;
  background:var(--main);
}

@media (min-width:768px){
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
  }
}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h2>📂 رفع الملف</h2>
<input type="file" id="file">
<button id="startBtn">ابدأ التحليل</button>

<div class="progress"><span id="bar"></span></div>
<div id="status" class="box">جاهز</div>
</div>

<div class="grid">

<div class="card">
<h2>🧠 التحليل</h2>
<div id="analysis" class="box"></div>
<button id="lessonBtn" disabled>توليد التحضير</button>
</div>

<div class="card">
<h2>📘 التحضير</h2>
<div id="lesson" class="box"></div>
</div>

</div>

<div class="card">
<h2>🎛️ أدوات صفية</h2>
<button id="silentBtn">صمت 20 ثانية</button>
<div id="timer" class="box"></div>
</div>

</div>

<script>

// ===== إعداد PDF =====
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.js';

// ===== عناصر =====
const fileInput = document.getElementById("file");
const startBtn = document.getElementById("startBtn");
const lessonBtn = document.getElementById("lessonBtn");
const bar = document.getElementById("bar");

let textData = "";

// ===== أحداث =====
startBtn.addEventListener("click", start);
lessonBtn.addEventListener("click", generateLesson);
document.getElementById("silentBtn").addEventListener("click", silent);

// ===== بدء التحليل =====
async function start(){
  const file = fileInput.files[0];
  if(!file) return alert("اختر ملف");

  update("🔍 جاري التحليل...");
  textData = "";

  try{
    if(file.name.endsWith(".pdf")){
      textData = await readPDF(file);
    }else if(file.name.endsWith(".docx")){
      textData = await readDOCX(file);
    }else{
      alert("نوع الملف غير مدعوم");
      return;
    }

    progress(1);
    update("✅ تم التحليل");
    analyze();

  }catch(e){
    alert("خطأ: " + e.message);
  }
}

// ===== قراءة PDF =====
async function readPDF(file){
  const pdf = await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(i=>i.str).join(" ");
  }
  return text;
}

// ===== قراءة DOCX =====
async function readDOCX(file){
  const res = await mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()});
  return res.value;
}

// ===== تحليل =====
function analyze(){
  const t = textData.toLowerCase();

  let type = "عام";
  if(/جمع|طرح|عدد/.test(t)) type = "رياضيات";
  if(/حرف|كلمة|نص/.test(t)) type = "لغة";

  document.getElementById("analysis").textContent =
`نوع الدرس: ${type}
طول النص: ${t.length} حرف`;

  lessonBtn.disabled = false;
}

// ===== توليد التحضير =====
function generateLesson(){

  const lesson = `
🎯 الفكرة:
فهم المحتوى

❓ السؤال:
ما الفكرة الأساسية؟

🎓 الأهداف:
- فهم
- تطبيق

🚀 النشاط:
حل مثال من الملف

📏 التقييم:
سؤال مباشر

🔚 الإغلاق:
تلخيص سريع
`;

  document.getElementById("lesson").textContent = lesson;
}

// ===== صمت =====
function silent(){
  let t = 20;
  const el = document.getElementById("timer");

  const i = setInterval(()=>{
    el.textContent = "⏳ " + t;
    t--;
    if(t<0){
      clearInterval(i);
      el.textContent="✅ انتهى";
    }
  },1000);
}

// ===== مساعد =====
function update(msg){
  document.getElementById("status").textContent = msg;
}

function progress(p){
  bar.style.width = (p*100)+"%";
}

</script>
</body>
</html>
