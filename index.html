<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المحرك السيادي للحصة الصفية — نسخة موحّدة</title>

<style>
body{
  font-family: Tahoma, Arial, sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:16px;
  direction:rtl;
}
.container{
  background:#fff;
  max-width:٩٢٠px;
  margin:auto;
  padding:٢٠px;
  border-radius:١٠px;
  box-shadow:٠ ٤px ٨px rgba(٠,٠,٠,.١);
}
h1{text-align:center;margin-bottom:١٢px;}
label{font-weight:bold;margin-top:١٠px;display:block;}
input,select,textarea{
  width:١٠٠%;
  padding:١٠px;
  margin-top:٦px;
  border-radius:٦px;
  border:١px solid #ccc;
  font-size:١٥px;
  direction:rtl;
}
textarea{resize:vertical;}
.actions{
  display:flex;
  flex-wrap:wrap;
  gap:٨px;
  margin:١٦px ٠;
}
button{
  padding:١٢px;
  font-size:١٥px;
  border:none;
  border-radius:٦px;
  background:#١٩٧٦d٢;
  color:#fff;
  cursor:pointer;
}
button.alt{background:#٠٠٩٦٨٨;}
button.warn{background:#ffa٠٠٠;}
button.danger{background:#d٣٢f٢f;}
button.dark{background:#٤٢٤٢٤٢;}
.output textarea{
  height:٦٠٠px;
  white-space:pre-wrap;
  font-size:١٤.٥px;
  line-height:١.٨;
}
.badge{
  font-size:١٤px;
  padding:٤px ٨px;
  border-radius:٦px;
  display:inline-block;
  margin-top:٨px;
}
.green{background:#e٨f٥e٩;color:#١b٥e٢٠;}
.yellow{background:#fff٣e٠;color:#٧f٦٠٠٠;}
.red{background:#fde٠dc;color:#b٧١c١c;}
small{color:#٥٥٥;}
@media print{
  .actions,label,input,select,small,.badge{display:none}
  .container{box-shadow:none}
  textarea{border:none;height:auto;font-size:١٤pt}
}
</style>
</head>

<body>

<div class="container">
<h1>المحرّك السيادي للحصة الصفية</h1>

<label>المادة</label>
<input id="subject">

<label>الصف</label>
<input id="grade">

<label>الدرس</label>
<input id="lesson">

<label>سؤال الحصة الواحد (إلزامي)</label>
<input id="coreQuestion" placeholder="— سؤال واحد فقط يُدار حوله كل شيء —">

<label>المفهوم المقفول</label>
<input id="lockedConcept" placeholder="المفهوم الذي لا يُتجاوز حتى ينضج">

<label>مدة الحصة</label>
<select id="duration">
  <option value="٤٠">٤٠ دقيقة</option>
  <option value="٤٥">٤٥ دقيقة</option>
</select>

<label>طريقة التنفيذ</label>
<select id="delivery">
  <option value="face">وجاهي</option>
  <option value="teams">عن بُعد</option>
</select>

<label>رفع ملف الكتاب (TXT أو PDF)</label>
<input type="file" id="bookFile" accept=".txt,.pdf">
<small>يُستخدم كنص مرجعي فقط</small>

<div class="actions">
  <button onclick="build()">🧠 إنشاء الحصة</button>
  <button class="alt" onclick="path('good')">🟢 تفاعل مرتفع</button>
  <button class="warn" onclick="path('mixed')">🟡 تفاعل متباين</button>
  <button class="danger" onclick="path('weak')">🔴 تعثّر</button>
  <button class="dark" onclick="silentCheck()">⏱️ فحص الصمت</button>
  <button onclick="window.print()">🖨️ طباعة</button>
</div>

<div id="gauge" class="badge green">🟢 توازن</div>

<div class="output">
<textarea id="out" placeholder="ستظهر الحصة هنا..."></textarea>
</div>
</div>

https://cdnjs.cloudflare.com/ajax/libs/pdf.js/٣.١١.١٧٤/pdf.min.jsscript>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/٣.١١.١٧٤/pdf.worker.min.js";
</script>

<script>
const subject = document.getElementById("subject");
const grade = document.getElementById("grade");
const lesson = document.getElementById("lesson");
const duration = document.getElementById("duration");
const delivery = document.getElementById("delivery");
const coreQuestion = document.getElementById("coreQuestion");
const lockedConcept = document.getElementById("lockedConcept");
const out = document.getElementById("out");
const gauge = document.getElementById("gauge");
const bookFile = document.getElementById("bookFile");

let bookText = "";
let built = false;
let talkRatio = ٠.٥;   // تقدير صامت
let diversity = ٠.٥;   // تنوّع إجابات تقديري
let remaining = ٤٠;

bookFile.addEventListener("change", async e => {
  const f = e.target.files[٠];
  if(!f) return;
  if(f.name.endsWith(".txt")){
    const r = new FileReader();
    r.onload = x => bookText = x.target.result || "";
    r.readAsText(f,"UTF-٨");
  } else {
    const buf = await f.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data:buf}).promise;
    let t="";
    for(let i=١;i<=pdf.numPages;i++){
      const p = await pdf.getPage(i);
      const c = await p.getTextContent();
      c.items.forEach(it=>t+=it.str+" ");
    }
    bookText = t;
  }
});

function build(){
  if(!coreQuestion.value || !lockedConcept.value) return;
  built = true;
  remaining = Number(duration.value);
  out.value =
`حصة صفية سيادية — جاهزة للتنفيذ

المادة: ${subject.value||"—"}
الصف: ${grade.value||"—"}
الدرس: ${lesson.value||"—"}
المدة: ${duration.value} دقيقة
النمط: ${delivery.value==="face"?"وجاهي":"عن بُعد"}

السؤال الواحد:
«${coreQuestion.value}»

المفهوم المقفول:
«${lockedConcept.value}»

قواعد الحصة:
— لا خروج عن السؤال الواحد.
— لا انتقال قبل نضج المفهوم المقفول.
— القاعدة لا تُذكر إلا إن نطق بها طالب.
— الصمت أداة، لا فراغ.

بنية التنفيذ:
١) إثارة بسؤال فقط.
٢) أمثلة تخدم المفهوم المقفول حصراً.
٣) مراقبة دليل نضج واحد.
٤) فتح القفل دقيقتين ثم إغلاقه.

مرجع الكتاب:
${bookText?bookText.slice(٠,٥٠٠):"—"}
`;
  updateGauge();
}

function path(t){
  if(!built) return;
  if(t==="good"){
    diversity = ٠.٨;
    out.value += "\n\n🟢 مسار تفاعل مرتفع:\n— مثال أعمق.\n— امتنع عن القاعدة.";
  }
  if(t==="mixed"){
    diversity = ٠.٥;
    out.value += "\n\n🟡 مسار متباين:\n— تفكيك خطوة واحدة.\n— سؤال: لماذا؟";
  }
  if(t==="weak"){
    diversity = ٠.٢;
    out.value += "\n\n🔴 مسار تعثّر:\n— مثال واحد فقط.\n— تمثيل حسي.\n— صمت.";
  }
  updateGauge();
}

function silentCheck(){
  talkRatio = Math.max(٠, talkRatio - ٠.١);
  updateGauge();
}

function updateGauge(){
  if(talkRatio < ٠.٤ && diversity > ٠.٦){
    gauge.textContent = "🟢 توازن";
    gauge.className = "badge green";
  } else if(talkRatio < ٠.٧){
    gauge.textContent = "🟡 قابل للتحسين";
    gauge.className = "badge yellow";
  } else {
    gauge.textContent = "🔴 اختلال";
    gauge.className = "badge red";
  }
}
</script>

</body>
</html>
