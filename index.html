<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محرك المحاكاة التعليمية العميقة – الإصدار 1.0</title>

<style>
body {
  font-family: "Tahoma", Arial, sans-serif;
  background-color: #f4f6f8;
  margin: 0;
  padding: 16px;
  direction: rtl;
}

.container {
  background: #ffffff;
  max-width: 760px;
  margin: auto;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

label {
  font-weight: bold;
  display: block;
  margin-top: 12px;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 15px;
  direction: rtl;
  text-align: right;
}

textarea {
  resize: vertical;
}

button {
  margin-top: 10px;
  padding: 12px;
  font-size: 16px;
  background-color: #1976d2;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button.secondary {
  background-color: #455a64;
}

button.danger {
  background-color: #8e0000;
}

button:hover {
  opacity: 0.9;
}

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 16px;
}

.output textarea {
  height: 520px;
  white-space: pre-wrap;
  font-size: 14.5px;
  line-height: 1.7;
}

.teacher-only {
  background: #eef3f8;
  border-right: 4px solid #1976d2;
  padding: 10px;
  margin-top: 12px;
}

.print-view .teacher-only {
  display: none;
}

/* ===== الطباعة العربية ===== */
@media print {
  body {
    background: #fff;
    margin: 0;
  }

  .controls,
  input,
  select,
  label {
    display: none !important;
  }

  .container {
    box-shadow: none;
    max-width: 100%;
    padding: 10mm 12mm;
  }

  .output textarea {
    border: none;
    height: auto;
    font-size: 14pt;
    line-height: 1.8;
  }

  h1 {
    font-size: 20pt;
    margin-bottom: 10mm;
  }
}
</style>
</head>

<body>

<div class="container">
<h1>محرك المحاكاة التعليمية العميقة</h1>

<label>المادة</label>
<input id="subject" placeholder="رياضيات / علوم / لغة عربية">

<label>الصف</label>
<input id="grade" placeholder="الصف الثاني – الخامس – الثامن">

<label>الدرس / المفهوم</label>
<input id="lesson" placeholder="المقارنة بين عددين – الجملة الاسمية">

<label>مستوى الطلبة</label>
<select id="level">
  <option>ضعاف</option>
  <option selected>عادي</option>
  <option>موهوبين</option>
</select>

<label>نوع المحاكاة</label>
<select id="type">
  <option>عميقة</option>
  <option>علاجية</option>
  <option>إثرائية</option>
</select>

<label>الهدف العميق (اختياري)</label>
<textarea id="deepGoal" placeholder="ما الذي تريد أن يتغير في تفكير الطالب؟"></textarea>

<div class="controls">
<button onclick="generateSimulation()">🧠 إنشاء المحاكاة</button>
<button class="secondary" onclick="showTeacherView()">👩‍🏫 عرض المعلم</button>
<button class="secondary" onclick="showPrintView()">🧾 عرض الطباعة</button>
<button onclick="saveSimulation()">💾 حفظ</button>
<button onclick="searchLibrary()">🔍 بحث</button>
<button onclick="window.print()">🖨️ طباعة / حفظ PDF</button>
</div>

<div class="output">
<label>ناتج المحاكاة</label>
<textarea id="output"></textarea>
</div>
</div>

<script>
function generateSimulation() {
  const subject = subjectInput();
  const grade = gradeInput();
  const lesson = lessonInput();
  const level = document.getElementById("level").value;
  const type = document.getElementById("type").value;
  const goal = document.getElementById("deepGoal").value || "بناء فهم أعمق ومستقر للمفهوم";

  const levelMap = {
    "ضعاف": "تبسيط الموقف واستخدام تمثيل حسي مع سؤال واحد فقط.",
    "عادي": "مناقشة جماعية وطرح أكثر من تفسير محتمل.",
    "موهوبين": "إضافة شرط جديد أو متغير يتحدى التفسير الأول."
  };

  const simulation = `
محاكاة تعليمية ${type}

المادة: ${subject}
الصف: ${grade}
الدرس: ${lesson}
مستوى الطلبة: ${level}

١) الافتراض الحدسي:
ينطلق الطلبة من فهم أولي بسيط للمفهوم.

سؤال:
لماذا يبدو هذا الفهم صحيحًا في البداية؟

٢) موقف واقعي كاشف:
يُعرض موقف يجعل هذا الفهم غير كافٍ لحلّه.

سؤال:
هل تفسيرك يحل المشكلة بالكامل؟ لماذا؟

٣) تكييف حسب المستوى:
${levelMap[level]}

٤) لحظة التحوّل المفاهيمي:
يبدأ الطلبة بتعديل التفكير للوصول إلى جوهر الفكرة.

سؤال:
ما الشيء الذي يجب التركيز عليه بدل الشكل الظاهري؟

٥) التطبيق:
نشاط قصير لتثبيت الفهم.

سؤال:
ما الذي جعلك تختار هذا الحل؟

٦) نقل التعلّم:
ربط المفهوم بسياق جديد.

سؤال:
أين يمكن استخدام هذا التفكير خارج الدرس؟

الهدف العميق:
${goal}

--------------------

<div class="teacher-only">
بوصلة دور المعلم:
🟢 اترك الطلبة يبرّرون.
🟡 انتظر صمتًا تربويًا بعد السؤال.
🔴 لا تُسمِّ القاعدة مبكرًا.

نقطة القرار الواحدة:
قرار واحد فقط للحصة يُبرَّر جماعيًا.

اختبار الصمت:
صمت ٢٠ ثانية بعد السؤال الحاسم.

مؤشّر النجاح:
اختلاف التبريرات دون طلب الإجابة.
</div>
`;

  output.value = simulation.trim();
}

/* ===== العرض ===== */
function showTeacherView() {
  document.body.classList.remove("print-view");
}
function showPrintView() {
  document.body.classList.add("print-view");
}

/* ===== المدخلات ===== */
function subjectInput() {
  return subject.value || "غير محددة";
}
function gradeInput() {
  return grade.value || "غير محدد";
}
function lessonInput() {
  return lesson.value || "غير محدد";
}

/* ===== الحفظ والبحث ===== */
function saveSimulation() {
  if (!output.value) return alert("لا يوجد محتوى");
  const lib = JSON.parse(localStorage.getItem("simulations") || "[]");
  lib.push({
    time: new Date().toLocaleString(),
    subject: subject.value,
    grade: grade.value,
    lesson: lesson.value,
    text: output.value
  });
  localStorage.setItem("simulations", JSON.stringify(lib));
  alert("تم الحفظ ✅");
}

function searchLibrary() {
  const q = prompt("اكتب كلمة للبحث:");
  if (!q) return;
  const lib = JSON.parse(localStorage.getItem("simulations") || "[]");
  const results = lib.filter(x =>
    (x.text + x.subject + x.lesson).includes(q)
  );
  if (!results.length) return alert("لا نتائج");
  const list = results.map((e,i)=>`${i+1}) ${e.subject} | ${e.lesson}`).join("\n");
  const idx = prompt("النتائج:\n"+list+"\n\nاختر رقم:");
  if (results[idx-1]) output.value = results[idx-1].text;
}
</script>

</body>
</html>
