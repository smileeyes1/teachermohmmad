<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعم المعلّم – الإصدار النهائي</title>

<!-- تحميل OCR عند توفر إنترنت فقط -->
<script>
(function(){
  try{
    const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
    s.onload=()=>window.OCR_READY=true;
    s.onerror=()=>window.OCR_READY=false;
    document.head.appendChild(s);
  }catch(e){
    window.OCR_READY=false;
  }
})();
</script>

<style>
body{
  margin:0;
  font-family:Tahoma, Arial, sans-serif;
  background:#f4f6f8;
  padding:12px;
  line-height:1.8;
}
.card{
  background:#fff;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.12);
}
video,canvas{
  width:100%;
  border-radius:10px;
}
button,input[type=file]{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:8px;
  font-size:14px;
}
button{background:#1565c0;color:#fff}
.actions button{background:#455a64}
#lessonTitle{font-weight:bold;margin-bottom:6px}
#hint{font-size:13px;color:#555}
</style>
</head>

<body>

<!-- إدخال الدرس -->
<div class="card">
  <h3>📘 إدخال صفحة الدرس</h3>
  <button onclick="startCamera()">📸 استخدام الكاميرا الخلفية</button>
  <input type="file" accept="image/*" onchange="loadImage(event)">
  <div id="hint">
    • النظام يدعم الإنترنت وبدونه<br>
    • OCR يُستَخدم داخليًا ولا يُعرض النص الخام
  </div>
</div>

<!-- الكاميرا -->
<div class="card" id="cameraBox" style="display:none">
  <video id="video" autoplay playsinline></video>
  <button onclick="capture()">التقاط الصورة</button>
</div>

<!-- المعالجة -->
<div class="card">
  <canvas id="canvas"></canvas>
  <div id="lessonTitle">— لم يتم تحديد الدرس بعد —</div>
</div>

<!-- الأفعال -->
<div class="card actions" id="actions" style="display:none">
  <button onclick="prep()">📘 تحضير</button>
  <button onclick="sim()">🧪 محاكاة</button>
  <button onclick="obs()">📋 رصد</button>
</div>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const lessonTitle=document.getElementById("lessonTitle");
const actions=document.getElementById("actions");

let lessonName="اسم الدرس";

function startCamera(){
  document.getElementById("cameraBox").style.display="block";
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:{ideal:"environment"}},
    audio:false
  }).then(s=>video.srcObject=s)
    .catch(()=>alert("تعذّر تشغيل الكاميرا الخلفية"));
}

function capture(){
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  ctx.drawImage(video,0,0);
  processImage();
}

function loadImage(e){
  const img=new Image();
  img.onload=()=>{
    canvas.width=img.width;
    canvas.height=img.height;
    ctx.drawImage(img,0,0);
    processImage();
  };
  img.src=URL.createObjectURL(e.target.files[0]);
}

/* ===== الحاكم (Gatekeeper) ===== */

function gatekeeper(raw){
  if(!raw) return false;

  // طول غير منطقي
  if(raw.length > 40) return false;

  // تكرار حروف مبالغ فيه
  if(/(.)\1\1/.test(raw)) return false;

  // كثرة رموز غير عربية
  const clean = raw.replace(/[\u0600-\u06FF0-9\s]/g,"");
  if(clean.length > raw.length * 0.3) return false;

  return true;
}

function cleanTitle(t){
  return t.replace(/[^\u0600-\u06FF0-9\s]/g,"").trim();
}

function processImage(){
  actions.style.display="none";
  lessonTitle.textContent="⏳ تحديد اسم الدرس...";

  // قص أعلى 25% فقط
  const cropH=Math.floor(canvas.height*0.25);
  const crop=document.createElement("canvas");
  crop.width=canvas.width;
  crop.height=cropH;
  crop.getContext("2d").drawImage(
    canvas,0,0,canvas.width,cropH,0,0,canvas.width,cropH
  );

  // بدون إنترنت → اسم عام
  if(!window.OCR_READY || !window.Tesseract){
    lessonName="هذا الدرس";
    lessonTitle.textContent="📘 "+lessonName;
    actions.style.display="block";
    return;
  }

  // OCR انتقائي
  Tesseract.recognize(crop,"ara").then(res=>{
    const raw = (res.data.text || "").split("\n")[0] || "";
    const cleaned = cleanTitle(raw);

    if(gatekeeper(cleaned)){
      lessonName=cleaned;
    }else{
      lessonName="هذا الدرس";
    }

    lessonTitle.textContent="📘 "+lessonName;
    actions.style.display="block";
  }).catch(()=>{
    lessonName="هذا الدرس";
    lessonTitle.textContent="📘 "+lessonName;
    actions.style.display="block";
  });
}

/* ===== الدعم ===== */
function prep(){
  alert(
`تحضير مختصر – ${lessonName}
• بداية من المثال الأول
• مشاركة طالب واحد
• توقّف عند الفهم`
  );
}

function sim(){
  alert(
`محاكاة صفّية – ${lessonName}
1) عرض المثال
2) صمت
3) محاولة
4) انتهِ`
  );
}

function obs(){
  alert(
`قوائم رصد – ${lessonName}
☐ حاول
☐ شارك
☐ نطق الفكرة`
  );
}
</script>

</body>
</html>
