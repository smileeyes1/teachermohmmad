<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النظام السيادي لتحضير الحصة</title>

<style>
body{
  margin:0;
  padding:١٢px;
  font-family:Tahoma, Arial, sans-serif;
  background:#f0f3f7;
}
.container{
  max-width:٨٥٠px;
  margin:auto;
  background:#ffffff;
  padding:٢٠px;
  border-radius:١٤px;
  box-shadow:0 ٥px ١٥px rgba(0,0,0,.12);
}
header{
  text-align:center;
  margin-bottom:١٨px;
}
header h1{
  margin:٠;
  font-size:٢٢px;
  color:#١٥٦٥c٠;
}
header p{
  margin:٦px ٠ ٠;
  font-size:١٤.٥px;
}
label{
  display:block;
  font-weight:bold;
  margin-top:١٤px;
}
input,select,textarea,button{
  width:١٠٠%;
  margin-top:٦px;
  padding:١٤px;
  font-size:١٥px;
  border-radius:١٠px;
  border:١px solid #ccc;
  direction:rtl;
}
textarea{
  height:٤٨٠px;
  white-space:pre-wrap;
  line-height:١.٨;
}
button{
  margin-top:١٦px;
  background:#١٥٦٥c٠;
  color:#ffffff;
  border:none;
  font-size:١٦px;
  cursor:pointer;
}
button.secondary{
  background:#٤٥٥a٦٤;
}
button:active{opacity:.٨٥}
.notice{
  margin-top:١٠px;
  color:red;
  font-weight:bold;
}
.badge{
  margin-top:١٤px;
  padding:١٠px;
  text-align:center;
  background:#e٨f٥e٩;
  color:#١b٥e٢٠;
  border-radius:١٠px;
}
@media print{
  header,label,input,select,button,.notice,.badge{display:none}
  textarea{border:none;height:auto;font-size:١٤pt}
}
</style>
</head>

<body>

<div class="container">

<header>
  <h1>النظام السيادي لتحضير الحصة</h1>
  <p><b>محمد وجيه</b> — مدرسة <b>عاطوف المختلطة</b></p>
</header>

<label>المادة</label>
<select id="subject">
  <option>اللغة العربية</option>
  <option>الرياضيات</option>
</select>

<label>الصف</label>
<select id="grade">
  <option>الصف الأول</option>
  <option>الصف الثاني</option>
</select>

<label>عنوان الدرس</label>
<input id="lesson" placeholder="كما ورد في الكتاب">

<label>سؤال الحصة الواحد</label>
<input id="question">

<label>الفكرة المقفولة</label>
<input id="concept">

<label>مدة الحصة</label>
<select id="duration">
  <option value="٤٠">٤٠ دقيقة</option>
  <option value="٤٥">٤٥ دقيقة</option>
</select>

<button onclick="build()">✅ توليد الحصة</button>
<button class="secondary" onclick="test()">🧪 اختبار فوري</button>

<div id="err" class="notice"></div>

<div class="badge">
🛡️ التلميذ يفكّر — المعلّم يُدير الصمت
</div>

<textarea id="output" placeholder="سيظهر التحضير هنا..."></textarea>

</div>

<script>
function build(){
  const err = document.getElementById("err");
  const out = document.getElementById("output");
  err.textContent="";

  try{
    const subject  = document.getElementById("subject").value;
    const grade    = document.getElementById("grade").value;
    const lesson   = document.getElementById("lesson").value || "—";
    const question = document.getElementById("question").value.trim();
    const concept  = document.getElementById("concept").value.trim();
    const duration = document.getElementById("duration").value;

    if(!question || !concept){
      err.textContent="❌ يجب إدخال سؤال الحصة والفكرة المقفولة";
      return;
    }

    out.value =
`تحضير حصة صفّية سيادية

المدرسة: عاطوف المختلطة
المعلّم: محمد وجيه

المادة: ${subject}
الصف: ${grade}
الدرس: ${lesson}
المدة: ${duration} دقيقة

سؤال الحصة الواحد:
«${question}»

الفكرة المقفولة:
«${concept}»

بنية التنفيذ السيادي:
١) طرح السؤال فقط.
٢) مثال واحد من الكتاب.
٣) صمت مقصود للتفكير.
٤) تلميذ واحد ينطق الفكرة.
٥) تثبيت قصير ثم إغلاق.

مبدأ الحصة:
الصمت أداة.
التفكير هدف.
النطق دليل الفهم.
`;
  }catch(e){
    err.textContent="❌ خطأ تقني: "+e.message;
  }
}

function test(){
  document.getElementById("lesson").value="درس تجريبي";
  document.getElementById("question").value="ما الحرف الأول؟";
  document.getElementById("concept").value="الحرف الأول هو ب";
  build();
}
</script>

</body>
</html>
