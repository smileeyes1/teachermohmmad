<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النظام السيادي لتحضير الحصة</title>

<style>
:root{
  --main:#1565c0;
  --bg:#eef2f6;
  --card:#ffffff;
  --ink:#333;
}
body{
  margin:0;
  padding:١٢px;
  font-family: Tahoma, Arial, sans-serif;
  background:linear-gradient(135deg,#e3f2fd,#f1f8e9);
  color:var(--ink);
}
.container{
  max-width:٨٥٠px;
  margin:auto;
  background:var(--card);
  border-radius:١٦px;
  padding:٢٠px;
  box-shadow:0 ٦px ١٦px rgba(0,0,0,.12);
}
header{
  text-align:center;
  margin-bottom:٢٠px;
}
header h1{
  margin:٠;
  font-size:٢٢px;
  color:var(--main);
}
header .sub{
  margin-top:٦px;
  font-size:١٤.٥px;
  color:#٤٤٤;
}
label{
  display:block;
  margin-top:١٤px;
  font-weight:bold;
  font-size:١٥px;
}
input,select,textarea,button{
  width:١٠٠%;
  margin-top:٦px;
  padding:١٤px;
  font-size:١٥px;
  border-radius:١٠px;
  border:١px solid #ccc;
  direction:rtl;
}
textarea{
  height:٥٤٠px;
  resize:vertical;
  white-space:pre-wrap;
  line-height:١.٩;
}
.hint{
  margin-top:٦px;
  padding:٨px ١٠px;
  background:#f9fafb;
  border:١px dashed #ccc;
  border-radius:٨px;
  font-size:١٣.٥px;
  color:#٥٥٥;
}
.file-box{
  margin-top:١٢px;
  background:#f1f5ff;
  border:١px solid #c3d3ff;
  border-radius:١٠px;
  padding:١٢px;
}
.file-name{
  margin-top:٨px;
  font-size:١٤px;
  color:#0d47a1;
}
.actions{
  display:flex;
  gap:١٠px;
  margin-top:٢٠px;
}
button{
  flex:١;
  background:var(--main);
  color:#fff;
  border:none;
  font-size:١٦px;
  cursor:pointer;
}
button.secondary{
  background:#455a64;
}
button:active{opacity:.٨٥}
.badge{
  margin-top:١٦px;
  padding:١٠px;
  text-align:center;
  font-size:١٤.٥px;
  border-radius:١٠px;
  background:#e8f5e9;
  color:#1b5e20;
}
@media print{
  header,label,input,select,button,.hint,.badge,.file-box{display:none}
  textarea{border:none;height:auto;font-size:١٤pt}
}
</style>
</head>

<body>

<div class="container">

<header>
  <h1>النظام السيادي لتحضير الحصة</h1>
  <div class="sub">
    إعداد: <b>محمد وجيه</b> — مدرسة <b>عاطوف المختلطة</b>
  </div>
</header>

<label>المادة</label>
<select id="subject">
  <option>اللغة العربية</option>
  <option>الرياضيات</option>
</select>

<label>الصف</label>
<select id="grade">
  <option>الصف الأول</option>
  <option>الصف الثاني</option>
</select>

<label>عنوان الدرس</label>
<input id="lesson" placeholder="كما ورد في الكتاب">

<label>رفع ملف الكتاب (PDF أو صورة)</label>
<div class="file-box">
  <input type="file" id="bookFile" accept=".pdf,image/*" onchange="showFile()">
  <div id="fileName" class="file-name">لم يتم رفع ملف بعد</div>
  <div class="hint">
    الغرض تنظيمي فقط: استدعاء الكتاب بصريًا أثناء التحضير.
  </div>
</div>

<label>سؤال الحصة الواحد 🔒</label>
<input id="question" placeholder="سؤال واحد لا يتغير">

<label>الفكرة المقفولة 🔒</label>
<input id="concept" placeholder="جملة قصيرة سينطقها تلميذ">

<label>مدة الحصة</label>
<select id="duration">
  <option value="٤٠">٤٠ دقيقة</option>
  <option value="٤٥">٤٥ دقيقة</option>
</select>

<div class="actions">
  <button onclick="build()">✅ توليد الحصة</button>
  <button class="secondary" onclick="window.print()">🖨️ طباعة</button>
</div>

<div class="badge">
🛡️ التلميذ يفكّر — المعلّم يُدير الصمت
</div>

<textarea id="output" placeholder="ستظهر الحصة الجاهزة هنا..."></textarea>

</div>

<script>
function showFile(){
  const f = document.getElementById("bookFile").files[0];
  document.getElementById("fileName").textContent =
    f ? "📘 تم رفع الملف: " + f.name : "لم يتم رفع ملف بعد";
}

function build(){

  const subjectEl  = document.getElementById("subject");
  const gradeEl    = document.getElementById("grade");
  const lessonEl   = document.getElementById("lesson");
  const questionEl = document.getElementById("question");
  const conceptEl  = document.getElementById("concept");
  const durationEl = document.getElementById("duration");
  const bookFileEl = document.getElementById("bookFile");
  const out        = document.getElementById("output");

  const subject  = subjectEl.value;
  const grade    = gradeEl.value;
  const lesson   = lessonEl.value || "—";
  const question = questionEl.value.trim();
  const concept  = conceptEl.value.trim();
  const duration = durationEl.value;
  const file     = bookFileEl.files[0];

  if(!question || !concept){
    alert("سؤال الحصة والفكرة المقفولة عنصران إلزاميان");
    return;
  }

  out.value =
`تحضير حصة صفّية سيادية

المدرسة: عاطوف المختلطة
المعلّم: محمد وجيه

المادة: ${subject}
الصف: ${grade}
الدرس: ${lesson}
المدة: ${duration} دقيقة
الكتاب المرفق: ${file ? file.name : "غير مرفق"}

سؤال الحصة الواحد:
«${question}»

الفكرة المقفولة:
«${concept}»

بنية التنفيذ السيادي:
١) أطرح السؤال فقط دون شرح.
٢) مثال واحد من الكتاب.
٣) صمت مقصود للتفكير.
٤) تلميذ واحد ينطق الفكرة.
٥) تثبيت قصير ثم إغلاق.

مبدأ الحصة:
الصمت أداة.
التفكير جوهر.
النطق دليل الفهم.
`;
}
</script>

</body>
</html>
