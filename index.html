<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>محاكاة حصة صفية سيادية — النسخة النهائية</title>

<style>
/* ===== الأساس العام ===== */
body{
  font-family: Tahoma, Arial, sans-serif;
  background:#f2f4f7;
  margin:0;
  padding:12px;
}
.container{
  max-width:٨٤٠px;
  margin:auto;
  background:#ffffff;
  padding:١٦px;
  border-radius:١٢px;
  box-shadow:0 ٤px ١٠px rgba(0,0,0,.08);
}
h1{
  text-align:center;
  font-size:٢٠px;
  margin-bottom:١٤px;
}

/* ===== المدخلات ===== */
label{
  display:block;
  font-weight:bold;
  margin-top:١٢px;
  font-size:١٥px;
}
input, select, textarea, button{
  width:١٠٠٪;
  padding:١٤px;
  margin-top:٦px;
  font-size:١٥px;
  border-radius:١٠px;
  border:١px solid #ccc;
  direction:rtl;
}
textarea{
  resize:vertical;
  white-space:pre-wrap;
  line-height:١.٩;
}

/* ===== الأزرار ===== */
.actions{
  display:grid;
  grid-template-columns:١fr ١fr;
  gap:١٠px;
  margin:١٨px ٠;
}
button{
  border:none;
  background:#1976d2;
  color:#ffffff;
}
button.alt{background:#009688;}
button.warn{background:#f9a825; color:#000;}
button.dark{background:#455a64;}
button.danger{background:#d32f2f;}
button:active{opacity:.85}

/* ===== المؤشر ===== */
.badge{
  text-align:center;
  padding:٨px;
  border-radius:٨px;
  font-size:١٥px;
  margin-bottom:١٠px;
}
.green{background:#e8f5e9;color:#1b5e20;}
.yellow{background:#fff8e1;color:#7f6000;}
.red{background:#fde0dc;color:#b71c1c;}

/* ===== الإخراج ===== */
.output textarea{
  height:٥٨٠px;
  font-size:١٤.٥px;
}

/* ===== الطباعة ===== */
@media print{
  label,input,select,small,.actions,.badge{display:none}
  textarea{
    border:none;
    height:auto;
    font-size:١٤pt;
  }
}
small{
  display:block;
  font-size:١٣px;
  color:#555;
  margin-top:٤px;
}
</style>
</head>

<body>

<div class="container">
<h1>محاكاة حصة صفية سيادية</h1>

<label>المادة</label>
<input id="subject" placeholder="اللغة العربية / الرياضيات">

<label>الصف</label>
<input id="grade" placeholder="الصف الأول / الصف الثاني">

<label>عنوان الدرس</label>
<input id="lesson" placeholder="مثال: التنوين / الطرح ضمن ١٠">

<label>الهدف السلوكي (قابل للرصد)</label>
<input id="goal" placeholder="أن يختار / يحدد / يعلل مع سبب واحد">

<label>سؤال الحصة الواحد</label>
<input id="coreQuestion" placeholder="سؤال واحد فقط تُدار حوله الحصة">

<label>المفهوم المقفول</label>
<input id="lockedConcept" placeholder="مفهوم لا يُغادر قبل أن ينطقه طالب">

<label>مدة الحصة</label>
<select id="duration">
  <option value="٤٠">٤٠ دقيقة</option>
  <option value="٤٥">٤٥ دقيقة</option>
</select>

<label>نمط التنفيذ</label>
<select id="delivery">
  <option value="face">وجاهي</option>
  <option value="teams">عن بُعد</option>
</select>

<div class="actions">
  <button onclick="build()">🧠 إنشاء المحاكاة</button>
  <button class="alt" onclick="path('good')">🟢 تفاعل مرتفع</button>
  <button class="warn" onclick="path('mixed')">🟡 تفاعل متباين</button>
  <button class="danger" onclick="path('weak')">🔴 تعثّر</button>
  <button class="dark" onclick="silentCheck()">⏱️ فحص الصمت</button>
  <button onclick="window.print()">🖨️ طباعة</button>
</div>

<div id="gauge" class="badge green">🟢 توازن الحصة</div>

<div class="output">
<textarea id="out" placeholder="ستظهر محاكاة الحصة السيادية هنا..."></textarea>
</div>
</div>

<script>
/* ===== العناصر ===== */
const el=id=>document.getElementById(id);
const subject=el("subject"),
      grade=el("grade"),
      lesson=el("lesson"),
      goal=el("goal"),
      coreQuestion=el("coreQuestion"),
      lockedConcept=el("lockedConcept"),
      duration=el("duration"),
      delivery=el("delivery"),
      out=el("out"),
      gauge=el("gauge");

let built=false;
let talkRatio=0.٥;
let diversity=0.٥;

/* ===== إنشاء المحاكاة ===== */
function build(){
  if(!goal.value || !coreQuestion.value || !lockedConcept.value){
    alert("الهدف، سؤال الحصة، والمفهوم المقفول عناصر إلزامية");
    return;
  }
  built=true;

  out.value =
`محاكاة حصة صفية سيادية

المادة: ${subject.value||"—"}
الصف: ${grade.value||"—"}
الدرس: ${lesson.value||"—"}
المدة: ${duration.value} دقيقة
النمط: ${delivery.value==="face"?"وجاهي":"عن بُعد"}

الهدف السلوكي:
«${goal.value}»

سؤال الحصة الواحد:
«${coreQuestion.value}»

المفهوم المقفول:
«${lockedConcept.value}»

بنية التنفيذ السيادي:
١) طرح السؤال فقط — بلا شرح.
٢) مثال واحد من الكتاب.
٣) صمت مقصود (تفكير).
٤) طالب واحد ينطق بالمفهوم.
٥) تثبيت سريع دون إطالة.

قرار الحصة:
اطلب قرارًا واحدًا مع سبب واحد فقط.

ملاحظة سيادية للمعلم:
التفكير أهم من الإجابة.
الصمت أداة تعليم.
لا تسبق التلميذ.
`;
  updateGauge();
}

/* ===== مسارات التفاعل ===== */
function path(t){
  if(!built) return;
  diversity = {good:٠.٨, mixed:٠.٥, weak:٠.٢}[t];
  updateGauge();
}

/* ===== فحص الصمت ===== */
function silentCheck(){
  talkRatio = Math.max(٠, talkRatio - ٠.١);
  updateGauge();
}

/* ===== المؤشر ===== */
function updateGauge(){
  if(talkRatio<٠.٤ && diversity>٠.٦){
    gauge.textContent="🟢 توازن الحصة";
    gauge.className="badge green";
  }else if(talkRatio<٠.٧){
    gauge.textContent="🟡 قابل للتحسين";
    gauge.className="badge yellow";
  }else{
    gauge.textContent="🔴 اختلال";
    gauge.className="badge red";
  }
}
</script>

</body>
</html>
