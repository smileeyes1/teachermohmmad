<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النظام السيادي الذكي الشامل لدعم المعلّم</title>

<!-- ✅ تحميل صحيح ومحمي لـ Tesseract.js -->
https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.jsscript>

<!-- ✅ سياسة أمان مقتصدة -->
<meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        img-src 'self' data:;
        script-src 'self' https://cdn.jsdelivr.net;
        style-src 'self' 'unsafe-inline';
        base-uri 'none';
      ">

<style>
:root{
  --main:#0d47a1;
  --bg:#f4f6f8;
  --card:#ffffff;
  --ink:#222;
  --ok:#2e7d32;
  --warn:#777;
  --expert:#6a1b9a;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Tahoma,Arial,sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.8;
}

.app{
  max-width:900px;
  margin:auto;
  padding:16px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  box-shadow:0 6px 20px rgba(0,0,0,.1);
  margin-bottom:16px;
}

h1{text-align:center;color:var(--main)}
h3{margin-top:0}

button,input,select{
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:14px;
  font-size:16px;
}

button{
  background:var(--main);
  color:#fff;
  cursor:pointer;
}

button.ok{background:var(--ok)}
button.warn{background:var(--warn)}
button:disabled{opacity:.6;cursor:not-allowed}

.box{
  background:#fafafa;
  padding:16px;
  border-radius:14px;
  margin-top:12px;
  white-space:pre-wrap;
}

.expert{border-right:6px solid var(--expert)}
.hidden{display:none}

/* ✅ وضع الصف */
body.class-mode{
  background:#fff;
}
body.class-mode .card:not(#lessonCard){display:none}
body.class-mode h1{display:none}

/* ✅ مؤشّر تقدّم صامت */
.progress{
  height:8px;
  border-radius:8px;
  background:#e0e0e0;
  overflow:hidden;
  margin-top:8px;
}
.progress span{
  display:block;
  height:100%;
  width:0%;
  background:var(--main);
  transition:width .2s;
}
</style>
</head>

<body>

<div class="app">

<h1>النظام السيادي الذكي الشامل</h1>

<div class="card">
  <h3>📘 إدراج صفحة الدرس</h3>
  <input type="file" id="fileInput" accept="image/*" aria-label="تحميل صورة الدرس">
  <div class="progress"><span id="bar"></span></div>
  <div id="status" class="box">— بانتظار رفع الصورة —</div>
</div>

<div class="card hidden" id="lessonCard">
  <label for="duration">مدة الحصّة</label>
  <select id="duration">
    <option value="٣٠">٣٠ دقيقة</option>
    <option value="٤٠">٤٠ دقيقة</option>
    <option value="٤٥">٤٥ دقيقة</option>
  </select>

  <button class="ok" id="startBtn" disabled>▶ ابدأ الحصّة (أقل جهد)</button>
  <button class="warn" onclick="enterClassMode()">🎯 وضع الصف</button>
  <button class="warn" onclick="smartSilence()">🛑 لا تقترح شيئًا</button>

  <div id="prep" class="box"></div>
  <div id="sim" class="box"></div>
  <div id="expertBox" class="box expert"></div>
  <div id="support" class="box"></div>
</div>

</div>

<script>
/* ═══════════════════════════════
   الحارس التشغيلي السيادي
   ═══════════════════════════════ */
window.addEventListener("error", ()=>{
  const s=document.getElementById("status");
  if(s) s.textContent="⚠️ حدث خلل غير مؤذٍ — استخدم الصفحة كما هي وسؤال واحد كافٍ.";
});

/* ✅ حارس الجاهزية */
document.addEventListener("DOMContentLoaded", ()=>{
  const status=document.getElementById("status");
  if(typeof window.Tesseract==="undefined"){
    status.textContent="⚠️ مكوّن قراءة الصورة غير جاهز — أعد تحميل الصفحة.";
  }
});

/* ═══════════════════════════════
   المنطق التنفيذي
   ═══════════════════════════════ */
const $=id=>document.getElementById(id);
const state={
  text:"",
  lessonType:"استكشاف",
  coreQuestion:"ماذا لاحظت؟",
  attempts:٠,
  startTime:٠
};

const fileInput=$("fileInput"), status=$("status"), lessonCard=$("lessonCard");
const prep=$("prep"), sim=$("sim"), expertBox=$("expertBox"), support=$("support");
const startBtn=$("startBtn"), bar=$("bar"), duration=$("duration");

fileInput.addEventListener("change",handleImage);
startBtn.addEventListener("click",startLesson);

function normalizeArabic(t){
  return (t||"").replace(/[^\u0600-\u06FF\s]/g,"").replace(/\s+/g," ").trim();
}

function validImage(f){
  return f && /^image\//.test(f.type) && f.size<=٥*١٠٢٤*١٠٢٤;
}

async function handleImage(){
  const file=fileInput.files[٠];
  if(!validImage(file)){
    status.textContent="⚠️ ملف غير صالح — صورة فقط وبحجم آمن.";
    return;
  }

  status.textContent="🔍 جارٍ قراءة الصفحة…";
  bar.style.width="١٠%";
  startBtn.disabled=true;

  try{
    const res=await Tesseract.recognize(
      file,"ara",
      {logger:m=>{
        if(m.progress!=null){
          bar.style.width=Math.round(m.progress*٨٠+١٠)+"%";
        }
      }}
    );
    state.text=normalizeArabic(res.data.text);
    status.textContent=state.text
      ?"✅ تم استخراج النص من الصفحة"
      :"✅ صورة بلا نص — استخدم الصفحة كما هي";
  }catch{
    state.text="";
    status.textContent="✅ تعذّر الاستخراج — سؤال واحد كافٍ.";
  }finally{
    bar.style.width="١٠٠%";
    analyzeText();
    lessonCard.classList.remove("hidden");
    startBtn.disabled=false;
  }
}

function analyzeText(){
  const t=state.text;
  if(!t){
    state.lessonType="استكشاف";
    state.coreQuestion="ماذا ترى في الصفحة؟";
    return;
  }
  if(/جمع|طرح|احسب|يساوي|عدد/.test(t)){
    state.lessonType="رياضيات";
    state.coreQuestion="كيف توصلت إلى الناتج؟";
  }else if(/اقرأ|نص|كلمة|جملة/.test(t)){
    state.lessonType="لغة عربية";
    state.coreQuestion="ماذا فهمت من النص؟";
  }else{
    state.lessonType="استكشاف";
    state.coreQuestion="ماذا لاحظت في الصفحة؟";
  }
}

function startLesson(){
  startBtn.disabled=true;
  state.attempts=١;
  state.startTime=Date.now();

  prep.textContent=
`📘 التحضير التنفيذي:
نوع الدرس: ${state.lessonType}

ما يقوله المعلّم:
"انظروا إلى الصفحة."
«${state.coreQuestion}»
صمت. محاولة واحدة. توقّف.`;

  sim.textContent=
`🎬 المحاكاة الصفّية:
عرض المحتوى كما هو.
سؤال واحد.
صمت.
تثبيت.
إنهاء مبكر مسموح.`;

  expertBox.textContent=
`🧠 توصية الخبير:
لا تُضِف خارج الصفحة.
الإنهاء المبكر جودة.`;

  support.textContent=
`📊 الدعم:
المدة المختارة: ${duration.value} دقيقة
عدد المحاولات: ${state.attempts}

جملة رحيمة واحدة ثم التوقّف.`;
}

function smartSilence(){
  prep.textContent="✅ الصف يعمل.";
  sim.textContent="";
  expertBox.textContent="";
  support.textContent="";
}

function enterClassMode(){
  document.body.classList.toggle("class-mode");
}
</script>

</body>
</html>
