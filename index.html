<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مُعين المعلّم — عبء صفر</title>

<style>
:root{
  --main:#0d47a1;
  --ok:#2e7d32;
  --bg:#f4f6f8;
  --card:#ffffff;
  --soft:#e3f2fd;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Tahoma,Arial,sans-serif;
  background:var(--bg);
  line-height:1.9;
}
.app{
  max-width:900px;
  margin:auto;
  padding:20px;
}
.card{
  background:var(--card);
  padding:22px;
  border-radius:16px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
  margin-bottom:20px;
}
h1,h2{
  text-align:center;
  color:var(--main);
  margin:0 0 12px;
}
input,button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
}
button{
  background:var(--main);
  color:#fff;
  border:none;
}
button.ok{background:var(--ok)}
.box{
  background:var(--soft);
  padding:16px;
  border-radius:12px;
  white-space:pre-wrap;
}
.small{
  font-size:13px;
  color:#555;
  text-align:center;
}
</style>
</head>

<body>
<div class="app">

<div class="card">
<h1>📘 مُعين المعلّم</h1>
<p class="small">أداة تخفّف التفكير، لا تضيفه</p>
</div>

<div class="card">
<h2>اسم الدرس</h2>
<input id="lesson" placeholder="مثال: الجمع حتى ١٠">
<button class="ok" onclick="autoBuild()">ابدأ الحصّة</button>
</div>

<div class="card">
<h2>🧭 التحضير الجاهز</h2>
<div id="prep" class="box"></div>
<button onclick="copyText('prep')">📋 نسخ التحضير</button>
</div>

<div class="card">
<h2>🎭 سير الحصة</h2>
<div id="sim" class="box"></div>
<button class="ok" onclick="closeLesson()">نُطقت الفكرة — أُغلقت الحصة</button>
</div>

<div class="card">
<h2>📋 رصد مهني خفيف</h2>
<div class="box">
☐ حاول  
☐ تردّد  
☐ نطق الفكرة  
☐ احتاج دعم خفيف
</div>
<p class="small">للتوثيق المهني فقط — بلا تقييم</p>
</div>

</div>

<script>
function autoBuild(){
  const l = lesson.value || "—";
  prep.innerText =
`التحضير التنفيذي

الدرس: ${l}

الفكرة:
فهم الفكرة الأساسية للدرس من خلال مثال واحد فقط.

السؤال:
ماذا نلاحظ هنا؟

التسلسل:
١) عرض هادئ
٢) طرح السؤال
٣) صمت واعٍ
٤) محاولة
٥) تثبيت
٦) إغلاق`;

  sim.innerText =
`المعلم يعرض المثال.
يطرح السؤال.
(صمت)

طالب يحاول…

عند نطق الفكرة:
✅ تُغلق الحصة فورًا دون شرح إضافي.`;
}

function closeLesson(){
  sim.innerText += "\n\n⛔ تم الإغلاق المهني — لا يُستكمل الشرح.";
}

function copyText(id){
  navigator.clipboard.writeText(document.getElementById(id).innerText);
}
</script>

</body>
</html>
