<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محرك المحاكاة الصفّية التربوية – النسخة النهائية</title>

<!--
© جميع الحقوق محفوظة – استخدام تعليمي غير تجاري
مشروع: محرك المحاكاة الصفّية التربوية
نسخة مستقلة محلية بدون API أو إنترنت
-->

<style>
body{
  font-family: Tahoma, Arial, sans-serif;
  background:#f4f6f8;
  margin:0; padding:16px; direction:rtl;
}
.container{
  background:#fff;
  max-width:1000px;
  margin:auto;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 8px rgba(0,0,0,.1);
}
h1,h2{
  text-align:center;
}
label{
  font-weight:bold;
  display:block;
  margin-top:10px;
}
input, textarea, select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:15px;
  direction:rtl;
  text-align:right;
}
textarea{
  resize:vertical;
}
.actions{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:16px 0;
}
button{
  padding:12px;
  font-size:15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#1976d2;
  color:#fff;
}
button.secondary{background:#455a64;}
button.alt{background:#009688;}
button.warn{background:#ffa000;}
button.danger{background:#d32f2f;}
button:hover{opacity:.9;}

.output textarea{
  height:600px;
  white-space:pre-wrap;
  font-size:14.5px;
  line-height:1.8;
}

/* إرشاد المعلم */
.teacher-only{
  background:#eef3f8;
  border-right:4px solid #1976d2;
  padding:10px;
  margin-top:12px;
}
.print-view .teacher-only{display:none;}

/* طباعة عربية صحيحة */
@media print{
  .actions,label,input,select{display:none !important;}
  .container{box-shadow:none;}
  .output textarea{
    border:none;
    height:auto;
    font-size:14pt;
    line-height:1.9;
  }
}
</style>
</head>

<body>

<div class="container">
<h1>محرك محاكاة الحصة الصفّية التربوية</h1>

<label>المادة</label>
<input id="subject" placeholder="رياضيات – علوم – لغة عربية">

<label>الصف</label>
<input id="grade" placeholder="الثاني – الخامس">

<label>الدرس / المفهوم</label>
<input id="lesson" placeholder="المقارنة بين عددين – الجملة الاسمية">

<label>مدة الحصة</label>
<select id="duration">
  <option value="40">٤٠ دقيقة</option>
  <option value="45">٤٥ دقيقة</option>
</select>

<label>نمط التنفيذ</label>
<select id="delivery">
  <option value="face">وجاهي داخل الصف</option>
  <option value="teams">عبر Microsoft Teams</option>
</select>

<label>نوع المحاكاة</label>
<select id="mode">
  <option value="engine">محاكاة تعليمية منظمة</option>
  <option value="classroom">محاكاة حصة صفية واقعية متعددة المسارات</option>
</select>

<div class="actions">
  <button onclick="build()">🧠 إنشاء المحاكاة</button>
  <button class="secondary" onclick="teacherView()">👩‍🏫 عرض المعلم</button>
  <button class="secondary" onclick="printView()">🧾 عرض الطباعة</button>
  <button class="alt" onclick="startTimer()">⏱️ بدء مؤقّت الحصة</button>
  <button class="alt" onclick="scenario('good')">🟢 متفاعلون</button>
  <button class="warn" onclick="scenario('mixed')">🟡 مختلفون</button>
  <button class="danger" onclick="scenario('weak')">🔴 متعثرون</button>
  <button onclick="window.print()">🖨️ طباعة / حفظ PDF</button>
</div>

<h2>ناتج المحاكاة</h2>
<div class="output">
<textarea id="out"></textarea>
</div>

<h2>🧠 انعكاس ما بعد الحصة</h2>
<textarea id="reflection" placeholder="
• ماذا نجح؟
• أين تدخّلت أكثر من اللازم؟
• ما الذي سأغيّره في الحصة القادمة؟
"></textarea>
<button onclick="saveReflection()">💾 حفظ الانعكاس</button>

</div>

<script>
let lessonText="";
let timerStarted=false;

/* إنشاء المحاكاة */
function build(){
  const subject=val("subject","غير محددة");
  const grade=val("grade","غير محدد");
  const lesson=val("lesson","غير محدد");
  const minutes=duration.value;
  const delivery=delivery.value;
  const mode=mode.value;

  const timePlan = minutes=="40"
    ? "• تمهيد: 5د\n• نقاش وتحليل: 15د\n• تحوّل مفاهيمي: 8د\n• تطبيق: 7د\n• إغلاق: 5د"
    : "• تمهيد: 7د\n• نقاش وتحليل: 18د\n• تحوّل مفاهيمي: 8د\n• تطبيق: 7د\n• إغلاق: 5د";

  const deliveryGuide = delivery=="face"
    ? "• استخدم الصمت بعد السؤال\n• راقب لغة الجسد\n• اسمح بالحوار الحر"
    : "• حدد زمن التفكير (٣٠ ثانية)\n• الرد عبر الشات\n• استخدم غرف فرعية";

  if(mode=="engine"){
    lessonText = `
محاكاة تعليمية منظمة

المادة: ${subject}
الصف: ${grade}
الدرس: ${lesson}

1) افتراض حدسي:
فهم أولي بسيط. لماذا يبدو صحيحًا؟

2) موقف كاشف:
إظهار قصور الفهم.

3) قرار واحد فقط للحصة:
تفسير واحد يُبرَّر جماعيًا.

4) التحول المفاهيمي:
التركيز على الجوهر لا الشكل.

5) تطبيق + نقل تعلم.

${timePlan}

<div class="teacher-only">
إرشاد المعلم:
${deliveryGuide}
</div>
`.trim();
  } else {
    lessonText = `
محاكاة حصة صفية واقعية متعددة المسارات

المادة: ${subject}
الصف: ${grade}
الدرس: ${lesson}
مدة الحصة: ${minutes} دقيقة
نمط التنفيذ: ${delivery=="face"?"وجاهي":"Teams"}

الفتح:
سؤال واقعي دون شرح.

🔀 المسارات المحتملة:
• إجابة صحيحة → اسأل عن التعميم
• اختلاف → اطلب التفكيك
• خطأ واسع → استخدم تمثيلًا حسيًا

نقطة القرار:
قرار واحد للحصة مع تبرير.

اختبار الصمت:
٢٠ ثانية بعد السؤال الحاسم.

${timePlan}

<div class="teacher-only">
إرشاد التنفيذ:
${deliveryGuide}

مؤشر النجاح:
اختلاف التبرير دون طلب الإجابة.
</div>
`.trim();
  }

  out.value = lessonText;
}

/* مؤقّت الحصة */
function startTimer(){
  if(!timerStarted){
    timerStarted=true;
    alert("⏱️ ابدأ متابعة الزمن حسب التقسيم المقترح.\nانتقل كل 5–10 دقائق تربويًا.");
  }
}

/* تبديل المسار أثناء الحصة */
function scenario(type){
  if(type=="good"){
    out.value += "\n\n✅ الطلبة متفاعلون:\n• قدّم مثالًا أعمق\n• لا تسمِّ القاعدة سريعًا";
  }
  if(type=="mixed"){
    out.value += "\n\n🟡 اختلاف في التبرير:\n• اطلب التفكيك\n• امنع الحل السريع";
  }
  if(type=="weak"){
    out.value += "\n\n🔴 تعثّر عام:\n• تمثيل حسي\n• تبسيط السؤال";
  }
}

/* عرض */
function teacherView(){document.body.classList.remove("print-view");}
function printView(){document.body.classList.add("print-view");}

/* حفظ الانعكاس */
function saveReflection(){
  const r=reflection.value;
  if(!r)return alert("لا يوجد انعكاس مكتوب");
  const L=JSON.parse(localStorage.getItem("reflections")||"[]");
  L.push({time:new Date().toLocaleString(),text:r});
  localStorage.setItem("reflections",JSON.stringify(L));
  alert("✅ تم حفظ الانعكاس التربوي");
}

/* مساعدة */
function val(id,def){return document.getElementById(id).value||def;}
</script>

</body>
</html>
