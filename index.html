<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الخبير التربوي المرافق — سريع ومضمون (النسخة المصححة)</title>

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.7.2/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
:root{--main:#0d47a1;--ok:#2e7d32;--warn:#455a64;--bg:#f4f6f8;--card:#ffffff;--ink:#222;--soft:#e3f2fd}
*{box-sizing:border-box}
body{margin:0;font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.85}
.app{max-width:1000px;margin:auto;padding:16px}
.header{background:var(--card);padding:24px 20px;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);text-align:center;margin-bottom:20px}
.card{background:var(--card);padding:20px;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);margin-bottom:20px}
h1,h3{margin:0 0 12px;text-align:center;color:var(--main)}
input,button{width:100%;padding:16px;margin-top:12px;border:none;border-radius:14px;font-size:17px}
button{background:var(--main);color:#fff;cursor:pointer}
button.ok{background:var(--ok)}
button.warn{background:var(--warn)}
button.ghost{background:#eef2f7;color:#111}
button.reset{background:#d32f2f;color:#fff}
button:disabled{opacity:.6;cursor:not-allowed}
.box{background:var(--soft);padding:16px;border-radius:14px;margin-top:12px;white-space:pre-wrap;font-size:15.5px}
.progress{height:10px;background:#ddd;border-radius:8px;overflow:hidden;margin:16px 0}
.progress span{display:block;height:100%;width:0%;background:var(--main);transition:.4s}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.badges span{background:#eef2f7;border-radius:999px;padding:8px 14px;font-size:14px}
.small{font-size:13.5px;color:#6b7280;text-align:center}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <p>بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</p>
  <h1>الخبير التربوي المرافق</h1>
  <p class="small">المنهاج الفلسطيني • قراءة سريعة ومضمونة • PDF + Word + PPTX + صور</p>
</div>

<div class="card">
  <h3>📄 رفع الملفات (حتى 3 ملفات)</h3>
  <button id="uploadBtn" class="ok">📤 رفع ملف (PDF • DOCX • PPTX • صور)</button>
  <input id="fileInput" type="file" accept=".pdf,.docx,.pptx,image/*" multiple style="display:none">
  <button id="resetBtn" class="reset">إعادة تعيين جميع الملفات</button>
  
  <div class="badges" id="filesList"></div>
  <div class="progress"><span id="bar"></span></div>
  <div id="status" class="box">— بانتظار رفع الملفات —</div>
  
  <button id="startBtn" class="ok" disabled>ابدأ القراءة السريعة والدقيقة</button>
  <button id="showTextBtn" class="ghost" style="display:none;margin-top:8px">عرض النص المستخرج الكامل</button>
</div>

<div class="card">
  <h3>🧭 التحضير التنفيذي العميق (المنهاج الفلسطيني)</h3>
  <div id="idea" class="box">🔹 الفكرة ستظهر هنا</div>
  <div id="question" class="box">❓ السؤال سيظهر هنا</div>
  <div id="prep" class="box"></div>
  <button id="buildBtn" class="ok" disabled>أنشئ التحضير العميق</button>
</div>

<div class="card">
  <h3>🎛️ الرادار الصفّي</h3>
  <button class="warn" onclick="support('🛑 صمت مهني مُدار')">صمت مهني</button>
  <button class="ghost" onclick="support('🔁 ارجع للسؤال الواحد')">ارجع للسؤال</button>
  <button class="ok" onclick="closeSession()">✅ أُغلِقت الحصة</button>
  <button class="ghost" onclick="window.print()">🖨️ طباعة</button>
  <div id="support" class="box"></div>
</div>

</div>

<script>
// ================== تهيئة pdf.js worker (مهم جداً لتجنب الأخطاء) ==================
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.js';

// ================== متغيرات ==================
const uploadBtn = document.getElementById("uploadBtn");
const fileInput = document.getElementById("fileInput");
const resetBtn = document.getElementById("resetBtn");
const showTextBtn = document.getElementById("showTextBtn");
const bar = document.getElementById("bar");
const statusBox = document.getElementById("status");
const filesList = document.getElementById("filesList");
const startBtn = document.getElementById("startBtn");
const buildBtn = document.getElementById("buildBtn");

let files = [];
let fullText = "";
let worker = null;
let isClosed = false;
let currentIdea = "";
let currentQuestion = "";

// ================== رفع الملفات ==================
uploadBtn.onclick = () => fileInput.click();

fileInput.onchange = () => {
  if (fileInput.files.length > 0) {
    files = Array.from(fileInput.files).slice(0, 3);
    updateUI();
  }
};

resetBtn.onclick = () => {
  files = [];
  fullText = "";
  updateUI();
  statusBox.textContent = "— تم إعادة التعيين —";
  startBtn.disabled = true;
  buildBtn.disabled = true;
  showTextBtn.style.display = "none";
};

function updateUI() {
  filesList.innerHTML = "";
  files.forEach((f, i) => {
    const span = document.createElement("span");
    span.textContent = `\( {f.name} ( \){(f.size/1024/1024).toFixed(1)} MB)`;
    filesList.appendChild(span);
  });
  statusBox.textContent = `✅ تم اختيار ${files.length}/3 ملفات`;
  startBtn.disabled = files.length === 0;
}

// ================== بدء القراءة السريعة مع حماية ==================
startBtn.onclick = async () => {
  if (files.length === 0 || isClosed) return;

  // حماية حجم الملف
  const MAX_SIZE = 30 * 1024 * 1024; // 30 ميجا
  if (files.some(f => f.size > MAX_SIZE)) {
    statusBox.textContent = "⚠️ أحد الملفات كبير جداً (أكثر من 30 ميجا). يرجى تقليل الحجم.";
    return;
  }

  bar.style.width = "5%";
  statusBox.textContent = "🔍 جارٍ استخراج النص بسرعة وأمان...";
  startBtn.disabled = true;
  fullText = "";

  const timeout = (ms) => new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout")), ms));

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const ext = file.name.split('.').pop().toLowerCase();
    let extracted = "لم يتم استخراج نص.";

    try {
      const promise = (ext === "pdf") ? extractFromPDFFast(file) :
                      (ext === "docx") ? extractFromDOCX(file) :
                      (file.type.startsWith("image/")) ? extractFromImageFast(file) : 
                      Promise.resolve("نوع الملف غير مدعوم.");

      extracted = await Promise.race([promise, timeout(45000)]); // timeout 45 ثانية
    } catch (e) {
      extracted = `خطأ في معالجة ${file.name} — تم تخطيه.`;
      console.error(e);
    }

    fullText += `--- \( {file.name} ---\n \){extracted}\n\n`;
    bar.style.width = Math.round(((i+1)/files.length)*100) + "%";
  }

  bar.style.width = "100%";
  statusBox.textContent = "✅ تم استخراج النص بنجاح وبدون أخطاء";
  showTextBtn.style.display = "block";
  buildBtn.disabled = false;
  analyzeContent();
};

// ================== الدوال المحسنة ==================
async function extractFromPDFFast(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(item => item.str).join(" ") + "\n\n";
  }
  return text || "لم يتم استخراج نص من PDF.";
}

async function extractFromDOCX(file) {
  const arrayBuffer = await file.arrayBuffer();
  const result = await mammoth.extractRawText({arrayBuffer});
  return result.value || "لم يتم استخراج نص من Word.";
}

async function extractFromImageFast(file) {
  if (!worker) {
    worker = await Tesseract.createWorker('ara', 1, {
      logger: m => { if (m.status === 'recognizing text') console.log(m.progress); }
    });
  }
  const result = await worker.recognize(file);
  return result.data.text || "لم يتم التعرف على نص في الصورة.";
}

function analyzeContent() {
  const text = fullText.toLowerCase();
  let idea = "استكشاف محتوى الملف المرفوع";
  let q = "ماذا يتحدث عنه هذا الدرس في الكتاب؟";

  if (/جمع|طرح|احسب|عدد|مثلث|دائرة/.test(text)) {
    idea = "ربط العمليات الحسابية والأشكال بالمحتوى";
    q = "كيف نحل المسألة باستخدام ما في الصفحة؟";
  } else if (/حرف|كلمة|قصة|لغتنا الجميلة/.test(text)) {
    idea = "تعلم الحروف والكلمات من نصوص الكتاب";
    q = "ما الفكرة الرئيسية في النص؟";
  }

  currentIdea = idea;
  currentQuestion = q;

  document.getElementById("idea").textContent = `🔹 الفكرة: ${idea}`;
  document.getElementById("question").textContent = `❓ السؤال: ${q}`;
}

buildBtn.onclick = () => {
  if (isClosed) return;
  const prepHTML = `
<strong>التحضير التنفيذي العميق — المنهاج الفلسطيني</strong><br><br>
<strong>الفكرة:</strong> ${currentIdea}<br><br>
<strong>السؤال:</strong> ${currentQuestion}<br><br>
<strong>سيناريو الحصة:</strong><br>
1. عرض المحتوى من الملف.<br>
2. طرح السؤال.<br>
3. صمت واعٍ (١٥-٢٥ ثانية).<br>
4. مشاركة الطلاب (محاولة واحدة).<br>
5. تلخيص وإغلاق الحصة بهدوء.
  `;
  document.getElementById("prep").innerHTML = prepHTML;
};

showTextBtn.onclick = () => alert("النص الكامل المستخرج:\n\n" + fullText);

function support(msg) { if (!isClosed) document.getElementById("support").textContent = msg; }
function closeSession() {
  isClosed = true;
  statusBox.textContent = "✅ تم إغلاق الحصة";
  startBtn.disabled = buildBtn.disabled = true;
}
</script>
</body>
</html>
