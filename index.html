<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار Gemini</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:16px }
.container { background:#fff; max-width:640px; margin:auto; padding:20px; border-radius:10px }
label { font-weight:bold; margin-top:10px; display:block }
input, textarea, select { width:100%; padding:10px; margin-top:6px }
button { margin-top:16px; width:100%; padding:12px; font-size:18px }
textarea { height:380px; white-space:pre-wrap }
</style>
</head>

<body>

<div class="container">
<h2>اختبار Gemini البسيط</h2>

<label>المادة</label>
<input id="subject" value="رياضيات">

<label>الدرس</label>
<input id="lesson" value="المقارنة بين عددين">

<button onclick="generate()">اختبار الإرسال</button>

<label>الناتج</label>
<textarea id="output">لم يتم الإرسال بعد</textarea>
</div>

<script>
const GEMINI_API_KEY = "AIzaSyDVHQUv74yz3p65aeKlcTgvLZ30yC8wu14";

async function generate() {
  const output = document.getElementById("output");
  output.value = "🔄 يتم الإرسال...";

  const prompt = `
اكتب فقرة تربوية قصيرة تشرح درس:
${document.getElementById("lesson").value}
بأسلوب بسيط.
`;

  try {
    const res = await fetch(
      "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash-latest:generateContent?key=" + GEMINI_API_KEY,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [
            { role: "user", parts: [{ text: prompt }] }
          ]
        })
      }
    );

    const data = await res.json();
    output.value = "📥 تم استلام الرد:\n\n" + JSON.stringify(data, null, 2);

    if (data.candidates && data.candidates[0]?.content?.parts?.[0]?.text) {
      output.value = data.candidates[0].content.parts[0].text;
    }

  } catch (e) {
    output.value = "❌ خطأ تقني:\n" + e.message;
  }
}
</script>

</body>
</html>
