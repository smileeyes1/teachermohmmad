<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=١.٠">
<title>النظام التربوي — أداة دعم المعلّم</title>

<style>
:root{
  --main:#1a5fb4;
  --bg:#f2f4f7;
  --card:#ffffff;
  --soft:#eef2f6;
  --ink:#1f2933;
  --muted:#6b7280;
  --primary:#1a5fb4;
  --success:#2e7d32;
  --warn:#f9a825;
}

*{box-sizing:border-box}

body{
  margin:٠;
  font-family:Tahoma, Arial, sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:١.٨;
}

.app{
  max-width:١٠٨٠px;
  margin:٢٠px auto;
  padding:٢٠px;
}

.header{
  background:var(--card);
  padding:٢٠px;
  border-radius:١٤px;
  text-align:center;
  margin-bottom:٢٠px;
  box-shadow:٠ ٦px ٢٠px rgba(٠,٠,٠,.٠٧);
}

.header h١{
  margin:٠;
  font-size:٢٤px;
  color:var(--primary);
}

.header p{
  margin:٨px ٠ ٠;
  font-size:١٤px;
  color:var(--muted);
}

.section{
  background:var(--card);
  border-radius:١٤px;
  padding:٢٠px;
  margin-bottom:٢٠px;
  box-shadow:٠ ٤px ١٦px rgba(٠,٠,٠,.٠٦);
}

.grid{
  display:grid;
  grid-template-columns:١fr ١fr;
  gap:١٦px;
}

h٢{
  font-size:١٨px;
  margin:٠ ٠ ١٢px;
}

label{
  display:block;
  margin-top:١٢px;
  font-size:١٤px;
  font-weight:bold;
}

input, textarea{
  width:١٠٠%;
  margin-top:٦px;
  padding:١٠px;
  border-radius:١٠px;
  border:١px solid #d1d5db;
  font-size:١٥px;
}

input:focus, textarea:focus{
  outline:none;
  border-color:var(--primary);
}

.note{
  background:#fef9e7;
  padding:٨px ١٠px;
  border-radius:٨px;
  font-size:١٣px;
  margin-top:١٠px;
  color:#7f6000;
}

.actions{
  display:flex;
  flex-wrap:wrap;
  gap:١٠px;
  margin-top:١٦px;
}

button{
  padding:١٠px ١٤px;
  border-radius:١٠px;
  border:none;
  cursor:pointer;
  font-size:١٤px;
  color:#fff;
}

.btn-main{background:var(--primary)}
.btn-soft{background:#4b5563}
.btn-warn{background:var(--warn);color:#000}
.btn-success{background:var(--success)}

textarea#output{
  min-height:٤٨٠px;
  background:#fafafa;
  white-space:pre-wrap;
  line-height:١.٩;
}

.run{
  background:var(--soft);
  padding:١٦px;
  border-radius:١٢px;
}

#log{
  background:#fff;
  padding:١٠px;
  border-radius:٨px;
  margin-top:٨px;
  min-height:١٤٠px;
  white-space:pre-wrap;
  font-size:١٤px;
}

.footer{
  text-align:center;
  font-size:١٣px;
  color:var(--muted);
  margin-top:٢٠px;
}

@media (max-width:٩٠٠px){
  .grid{grid-template-columns:١fr}
}

@media print{
  button,.actions,.run,.footer{display:none}
  textarea#output{border:none}
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<h١>أداة دعم المعلّم</h١>
<p>تنظيم الحصّة الواحدة بهدوء — دون إنهاك</p>
</div>

<div class="section">
<h٢>اعتماد المنهاج</h٢>

<div class="grid">
<div>
<label>الصف</label>
<input id="grade">

<label>المادة</label>
<input id="subject">

<label>عنوان الدرس</label>
<input id="lesson">
</div>

<div>
<label>رفع الكتاب</label>
<input type="file" id="bookFile">
<div id="bookInfo" class="note">لم يتم اعتماد الكتاب.</div>

<label>مرجعية الصفحة / الوحدة</label>
<input id="bookRef">
</div>
</div>
</div>

<div class="section">
<h٢>جوهر الحصّة</h٢>

<label>الهدف السلوكي</label>
<input id="goal">

<label>سؤال الحصّة</label>
<input id="question">

<label>الفكرة المقفولة</label>
<input id="concept">

<div class="note">🎯 نطق الفكرة ثم التوقّف = تعلّم</div>
</div>

<div class="section">
<h٢>الإخراج</h٢>

<div class="actions">
<button class="btn-main" onclick="makePrep()">تحضير حصّة</button>
<button class="btn-soft" onclick="makePlan()">خطة</button>
<button class="btn-soft" onclick="makeObservation()">رصد</button>
<button class="btn-soft" onclick="makeTreatment()">دعم</button>
<button class="btn-soft" onclick="simulate()">محاكاة</button>
<button class="btn-warn" onclick="window.print()">طباعة</button>
</div>

<textarea id="output" readonly placeholder="المخرجات تظهر هنا..."></textarea>
</div>

<div class="section run">
<strong>أثناء الحصّة</strong>
<div class="actions">
<button class="btn-main" onclick="act('طُرح السؤال')">اطرح السؤال</button>
<button class="btn-soft" onclick="act('صمت')">صمت</button>
<button class="btn-warn" onclick="act('ارجع للسؤال')">ارجع</button>
<button class="btn-success" onclick="closeLesson()">نُطقت الفكرة</button>
</div>
<div id="log">سجل التنفيذ:</div>
</div>

<div class="footer">
أداة دعم مهني — لا تقييم، لا محاسبة
</div>

</div>

<script>
const $=id=>document.getElementById(id);
let closed=false;

$("bookFile").onchange=e=>{
 const f=e.target.files[0];
 $("bookInfo").textContent=f?`✅ تم اعتماد: ${f.name}`:"لم يتم اعتماد الكتاب.";
};

function makePrep(){
 $("output").value=
`تحضير حصّة

المادة: ${$("subject").value}
الصف: ${$("grade").value}
المرجع: ${$("bookRef").value}

الهدف:
${$("goal").value}

السؤال:
${$("question").value}

الفكرة:
${$("concept").value}

الخطوات:
- سؤال
- صمت
- نطق
- توقّف`;
}

function makePlan(){ $("output").value+="\n\nخطة:\n- حصّة = فكرة"; }
function makeObservation(){ $("output").value+="\n\nرصد:\n[ ] حاول\n[ ] نطق"; }
function makeTreatment(){ $("output").value+="\n\nدعم:\n- صمت\n- تشجيع"; }
function simulate(){ $("output").value+=`\n\nمحاكاة:\nسؤال → نطق: ${$("concept").value}`; }

function act(msg){
 if(closed)return;
 $("log").textContent+=`\n• ${msg}`;
}

function closeLesson(){
 closed=true;
 $("log").textContent+="\n• انتهت الحصّة";
}
</script>

</body>
</html>
