<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>دعم المعلّم – تصميم متقدّم (بدون OCR / API)</title>

<style>
:root{
  --bg:#f4f6f8;
  --card:#ffffff;
  --primary:#١٥٦٥c٠;
  --accent:#455a64;
  --muted:#6b7280;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Tahoma, Arial, sans-serif;
  background:var(--bg);
  padding:١٢px;
  line-height:١.٨;
}
.card{
  background:var(--card);
  padding:١٤px;
  border-radius:١٢px;
  box-shadow:٠ ٤px ١٢px rgba(٠,٠,٠,.١٢);
  margin-bottom:١٢px;
}
header{
  display:flex;gap:٨px;align-items:center;justify-content:space-between
}
h1{font-size:١٦px;margin:٠}
small{color:var(--muted)}
video,canvas,img{width:١٠٠%;border-radius:١٠px}
button,input[type=file]{
  width:١٠٠%;
  padding:١٠px;
  border:none;
  border-radius:٨px;
  margin-top:٨px;
  font-size:١٤px;
}
button.primary{background:#1565c0;color:#fff}
button.secondary{background:var(--accent);color:#fff}
.actions button{background:var(--accent)}
hr{border:none;border-top:١px solid #e٥e٧eb;margin:١٢px ٠}
#lessonTitle{font-weight:bold;margin:٦px ٠}
#status{color:var(--muted);font-size:١٣px}
.hidden{display:none}
.layout{display:grid;grid-template-columns:١fr;gap:١٢px}
@media(min-width:٨٠٠px){
  .layout{grid-template-columns:١fr ١fr}
}
</style>
</head>

<body>

<div class="card">
  <header>
    <h1>📘 دعم المعلّم</h1>
    <small>واجهة صفّية هادئة</small>
  </header>
  <p id="status">اختر طريقة إدخال صفحة الدرس.</p>
</div>

<div class="layout">

  <!-- الإدخال -->
  <div class="card">
    <button class="primary" onclick="startCamera()">📸 استخدام الكاميرا الخلفية</button>
    <input type="file" accept="image/*" onchange="loadImage(event)" />
    <p id="note" style="color:#6b7280;font-size:١٣px;margin:٨px ٠ ٠">
      لا يُعرض أي نص آلي. الصورة مرجع بصري فقط.
    </p>
  </div>

  <!-- العرض -->
  <div class="card">
    <div id="cameraBox" class="hidden">
      <video id="video" autoplay playsinline></video>
      <button class="secondary" onclick="capture()">التقاط الصورة</button>
    </div>
    <canvas id="canvas" class="hidden"></canvas>
    <div id="lessonTitle">— هذا الدرس —</div>
    <small>جاهز لتقديم الدعم دون تشويش.</small>
  </div>

</div>

<!-- الأفعال -->
<div class="card actions hidden" id="actions">
  <button onclick="prep()">📘 تحضير</button>
  <button onclick="sim()">🧪 محاكاة صفّية</button>
  <button onclick="obs()">📋 قوائم رصد</button>
</div>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const cameraBox=document.getElementById("cameraBox");
const actions=document.getElementById("actions");
const lessonTitle=document.getElementById("lessonTitle");
const status=document.getElementById("status");

let lessonName="هذا الدرس";

// تشغيل الكاميرا الخلفية
function startCamera(){
  cameraBox.classList.remove("hidden");
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:{ideal:"environment"}},
    audio:false
  }).then(s=>{
    video.srcObject=s;
    status.textContent="تم تشغيل الكاميرا الخلفية.";
  }).catch(()=>{
    status.textContent="تعذّر تشغيل الكاميرا. يمكنك رفع صورة.";
  });
}

// التقاط صورة
function capture(){
  canvas.classList.remove("hidden");
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  ctx.drawImage(video,0,0);
  finalize();
}

// تحميل صورة
function loadImage(e){
  const img=new Image();
  img.onload=()=>{
    canvas.classList.remove("hidden");
    canvas.width=img.width;
    canvas.height=img.height;
    ctx.drawImage(img,0,0);
    finalize();
  };
  img.src=URL.createObjectURL(e.target.files[0]);
}

function finalize(){
  // ✅ حاكم بصري: لا OCR، اسم عام ثابت
  lessonName="هذا الدرس";
  lessonTitle.textContent="📘 "+lessonName;
  actions.classList.remove("hidden");
  status.textContent="تم تثبيت سياق الدرس. اختر نوع الدعم.";
}

// الدعم
function prep(){
  alert(
`تحضير مختصر – ${lessonName}
• ابدأ بالمثال الأوّل.
• مشاركة قصيرة لطالب واحد.
• توقّف عند الفهم.`
  );
}
function sim(){
  alert(
`محاكاة صفّية – ${lessonName}
١) عرض سريع
٢) صمت
٣) محاولة طالب
٤) انتهِ`
  );
}
function obs(){
  alert(
`قوائم رصد – ${lessonName}
☐ حاول
☐ شارك
☐ احتاج دعم`
  );
}
</script>

</body>
</html>
