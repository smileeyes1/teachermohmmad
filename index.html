<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مُعين المعلّم — Teacher Companion</title>

<style>
:root{
  --main:#0d47a1;
  --accent:#2e7d32;
  --bg:#f4f6f8;
  --card:#ffffff;
  --soft:#e3f2fd;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Tahoma,Arial,sans-serif;
  background:var(--bg);
  line-height:1.9;
}
.app{
  max-width:960px;
  margin:auto;
  padding:20px;
}
.card{
  background:var(--card);
  border-radius:16px;
  padding:24px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
  margin-bottom:20px;
}
h1,h2{
  text-align:center;
  color:var(--main);
  margin:0 0 12px;
}
input,textarea,button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
}
button{
  background:var(--main);
  color:#fff;
  border:none;
  cursor:pointer;
}
button.ok{
  background:var(--accent);
}
.box{
  background:var(--soft);
  padding:16px;
  border-radius:12px;
  white-space:pre-wrap;
}
.small{
  font-size:13.5px;
  color:#555;
  text-align:center;
  margin-top:8px;
}
.checklist label{
  display:block;
  margin:8px 0;
  font-size:15px;
}
</style>
</head>

<body>
<div class="app">

<div class="card">
<h1>📘 مُعين المعلّم</h1>
<p class="small">أداة مهنية لتنظيم الدرس وإغلاقه بهدوء</p>
</div>

<div class="card">
<h2>اسم الدرس</h2>
<input id="lesson" placeholder="مثال: الجمع حتى ١٠">
</div>

<div class="card">
<h2>الفكرة المركزية</h2>
<input id="idea" placeholder="ما الفكرة الواحدة التي ستُبنى عليها الحصة؟">
</div>

<div class="card">
<h2>السؤال المحوري</h2>
<input id="question" placeholder="سؤال واحد يفتح الفكرة">
</div>

<div class="card">
<h2>🧭 التحضير التنفيذي</h2>
<button class="ok" onclick="buildPrep()">إنشاء التحضير</button>
<div id="prep" class="box"></div>
<button onclick="copyText('prep')">📋 نسخ التحضير</button>
</div>

<div class="card">
<h2>🎭 محاكاة الحصة</h2>
<button class="ok" onclick="buildSim()">تشغيل المحاكاة</button>
<div id="sim" class="box"></div>
</div>

<div class="card">
<h2>📋 قائمة رصد خفيفة</h2>
<div class="checklist">
<label><input type="checkbox"> حاول</label>
<label><input type="checkbox"> تردّد</label>
<label><input type="checkbox"> نطق الفكرة</label>
<label><input type="checkbox"> احتاج دعم خفيف</label>
</div>
<p class="small">⚠️ للاستخدام المهني فقط — بلا تقييم أو مقارنة</p>
</div>

</div>

<script>
function buildPrep(){
  const l=document.getElementById("lesson").value;
  const i=document.getElementById("idea").value;
  const q=document.getElementById("question").value;
  document.getElementById("prep").innerText=
`التحضير التنفيذي

الدرس: ${l}

الفكرة:
${i}

السؤال:
${q}

التسلسل:
١) عرض هادئ
٢) سؤال واحد
٣) صمت واعٍ
٤) محاولة
٥) تثبيت وإغلاق`;
}

function buildSim(){
document.getElementById("sim").innerText=
`المعلم يطرح السؤال.
(صمت)

طالب يحاول…
المعلم ينتظر.

عند نطق الفكرة:
✅ تُغلق الحصة بهدوء.`;
}

function copyText(id){
  navigator.clipboard.writeText(
    document.getElementById(id).innerText
  );
}
</script>

</body>
</html>
