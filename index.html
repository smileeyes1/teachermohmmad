<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحضير الدرس من الكتاب</title>

https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.jsscript>

<style>
body{
  font-family:Tahoma,Arial,sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:20px;
}
.card{
  background:#fff;
  border-radius:14px;
  padding:20px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
  margin-bottom:20px;
}
h1,h3{
  color:#0d47a1;
  text-align:center;
}
input,button{
  width:100%;
  padding:14px;
  margin-top:10px;
  font-size:16px;
}
button{
  background:#2e7d32;
  color:#fff;
  border:none;
  border-radius:10px;
}
.box{
  background:#e3f2fd;
  padding:16px;
  border-radius:12px;
  white-space:pre-wrap;
}
.small{
  font-size:13px;
  color:#555;
  text-align:center;
}
</style>
</head>

<body>

<div class="card">
<h1>تحضير الدرس من الكتاب</h1>
<p class="small">يركّز على النص الأصلي — بلا افتراضات</p>
</div>

<div class="card">
<h3>اسم الدرس</h3>
<input id="lessonName" placeholder="مثال: الجمع حتى ١٠">
</div>

<div class="card">
<h3>صفحة الدرس (صورة أفضل)</h3>
<input type="file" id="pageFile" accept="image/*">
<button onclick="readPage()">أنشئ التحضير من الكتاب</button>
</div>

<div class="card">
<h3>النص المستخرج</h3>
<div id="extracted" class="box">—</div>
</div>

<div class="card">
<h3>التحضير الناتج</h3>
<div id="prep" class="box">—</div>
<button onclick="copyPrep()">نسخ التحضير</button>
</div>

<script>
async function readPage(){
  const file = document.getElementById("pageFile").files[0];
  if(!file) return;

  extracted.innerText = "جارٍ القراءة...";
  const result = await Tesseract.recognize(file,"ara");
  const text = result.data.text.trim();
  extracted.innerText = text || "لم يُستخرج نص واضح.";

  buildPrepFromText(text);
}

function buildPrepFromText(text){
  if(text.length < 20){
    prep.innerText =
"تعذّر بناء تحضير موثوق من الصفحة.\nيرجى اختيار صفحة أوضح.";
    return;
  }

  const firstLine = text.split("\n").find(l => l.length > 10) || "";
  const idea = firstLine.slice(0,60);

  prep.innerText =
`التحضير التنفيذي

الدرس: ${lessonName.value}

الفكرة المستخلصة من الصفحة:
${idea}

السؤال المحوري:
ماذا نلاحظ في هذا المثال؟

خطوات التنفيذ:
١) عرض الصفحة من الكتاب
٢) صمت واعٍ
٣) محاولة من الطلبة
٤) تثبيت الفكرة
٥) إغلاق الحصة عند النطق`;
}

function copyPrep(){
  navigator.clipboard.writeText(prep.innerText);
}
</script>

</body>
</html>
