<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>التحضير السيادي للحصة</title>

<meta name="description" content="نظام تحضير سيادي للحصص الصفية، يحمي التفكير، ويعزّز التعلّم العميق.">

<style>
:root{
  --main:#2c7be5;
  --dark:#1a4fa0;
  --bg:#f4f6f8;
  --text:#222;
  --danger:#c0392b;
  --soft:#f0f3f7;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  font-family:"Tahoma",Arial,sans-serif;
  color:var(--text);
}

.container{
  max-width:٧٢٠px;
  margin:٢٠px auto;
  background:#fff;
  padding:٢٠px;
  border-radius:١٢px;
  box-shadow:٠ ٤px ١٠px rgba(٠,٠,٠,٠.٠٨);
}

h1{
  margin-top:٠;
  text-align:center;
  color:#٢c٣e٥٠;
}

label{
  display:block;
  margin-top:١٥px;
  font-weight:bold;
}

input,textarea{
  width:١٠٠٪;
  padding:١٠px;
  margin-top:٥px;
  border-radius:٨px;
  border:١px solid #ccc;
  font-size:١٥px;
}

textarea{resize:vertical}

button{
  margin-top:٢٠px;
  width:١٠٠٪;
  background:var(--main);
  color:#fff;
  border:none;
  padding:١٢px;
  border-radius:١٠px;
  font-size:١٦px;
  cursor:pointer;
}

button:hover{background:var(--dark)}

.file-box{
  margin-top:١٠px;
  background:var(--soft);
  padding:١٠px;
  border-radius:٨px;
  font-size:١٤px;
}

#err{
  margin-top:١٠px;
  color:var(--danger);
  font-weight:bold;
}

#output{
  margin-top:٢٠px;
  height:٢٨٠px;
  font-family:"Courier New",monospace;
  background:#fafafa;
}

small{
  color:#٦٦٦;
  display:block;
  margin-top:٥px;
}

.footer-note{
  margin-top:١٠px;
  text-align:center;
  font-size:١٢px;
  color:#٨٨٨;
}
</style>
</head>

<body>

<div class="container">
<h1>التحضير السيادي للحصة</h1>

<label>المادة</label>
<input id="subject" placeholder="مثال: اللغة العربية">

<label>الصف</label>
<input id="grade" placeholder="مثال: الأول">

<label>اسم الدرس</label>
<input id="lesson">

<label>مدة الحصة (بالدقائق)</label>
<input id="duration" inputmode="numeric">

<label>سؤال الحصة الواحد *</label>
<input id="question" placeholder="سؤال يفتح التفكير…">

<label>الفكرة المقفولة *</label>
<input id="concept" placeholder="خلاصة واحدة لا تُكسر">

<label>ملف الكتاب (PDF أو صورة)</label>
<input type="file" id="bookFile" accept=".pdf,image/*">
<small>📎 الملف اختياري – لا يتم رفعه للإنترنت</small>

<div id="fileName" class="file-box">لم يتم إرفاق ملف</div>

<div id="err"></div>

<button onclick="build()">بناء التحضير السيادي</button>

<textarea id="output" readonly placeholder="سيظهر التحضير هنا…"></textarea>

<div class="footer-note">
هذا التحضير يحمي الصمت، ويُقدّس التفكير، ويمنح الطفل أمان النطق.
</div>

</div>

<script>
"use strict";

/* عناصر */
const $ = id => document.getElementById(id);
const fileInput = $("bookFile");
const errBox = $("err");
const fileBox = $("fileName");
const output = $("output");

/* تعقيم نصي */
function safe(text){
  return text.replace(/[<>]/g,"");
}

/* خطأ */
function error(msg){
  errBox.textContent = msg;
}

/* ملف */
fileInput.addEventListener("change",()=>{
  fileBox.textContent="لم يتم إرفاق ملف";
  errBox.textContent="";
  const f=fileInput.files[٠];
  if(!f)return;

  const valid=f.type==="application/pdf"||f.type.startsWith("image/");
  if(!valid){
    fileInput.value="";
    return error("❌ نوع الملف غير مدعوم");
  }

  const size=(f.size/١٠٢٤/١٠٢٤).toFixed(٢);
  fileBox.innerHTML=`📘 ${safe(f.name)} — ${size} MB`;
});

/* بناء */
function build(){
  errBox.textContent="";

  const question=safe($("question").value.trim());
  const concept=safe($("concept").value.trim());

  if(!question||!concept)
    return error("❌ السؤال والفكرة المقفولة إلزاميان");

  const subject=safe($("subject").value)||"—";
  const grade=safe($("grade").value)||"—";
  const lesson=safe($("lesson").value)||"—";
  const duration=safe($("duration").value)||"—";
  const file=fileInput.files[٠];

  output.value=`
تحضير حصة صفّية سيادية

المدرسة: عاطوف المختلطة
المعلّم: محمد وجيه

المادة: ${subject}
الصف: ${grade}
الدرس: ${lesson}
المدة: ${duration} دقيقة

ملف الكتاب:
${file ? `${safe(file.name)}` : "غير مرفق"}

سؤال الحصة الواحد:
«${question}»

الفكرة المقفولة:
«${concept}»

بنية التنفيذ:
١) سؤال واحد
٢) مثال واحد
٣) صمت مقصود
٤) نطق طفل واحد
٥) تثبيت ثم إغلاق

مبدأ الحصة:
الصمت أداة
التفكير غاية
النطق دليل
`.trim();
}
</script>

</body>
</html>
