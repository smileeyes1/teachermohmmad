<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محاكاة حصة صفية تربوية – نموذج متكامل</title>

<style>
body{
  font-family: Tahoma, Arial, sans-serif;
  background:#f4f6f8;
  margin:0; padding:16px; direction:rtl;
}
.container{
  background:#fff; max-width:900px; margin:auto; padding:20px;
  border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,.1);
}
h1{ text-align:center; margin-bottom:16px; }
label{ font-weight:bold; display:block; margin-top:10px; }

input, textarea, select{
  width:100%; padding:10px; margin-top:6px;
  border-radius:6px; border:1px solid #ccc;
  font-size:15px; direction:rtl; text-align:right;
}
textarea{ resize:vertical; }

.actions{
  display:flex; flex-wrap:wrap; gap:8px; margin:16px 0;
}
button{
  padding:12px; font-size:15px; border:none; border-radius:6px;
  cursor:pointer; background:#1976d2; color:#fff;
}
button.secondary{ background:#455a64; }
button.alt{ background:#009688; }
button:hover{ opacity:.9; }

.output textarea{
  height:540px; white-space:pre-wrap;
  font-size:14.5px; line-height:1.7;
}

/* إرشاد المعلم */
.teacher-only{
  background:#eef3f8; border-right:4px solid #1976d2;
  padding:10px; margin-top:12px;
}

/* وضع الطباعة */
.print-view .teacher-only{ display:none; }

@media print{
  body{ background:#fff; margin:0; }
  .actions, input, select, label{ display:none !important; }
  .container{ box-shadow:none; max-width:100%; padding:10mm 12mm; }
  .output textarea{
    border:none; height:auto; font-size:14pt; line-height:1.8;
  }
}
</style>
</head>

<body>

<div class="container">
<h1>محاكاة حصة صفية تربوية</h1>

<label>المادة</label>
<input id="subject" placeholder="رياضيات – علوم – لغة عربية">

<label>الصف</label>
<input id="grade" placeholder="الثاني – الخامس">

<label>الدرس / المفهوم</label>
<input id="lesson" placeholder="المقارنة بين عددين – الجملة الاسمية">

<label>مدة الحصة</label>
<select id="duration">
  <option value="40">٤٠ دقيقة</option>
  <option value="45">٤٥ دقيقة</option>
</select>

<label>نمط التنفيذ</label>
<select id="delivery">
  <option value="face">وجاهي داخل الصف</option>
  <option value="teams">عبر Microsoft Teams</option>
</select>

<div class="actions">
  <button onclick="build()">🧠 إنشاء محاكاة الحصة</button>
  <button class="secondary" onclick="teacherView()">👩‍🏫 عرض المعلم</button>
  <button class="secondary" onclick="printView()">🧾 عرض الطباعة</button>
  <button onclick="window.print()">🖨️ طباعة / حفظ PDF</button>
</div>

<div class="output">
<label>ناتج المحاكاة</label>
<textarea id="out"></textarea>
</div>
</div>

<script>
function build(){
  const subject = val("subject","غير محددة");
  const grade   = val("grade","غير محدد");
  const lesson  = val("lesson","غير محدد");
  const minutes = document.getElementById("duration").value;
  const mode    = document.getElementById("delivery").value;

  const timePlan = minutes=="40"
  ? "• تمهيد: 5د\n• نقاش وتحليل: 15د\n• تحويل مفاهيمي: 8د\n• تطبيق: 7د\n• إغلاق: 5د"
  : "• تمهيد: 7د\n• نقاش وتحليل: 18د\n• تحويل مفاهيمي: 8د\n• تطبيق: 7د\n• إغلاق: 5د";

  const deliveryGuide = mode=="face"
  ? "• استخدم الصمت بعد الأسئلة.\n• راقب لغة الجسد.\n• اسمح بالحوار المباشر."
  : "• حدّد زمن التفكير (30 ثانية).\n• اسمح بالرد عبر الدردشة.\n• استخدم غرف فرعية إن أمكن.";

  document.getElementById("out").value = `
محاكاة حصة صفية واقعية قابلة للتنفيذ

المادة: ${subject}
الصف: ${grade}
الدرس: ${lesson}
مدة الحصة: ${minutes} دقيقة
نمط التنفيذ: ${mode=="face"?"وجاهي":"عبر Teams"}

① تمهيد الحصة:
طرح سؤال واقعي مرتبط بالمفهوم دون شرح.

② مراقبة استجابات الطلبة:
➤ إن كانت الإجابات صحيحة: اسأل عن التعميم.
➤ إن اختلفوا: اطلب التفكيك.
➤ إن أخطأ أغلبهم: استخدم تمثيلًا حسيًا دون تصحيح مباشر.

③ نقطة القرار الواحدة:
اتفاق الصف على تفسير واحد فقط مع تبرير.

④ التحول المفاهيمي:
توجيه النقاش نحو جوهر الفكرة قبل التسمية.

⑤ التطبيق:
مثال جديد يطبّقه الطلبة فرديًا أو جماعيًا.

⑥ اختبار الصمت:
بعد السؤال الختامي، التزم بصمت 20 ثانية.

إطار زمني مقترح:
${timePlan}

<div class="teacher-only">
إرشاد للمعلم حسب نمط التنفيذ:
${deliveryGuide}

مؤشر نجاح الحصة:
عندما يختلف الطلبة في السبب لا في النتيجة،
ودون طلب الإجابة منك.
</div>
`.trim();
}

/* أدوات */
function val(id,def){ return document.getElementById(id).value || def; }
function teacherView(){ document.body.classList.remove("print-view"); }
function printView(){ document.body.classList.add("print-view"); }
</script>

</body>
</html>
