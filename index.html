<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الدعم التربوي الخبير — نسخة سيادية</title>

<style>
:root{
  --main:#1565c0;
  --bg:#f4f6f8;
  --card:#ffffff;
  --ink:#222;
  --muted:#6b7280;
  --ok:#2e7d32;
  --alt:#455a64;
  --expert:#6a1b9a;
  --soft:#eef2f6;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Tahoma,Arial,sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.9;
}
.app{
  max-width:1200px;
  margin:auto;
  padding:16px;
}
.card{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
  margin-bottom:16px;
}
.header{text-align:center}
.header h1{margin:0;color:var(--main)}
.header p{margin-top:6px;color:var(--muted);font-size:14px}

button,input[type=file],select{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  font-size:15px;
}
button{background:var(--main);color:#fff;cursor:pointer}
button.alt{background:var(--alt)}
button.ok{background:var(--ok)}
button.expert{background:var(--expert)}

.buttons{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px;
  margin-top:12px;
}

.output,.log,.expertBox{
  background:#fafafa;
  padding:16px;
  border-radius:14px;
  white-space:pre-wrap;
  margin-top:12px;
  font-size:14px;
}
.expertBox{
  border-right:5px solid var(--expert);
}

.badge{
  display:inline-block;
  padding:6px 12px;
  border-radius:12px;
  font-size:13px;
}
.b-before{background:#eee}
.b-mid{background:#fff3cd}
.b-ok{background:#e8f5e9;color:var(--ok)}

.hidden{display:none}

@media print{
  button,input,select,.buttons{display:none}
  body{background:#fff}
  .output,.log,.expertBox{font-size:14pt}
}
</style>
</head>

<body>

<div class="app">

<div class="card header">
  <h1>نظام الدعم التربوي الخبير</h1>
  <p>خبير صامت — تدخّل محسوب — حماية المعلّم قبل الإنجاز</p>
</div>

<!-- إدخال الدرس -->
<div class="card">
  <h2>📘 إدخال صفحة الدرس</h2>
  <input type="file" accept="image/*">
  <select id="level">
    <option>الصف الأوّل</option>
    <option>الصف الثاني</option>
    <option>الصف الثالث</option>
  </select>
</div>

<!-- الدعم -->
<div class="card">
  <div id="status" class="badge b-before">❌ لم تبدأ الحصّة</div>

  <div class="buttons">
    <button onclick="prep()">📘 تحضير</button>
    <button onclick="simulate()">🧪 محاكاة</button>
    <button class="ok" onclick="startLesson()">▶ بدء الحصّة</button>
    <button class="expert" onclick="expert()">🧠 استشارة خبير تربوي</button>
  </div>

  <div id="output" class="output hidden"></div>
  <div id="expertBox" class="expertBox hidden"></div>
</div>

<!-- الحصّة -->
<div class="card hidden" id="live">
  <h2>🧭 الحصّة المباشرة</h2>

  <div class="buttons">
    <button onclick="act('طُرح السؤال')">اطرح السؤال</button>
    <button class="alt" onclick="act('صمت')">صمت</button>
    <button onclick="act('محاولة')">محاولة</button>
    <button class="ok" onclick="finish()">✅ نُطقت الفكرة</button>
  </div>

  <div id="log" class="log">سجل الحصّة:</div>
</div>

</div>

<script>
const output=document.getElementById("output");
const expertBox=document.getElementById("expertBox");
const live=document.getElementById("live");
const log=document.getElementById("log");
const status=document.getElementById("status");
const level=document.getElementById("level");

let closed=false;
let expertIndex=0;

const expertMessages={
  قبل:[
    "ركّز على فكرة واحدة فقط. هذا كافٍ تربويًا.",
    "إن شعرت أن التحضير طويل، قصّه للنصف.",
    "الوضوح أهم من الكم، خصوصًا في " // يُستكمل بالصف
  ],
  أثناء:[
    "اترك التلميذ يحاول دون تصويب فوري.",
    "الصمت هنا يعمل لصالح التعلّم.",
    "محاولة واحدة صادقة أفضل من ثلاث مكرّرة."
  ],
  بعد:[
    "ما تحقق اليوم كافٍ. التوقّف قرار مهني.",
    "ما لم يكتمل يُؤجَّل دون قلق.",
    "استقرارك أهم من إكمال النشاط."
  ]
};

function show(text){
  output.textContent=text;
  output.classList.remove("hidden");
}

function prep(){
  show("تحضير مختصر:\n• فكرة واحدة\n• سؤال واحد\n• محاولة واحدة\n• توقّف عند الفهم");
}

function simulate(){
  show("محاكاة:\nعرض → صمت → محاولة → تثبيت → نهاية");
}

function startLesson(){
  live.classList.remove("hidden");
  log.textContent="سجل الحصّة:";
  status.className="badge b-mid";
  status.textContent="🟡 الحصّة قائمة";
}

function act(t){
  if(closed)return;
  log.textContent+="\n• "+t;
}

function finish(){
  if(closed)return;
  closed=true;
  status.className="badge b-ok";
  status.textContent="✅ نُطقت الفكرة";
  log.textContent+="\n• نُطقت الفكرة — انتهت الحصّة";
  expertBox.classList.remove("hidden");
  expertBox.textContent="🧠 الخبير التربوي:\n"+expertMessages.بعد[Math.floor(Math.random()*expertMessages.بعد.length)];
}

function expert(){
  const pool = !live.classList.contains("hidden")
    ? expertMessages.أثناء
    : expertMessages.قبل;

  expertBox.classList.remove("hidden");
  expertBox.textContent =
    "🧠 الخبير التربوي:\n" +
    (pool[expertIndex%pool.length] +
     (expertIndex===0 ? (" "+level.value) : ""));
  expertIndex++;
}
</script>

</body>
</html>
