<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النظام التربوي الحكيم</title>

<style>
/* =====================
   الهوية البصرية
===================== */
:root{
  --primary:#0d47a1;
  --primary-soft:#e3f2fd;
  --background:#f6f8fb;
  --surface:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
  --success:#2e7d32;
  --warning:#f9a825;
  --danger:#c62828;
  --border:#e5e7eb;
  --radius:14px;
  --shadow:0 8px 24px rgba(0,0,0,.08);
  --transition:.25s ease;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Segoe UI",Tahoma,Arial,sans-serif;
  background:var(--background);
  color:var(--text);
  line-height:1.7;
}

/* =====================
   الحاوية العامة
===================== */
.app{
  max-width:1200px;
  margin:auto;
  padding:16px;
}

/* =====================
   الرأس
===================== */
.header{
  background:var(--surface);
  border-radius:var(--radius);
  padding:16px 20px;
  box-shadow:var(--shadow);
  text-align:center;
}

.header h1{
  margin:0;
  color:var(--primary);
  font-size:1.4rem;
}

.header p{
  margin:6px 0 0;
  font-size:.95rem;
  color:var(--muted);
}

/* =====================
   الشبكة الرئيسية
===================== */
.main{
  margin-top:16px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

/* =====================
   البطاقات
===================== */
.card{
  background:var(--surface);
  border-radius:var(--radius);
  padding:16px;
  box-shadow:var(--shadow);
}

.card h2{
  margin-top:0;
  font-size:1.05rem;
  color:var(--primary);
}

/* =====================
   المدخلات
===================== */
label{
  display:block;
  margin-top:10px;
  font-weight:600;
  font-size:.9rem;
}

input, textarea, button{
  width:100%;
  margin-top:6px;
  padding:10px;
  font-size:.95rem;
  border:1px solid var(--border);
  border-radius:10px;
  transition:var(--transition);
}

input:focus, textarea:focus{
  outline:none;
  border-color:var(--primary);
  background:#fafcff;
}

textarea{resize:vertical}

/* =====================
   الملاحظات
===================== */
.note{
  margin-top:10px;
  padding:10px;
  background:var(--primary-soft);
  border-radius:10px;
  font-size:.85rem;
  color:#0b3c88;
}

/* =====================
   شريط الإرشاد
===================== */
.guide{
  position:sticky;
  top:0;
  margin:16px 0;
  padding:12px;
  background:var(--primary);
  color:#fff;
  text-align:center;
  border-radius:12px;
  font-size:.9rem;
  z-index:10;
  box-shadow:var(--shadow);
}

/* =====================
   الأزرار
===================== */
.actions{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:12px;
}

button{
  cursor:pointer;
  border:none;
  color:#fff;
  background:var(--primary);
}

button.secondary{background:#455a64}
button.success{background:var(--success)}
button.warning{background:var(--warning);color:#000}
button.danger{background:var(--danger)}

button:hover{
  opacity:.9;
}

/* =====================
   الإخراج
===================== */
.output{
  margin-top:16px;
}

#output{
  height:420px;
  white-space:pre-wrap;
  background:#fafafa;
}

/* =====================
   وضع التشغيل
===================== */
.run{
  margin-top:16px;
  background:var(--surface);
  padding:16px;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}

.log{
  margin-top:10px;
  padding:10px;
  background:#fafafa;
  border-radius:10px;
  min-height:120px;
  font-size:.9rem;
}

/* =====================
   التوافق مع الشاشات
===================== */
@media (max-width:900px){
  .main{grid-template-columns:1fr}
  .actions{grid-template-columns:1fr 1fr}
}

@media (max-width:500px){
  .actions{grid-template-columns:1fr}
  .header h1{font-size:1.2rem}
}

/* =====================
   الطباعة
===================== */
@media print{
  .header,.guide,.actions,.run,input,button,textarea:not(#output){display:none}
  #output{border:none;height:auto;font-size:14pt}
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <h1>النظام التربوي الحكيم</h1>
    <p>إدارة حصص واقعية تدعم المعلّم نفسيًا ومهنيًا دون ضغط</p>
  </div>

  <div class="guide" id="guide">
    الإرشاد اللحظي: ابدأ بسؤال واحد واترك الصمت يعمل.
  </div>

  <div class="main">

    <div class="card">
      <h2>اعتماد المنهاج</h2>
      <label>رفع الكتاب</label>
      <input type="file" id="book">
      <label>المادة</label>
      <input id="subject">
      <label>الصف</label>
      <input id="grade">
      <div class="note" id="bookInfo">
        الكتاب هو المرجع الكامل — التنفيذ يتم حصّة بحصّة.
      </div>
    </div>

    <div class="card">
      <h2>جوهر الحصّة</h2>
      <label>سؤال الحصّة</label>
      <input id="question">
      <label>الفكرة المقفولة</label>
      <input id="concept">
      <div class="note">
        نطق الفكرة = اكتمال الحصّة + توقّف فوري.
      </div>
    </div>

  </div>

  <div class="actions">
    <button onclick="prep()">تحضير</button>
    <button class="secondary" onclick="simulate()">محاكاة</button>
    <button class="warning" onclick="window.print()">طباعة</button>
  </div>

  <div class="output">
    <textarea id="output" readonly></textarea>
  </div>

  <div class="run">
    <h3>وضع التنفيذ</h3>
    <div class="actions">
      <button onclick="act('طرح السؤال')">اطرح السؤال</button>
      <button class="secondary" onclick="act('صمت')">صمت</button>
      <button class="success" onclick="closeLesson()">نُطقت الفكرة</button>
    </div>
    <div class="log" id="log"></div>
  </div>

</div>

<script>
const g=m=>document.getElementById("guide").textContent="الإرشاد اللحظي: "+m;

function prep(){
  g("حضّر بهدوء. فكرة واحدة تكفي.");
  output.value=
`تحضير حصّة واقعية

المادة: ${subject.value}
الصف: ${grade.value}

سؤال الحصّة:
${question.value}

الفكرة المقفولة:
${concept.value}

خطوات:
- طرح السؤال
- صمت واعٍ
- نطق
- توقّف`;
}

function simulate(){
  g("هذه محاكاة لا تفترض المثالية.");
  output.value+=
`\n\nمحاكاة:
سؤال
صمت
تردّد
نطق:
${concept.value}
إغلاق`;
}

function act(t){
  log.textContent+="\n• "+t;
}
function closeLesson(){
  g("توقّف الآن. التعلم حدث.");
  log.textContent+="\n• انتهت الحصّة";
}
</script>

</body>
</html>
