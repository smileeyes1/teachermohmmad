<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محاكاة حصة صفية جاهزة للتنفيذ</title>

<style>
body{
  font-family: Tahoma, Arial, sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:16px;
  direction:rtl;
}
.container{
  background:#fff;
  max-width:900px;
  margin:auto;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 8px rgba(0,0,0,.1);
}
h1{text-align:center;margin-bottom:12px;}
label{font-weight:bold;margin-top:10px;display:block;}
input,select,textarea{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:15px;
  direction:rtl;
}
textarea{resize:vertical;}
.actions{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:16px 0;
}
button{
  padding:12px;
  font-size:15px;
  border:none;
  border-radius:6px;
  background:#1976d2;
  color:#fff;
  cursor:pointer;
}
button.alt{background:#009688;}
button.warn{background:#ffa000;}
button.danger{background:#d32f2f;}
button:hover{opacity:.9;}
.output textarea{
  height:600px;
  white-space:pre-wrap;
  font-size:14.5px;
  line-height:1.8;
}
small{color:#555;}
@media print{
  .actions,label,input,select,small{display:none}
  .container{box-shadow:none}
  textarea{border:none;height:auto;font-size:14pt}
}
</style>
</head>

<body>

<div class="container">
<h1>محاكاة حصة صفية حقيقية</h1>

<label>المادة</label>
<input id="subject" placeholder="رياضيات / علوم / لغة عربية">

<label>الصف</label>
<input id="grade" placeholder="الثاني / الخامس">

<label>الدرس</label>
<input id="lesson" placeholder="المقارنة بين عددين">

<label>مدة الحصة</label>
<select id="duration">
  <option value="40">٤٠ دقيقة</option>
  <option value="45">٤٥ دقيقة</option>
</select>

<label>طريقة التنفيذ</label>
<select id="delivery">
  <option value="face">وجاهي داخل الصف</option>
  <option value="teams">عبر Teams</option>
</select>

<label>رفع ملف الكتاب (TXT أو PDF)</label>
<input type="file" id="bookFile" accept=".txt,.pdf">
<small>يُستخدم نص الكتاب كمرجع داخل المحاكاة</small>

<div class="actions">
  <button onclick="build()">🧠 إنشاء المحاكاة</button>
  <button class="alt" onclick="path('good')">🟢 الطلاب متفاعلون</button>
  <button class="warn" onclick="path('mixed')">🟡 الطلاب مختلفون</button>
  <button class="danger" onclick="path('weak')">🔴 الطلاب متعثرون</button>
  <button onclick="window.print()">🖨️ طباعة</button>
</div>

<div class="output">
<textarea id="out"></textarea>
</div>
</div>

https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.jsscript>

<script>
let bookText="";

/* قراءة ملف الكتاب */
document.getElementById("bookFile").addEventListener("change",function(e){
  const f=e.target.files[0];
  if(!f)return;
  if(f.name.endsWith(".txt")){
    const r=new FileReader();
    r.onload=x=>{bookText=x.target.result||"";alert("تم تحميل الكتاب");};
    r.readAsText(f,"UTF-8");
  }else if(f.name.endsWith(".pdf")){
    readPDF(f);
  }
});

async function readPDF(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let t="";
  for(let i=1;i<=pdf.numPages;i++){
    const p=await pdf.getPage(i);
    const c=await p.getTextContent();
    c.items.forEach(it=>t+=it.str+" ");
  }
  bookText=t;
  alert("تم تحميل كتاب PDF");
}

/* إنشاء المحاكاة */
function build(){
  const s=subject.value||"غير محددة";
  const g=grade.value||"غير محدد";
  const l=lesson.value||"غير محدد";
  const d=duration.value;
  const mode=delivery.value;

  out.value =
`محاكاة حصة صفية جاهزة للتنفيذ

المادة: ${s}
الصف: ${g}
الدرس: ${l}
مدة الحصة: ${d} دقيقة
طريقة التنفيذ: ${mode=="face"?"وجاهي":"Teams"}

1) بداية الحصة (5 دقائق)
- اكتب مثالًا من الدرس.
- اسأل: أي نتيجة أدق؟ ولماذا؟
- لا تشرح. لا تصحح.

2) أثناء إجابات الطلاب
- استمع فقط.
- راقب من يبرّر ومن يخمّن.

3) قرار الحصة
- اطلب قرارًا واحدًا فقط مع سبب واحد.

4) متى أذكر القاعدة؟
- عندما ينطق بها طالب بوضوح.
- لا تطِل الشرح.

5) تطبيق (7 دقائق)
- مثال جديد.
- طالب يجيب وآخر يبرّر.

6) نهاية الحصة
- سؤال أخير.
- صمت 20 ثانية.

ملاحظة للمعلم:
التفكير أهم من الإجابة.

مرجع من الكتاب:
${bookText?bookText.slice(0,500):"لم يتم رفع كتاب"}
`;
}

/* مسارات حسب الواقع */
function path(t){
  if(t=="good"){
    out.value+="\n\n🟢 الطلاب متفاعلون:\n- أعط مثالًا أصعب قليلًا.\n- لا تذكر القاعدة سريعًا.";
  }
  if(t=="mixed"){
    out.value+="\n\n🟡 الطلاب مختلفون:\n- اطلب تفكيك المثال خطوة خطوة.\n- اسأل: ما أول شيء ننظر إليه؟";
  }
  if(t=="weak"){
    out.value+="\n\n🔴 الطلاب متعثرون:\n- لا تقل خطأ.\n- استخدم تمثيلًا حسيًا.\n- بسّط السؤال.";
  }
}
</script>

</body>
</html>
