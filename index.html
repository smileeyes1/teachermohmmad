<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>الخبير التربوي المرافق</title>

<style>
:root{
  --bg:#f7f9fc;
  --card:#ffffff;
  --primary:#2563eb;
  --secondary:#16a34a;
  --text:#1f2937;
  --muted:#6b7280;
  --border:#e5e7eb;
  --radius:18px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Tahoma,sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.7;
}

.container{
  max-width:960px;
  margin:auto;
  padding:1.2rem;
}

.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:1.5rem;
  margin-bottom:1.2rem;
  box-shadow:0 12px 32px rgba(0,0,0,.06);
}

h1,h2{
  margin:0 0 .6rem;
  color:var(--primary);
}

p{
  margin:.4rem 0;
  color:var(--muted);
}

.actions{
  display:flex;
  gap:.8rem;
  flex-wrap:wrap;
}

button{
  flex:1;
  min-height:56px;
  border:none;
  border-radius:14px;
  font-size:1rem;
  cursor:pointer;
  transition:.15s ease;
}

.btn-primary{background:var(--primary);color:#fff}
.btn-secondary{background:var(--secondary);color:#fff}
.btn-ghost{background:#eef2ff;color:var(--primary)}

button:active{transform:scale(.97)}

label{
  font-weight:600;
  margin-top:1rem;
  display:block;
}

input,textarea{
  width:100%;
  margin-top:.4rem;
  padding:.75rem .9rem;
  border-radius:12px;
  border:1px solid var(--border);
  font-size:1rem;
}

.hidden{display:none}

.lesson-buttons button{
  margin-bottom:.6rem;
}

.log{
  margin-top:1.2rem;
  font-weight:700;
  text-align:center;
  font-size:1.1rem;
}

/* ===== الطباعة الرسمية ===== */
@media print{
  body{background:#fff}
  button,.actions,.footer{display:none!important}
  .card{box-shadow:none}
}

/* ===== الهواتف ===== */
@media (max-width:600px){
  h1{font-size:1.5rem}
  h2{font-size:1.25rem}
}
</style>
</head>

<body>

<div class="container">

<!-- العنوان -->
<div class="card">
  <h1>الخبير التربوي المرافق داخل الصف</h1>
  <p>
    نظام دعم تربوي صامت،  
    يثبّت لحظة التعلّم ثم ينسحب.
  </p>
</div>

<!-- اختيار الوضع -->
<div class="card">
  <h2>وضع التشغيل</h2>
  <div class="actions">
    <button class="btn-primary" onclick="openPrep()">وضع التحضير</button>
    <button class="btn-ghost" onclick="openLesson()">وضع الحصّة</button>
  </div>
</div>

<!-- وضع التحضير -->
<div id="prep" class="card hidden">
  <h2>تحضير الحصّة</h2>

  <label>اسم المدرسة</label>
  <input id="school" placeholder="اسم المدرسة الرسمي">

  <label>اسم المعلّم/ة</label>
  <input id="teacher" placeholder="الاسم كما يُعتمد رسميًا">

  <label>اسم الدرس</label>
  <input id="lesson" placeholder="مثال: الجمع حتى ١٠">

  <label>الفكرة الواحدة من الكتاب</label>
  <textarea id="idea" rows="3"></textarea>

  <label>السؤال الواحد</label>
  <textarea id="question" rows="2"></textarea>

  <div class="actions">
    <button class="btn-secondary" onclick="lockPrep()">اعتماد التحضير</button>
    <button class="btn-ghost" onclick="window.print()">طباعة التحضير</button>
  </div>

  <p id="prepMsg" class="hidden">✅ التحضير مُعتمد وجاهز.</p>
</div>

<!-- وضع الحصّة -->
<div id="lessonBox" class="card hidden">
  <h2>الحصّة الصفيّة</h2>

  <div class="lesson-buttons">
    <button class="btn-primary" onclick="logAction('اطرح السؤال')">اطرح السؤال</button>
    <button class="btn-ghost" onclick="logAction('صمت')">صمت</button>
    <button class="btn-ghost" onclick="logAction('ارجع للسؤال')">ارجع للسؤال</button>
    <button class="btn-secondary" onclick="logAction('نُطقت الفكرة — أُغلقت الحصّة')">
      إغلاق الحصّة
    </button>
  </div>

  <div id="lessonLog" class="log hidden"></div>
</div>

<div class="footer" style="text-align:center;color:var(--muted);font-size:.9rem">
  نسخة مكتملة • مستقرة • آمنة صفّيًا
</div>

</div>

<script>
let ready=false;

function openPrep(){
  prep.classList.remove("hidden");
  lessonBox.classList.add("hidden");
}

function openLesson(){
  if(!ready) return;
  lessonBox.classList.remove("hidden");
  prep.classList.add("hidden");
}

function lockPrep(){
  if(!lesson.value || !idea.value || !question.value) return;
  ready=true;
  prepMsg.classList.remove("hidden");
}

function logAction(text){
  lessonLog.textContent=text;
  lessonLog.classList.remove("hidden");
}
</script>

</body>
</html>
