<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النظام التربوي الحكيم — نسخة آمنة بدون إنترنت</title>

<style>
/* =============================
   هوية بصرية هادئة – Offline
============================= */
:root{
  --primary:#0d47a1;
  --primary-soft:#e3f2fd;
  --background:#f6f8fb;
  --surface:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
  --success:#2e7d32;
  --warning:#f9a825;
  --danger:#c62828;
  --border:#e5e7eb;
  --radius:14px;
  --shadow:0 6px 20px rgba(0,0,0,.08);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Tahoma, Arial, sans-serif;
  background:var(--background);
  color:var(--text);
  line-height:1.8;
}

/* =============================
   الحاوية
============================= */
.app{
  max-width:1200px;
  margin:auto;
  padding:16px;
}

/* =============================
   الرأس
============================= */
.header{
  background:var(--surface);
  border-radius:var(--radius);
  padding:18px;
  box-shadow:var(--shadow);
  text-align:center;
}

.header h1{
  margin:0;
  color:var(--primary);
  font-size:1.4rem;
}

.header p{
  margin:6px 0 0;
  font-size:.9rem;
  color:var(--muted);
}

/* =============================
   الإرشاد اللحظي
============================= */
.guide{
  position:sticky;
  top:0;
  margin:16px 0;
  padding:12px;
  background:var(--primary);
  color:#fff;
  border-radius:12px;
  text-align:center;
  font-size:.9rem;
  box-shadow:var(--shadow);
  z-index:10;
}

/* =============================
   الشبكة
============================= */
.main{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

/* =============================
   البطاقات
============================= */
.card{
  background:var(--surface);
  border-radius:var(--radius);
  padding:16px;
  box-shadow:var(--shadow);
}

.card h2{
  margin-top:0;
  font-size:1.05rem;
  color:var(--primary);
}

label{
  display:block;
  margin-top:10px;
  font-weight:bold;
  font-size:.9rem;
}

input, textarea, button{
  width:100%;
  margin-top:6px;
  padding:10px;
  font-size:.95rem;
  border-radius:10px;
  border:1px solid var(--border);
  font-family:inherit;
}

input:focus, textarea:focus{
  outline:none;
  border-color:var(--primary);
}

textarea{resize:vertical}

/* =============================
   الملاحظات
============================= */
.note{
  margin-top:10px;
  padding:10px;
  background:var(--primary-soft);
  border-radius:10px;
  font-size:.85rem;
  color:#0b3c88;
}

/* =============================
   الأزرار
============================= */
.actions{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:14px;
}

button{
  cursor:pointer;
  border:none;
  background:var(--primary);
  color:#fff;
}

button.secondary{background:#455a64}
button.success{background:var(--success)}
button.warning{background:var(--warning); color:#000}

button:hover{opacity:.9}

/* =============================
   الإخراج
============================= */
.output{margin-top:16px}

#output{
  height:420px;
  white-space:pre-wrap;
  background:#fafafa;
}

/* =============================
   وضع التنفيذ
============================= */
.run{
  margin-top:16px;
  background:var(--surface);
  padding:16px;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}

.log{
  margin-top:10px;
  padding:10px;
  background:#fafafa;
  border-radius:10px;
  min-height:120px;
  font-size:.9rem;
}

/* =============================
   التجاوب
============================= */
@media (max-width:900px){
  .main{grid-template-columns:1fr}
  .actions{grid-template-columns:1fr 1fr}
}
@media (max-width:500px){
  .actions{grid-template-columns:1fr}
}

/* =============================
   الطباعة الآمنة
============================= */
@media print{
  .header,.guide,.actions,.run,input,button,textarea:not(#output){display:none}
  #output{border:none;height:auto;font-size:14pt}
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <h1>النظام التربوي الحكيم</h1>
    <p>نظام حصص واقعية — يعمل بدون إنترنت ومحمي بالتصميم</p>
  </div>

  <div class="guide" id="guide">
    الإرشاد اللحظي: ابدأ بسؤال واحد واترك الصمت يعمل.
  </div>

  <div class="main">

    <div class="card">
      <h2>اعتماد المنهاج</h2>
      <label>المادة</label>
      <input id="subject">
      <label>الصف</label>
      <input id="grade">
      <div class="note">
        🔒 لا يتم إرسال أو حفظ أي بيانات خارج هذا الجهاز.
      </div>
    </div>

    <div class="card">
      <h2>جَوهر الحصّة</h2>
      <label>سؤال الحصّة</label>
      <input id="question">
      <label>الفكرة المقفولة</label>
      <input id="concept">
      <div class="note">
        ✅ نطق الفكرة = اكتمال الحصّة + توقّف فوري.
      </div>
    </div>

  </div>

  <div class="actions">
    <button onclick="prep()">تحضير</button>
    <button class="secondary" onclick="simulate()">محاكاة</button>
    <button class="warning" onclick="window.print()">طباعة</button>
  </div>

  <div class="output">
    <textarea id="output" readonly></textarea>
  </div>

  <div class="run">
    <h3>وضع التنفيذ</h3>
    <div class="actions">
      <button onclick="act('طرح السؤال')">اطرح السؤال</button>
      <button class="secondary" onclick="act('صمت')">صمت</button>
      <button class="success" onclick="closeLesson()">نُطقت الفكرة</button>
    </div>
    <div class="log" id="log"></div>
  </div>

</div>

<script>
/* ====== دعم لحظي بدون إنترنت ====== */
const guide = m => document.getElementById("guide").textContent =
  "الإرشاد اللحظي: " + m;

const output = document.getElementById("output");
const logBox = document.getElementById("log");

function prep(){
  guide("فكرة واحدة تكفي. لا تنتقل قبل النطق.");
  output.value =
`تحضير حصّة واقعية (وضع آمن)

المادة: ${subject.value}
الصف: ${grade.value}

سؤال الحصّة:
${question.value}

الفكرة المقفولة:
${concept.value}

إجراءات:
- سؤال
- صمت
- نطق
- توقّف`;
}

function simulate(){
  guide("هذه محاكاة واقعية لا مثالية.");
  output.value +=
`\n\nمحاكاة:
سؤال
صمت
تردّد
نطق:
${concept.value}
إغلاق`;
}

function act(t){
  logBox.textContent += "\n• " + t;
}

function closeLesson(){
  guide("توقّف الآن. التعلّم حدث.");
  logBox.textContent += "\n• انتهت الحصّة";
}
</script>

</body>
</html>
