<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>الخبير التربوي المرافق — Classroom Companion</title>

<style>
  :root {
    --bg: #f٥f٦f٨;
    --card: #ffffff;
    --primary: #١f٤faa;
    --secondary: #٢e٧d٣٢;
    --muted: #٦b٧٢٨٠;
    --border: #e٥e٧eb;
  }
  body {
    margin: ٠;
    font-family: "Tahoma", "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    color: #١f٢٩٣٧;
  }
  .container {
    max-width: ٨٠٠px;
    margin: ٢rem auto;
    padding: ٠ ١rem;
  }
  .card {
    background: var(--card);
    border-radius: ١٢px;
    padding: ١.٥rem;
    margin-bottom: ١.٢rem;
    box-shadow: ٠ ٨px ٢٤px rgba(٠,٠,٠,٠.٠٦);
  }
  h1, h٢ {
    margin: ٠ ٠ ٠.٥rem ٠;
    color: var(--primary);
  }
  p {
    margin: ٠.٥rem ٠;
    color: var(--muted);
    line-height: ١.٦;
  }
  label {
    display: block;
    margin-top: ١rem;
    font-weight: bold;
  }
  input, textarea {
    width: ١٠٠%;
    padding: ٠.٦rem;
    margin-top: ٠.٣rem;
    border-radius: ٨px;
    border: ١px solid var(--border);
    font-size: ١rem;
  }
  button {
    margin-top: ١rem;
    padding: ٠.٧rem ١.٢rem;
    border: none;
    border-radius: ١٠px;
    font-size: ١rem;
    cursor: pointer;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-secondary { background: var(--secondary); color: #fff; }
  .btn-ghost { background: transparent; color: var(--primary); }

  .hidden { display: none; }

  .footer {
    text-align: center;
    font-size: ٠.٩rem;
    color: var(--muted);
    margin-top: ٢rem;
  }

  /* وضع الحصّة — أزرار فقط */
  .lesson-controls button {
    width: ١٠٠%;
    margin-bottom: ٠.٥rem;
  }
</style>
</head>

<body>
<div class="container">

  <!-- العنوان -->
  <div class="card">
    <h1>الخبير التربوي المرافق داخل الصف</h1>
    <p>نظام دعم تربوي صامت — يثبّت لحظة التعلّم ثم ينسحب.</p>
  </div>

  <!-- اختيار الوضع -->
  <div class="card">
    <h٢>اختر وضع التشغيل</h٢>
    <button class="btn-primary" onclick="activatePrep()">وضع التحضير (خارج زمن الحصّة)</button>
    <button class="btn-ghost" onclick="activateLesson()">وضع الحصّة (صامت)</button>
  </div>

  <!-- وضع التحضير -->
  <div id="prepMode" class="card hidden">
    <h٢>وضع التحضير</h٢>
    <p>يُستخدم قبل الحصّة فقط. لا يُفعَّل داخل الصف.</p>

    <label>اسم الدرس</label>
    <input type="text" id="lessonName" placeholder="مثال: الجمع حتى ١٠" />

    <label>الفكرة الواحدة (من الكتاب)</label>
    <textarea id="singleIdea" rows="٣" placeholder="أصغر وحدة معرفية مكتملة من النص"></textarea>

    <label>السؤال الواحد</label>
    <textarea id="singleQuestion" rows="٢" placeholder="سؤال يقود لنطق الفكرة"></textarea>

    <button class="btn-secondary" onclick="lockPreparation()">اعتماد التحضير</button>

    <p id="prepStatus" class="hidden">✅ تم اعتماد التحضير. الحصّة جاهزة.</p>
  </div>

  <!-- وضع الحصّة -->
  <div id="lessonMode" class="card hidden">
    <h٢>وضع الحصّة الصفيّة</h٢>
    <p>لا شرح إضافي. لا تحميل. لا OCR.</p>

    <div class="lesson-controls">
      <button class="btn-primary" onclick="sayAction('اطرح السؤال')">اطرح السؤال</button>
      <button class="btn-ghost" onclick="sayAction('صمت')">صمت</button>
      <button class="btn-ghost" onclick="sayAction('ارجع للسؤال')">ارجع للسؤال</button>
      <button class="btn-secondary" onclick="closeLesson()">نُطقت الفكرة — أُغلقت الحصّة</button>
    </div>

    <p id="lessonLog" class="hidden"></p>
  </div>

  <div class="footer">
    نسخة مكتملة • الاستقرار قبل التوسّع
  </div>

</div>

<script>
  // حالة مغلقة افتراضيًا
  let preparationLocked = false;

  function activatePrep() {
    document.getElementById('prepMode').classList.remove('hidden');
    document.getElementById('lessonMode').classList.add('hidden');
  }

  function activateLesson() {
    // لا دخول للحصّة دون اعتماد التحضير
    if (!preparationLocked) {
      return; // صمت مقصود — لا رسائل داخل زمن الحصّة
    }
    document.getElementById('lessonMode').classList.remove('hidden');
    document.getElementById('prepMode').classList.add('hidden');
  }

  function lockPreparation() {
    const name = document.getElementById('lessonName').value.trim();
    const idea = document.getElementById('singleIdea').value.trim();
    const q = document.getElementById('singleQuestion').value.trim();

    if (!name || !idea || !q) return;

    preparationLocked = true;
    document.getElementById('prepStatus').classList.remove('hidden');
  }

  function sayAction(text) {
    const log = document.getElementById('lessonLog');
    log.textContent = text;
    log.classList.remove('hidden');
  }

  function closeLesson() {
    const log = document.getElementById('lessonLog');
    log.textContent = '✅ تم الإغلاق المهني. يُمنع الاستمرار.';
    log.classList.remove('hidden');
  }
</script>
</body>
</html>
