<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>التحضير السيادي للحصة</title>

<style>
:root{
  --main:#3b82f6;
  --main-soft:#e8f0fe;
  --accent:#22c55e;
  --bg:#f7f8fa;
  --card:#ffffff;
  --text:#1f2933;
  --muted:#6b7280;
  --danger:#c0392b;
  --radius:١٤px;
  --transition:٠.٣s ease;
}

*{box-sizing:border-box}

body{
  margin:٠;
  font-family:"Tahoma",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:١.٦;
}

.container{
  max-width:٧٤٠px;
  margin:٣٠px auto;
  background:var(--card);
  padding:٢٤px;
  border-radius:var(--radius);
  box-shadow:٠ ١٠px ٢٥px rgba(٠,٠,٠,٠.٠٦);
}

h1{
  text-align:center;
  margin-top:٠;
  margin-bottom:٢٠px;
  color:#١f٢٩٣٣;
}

.section-note{
  background:var(--main-soft);
  padding:١٢px ١٤px;
  border-radius:١٠px;
  color:#١e٣a٨a;
  font-size:١٤px;
  margin-bottom:٢٠px;
}

label{
  display:block;
  margin-top:١٦px;
  margin-bottom:٦px;
  font-weight:bold;
}

input,textarea{
  width:١٠٠٪;
  padding:١١px ١٢px;
  border-radius:١٠px;
  border:١px solid #d1d5db;
  font-size:١٥px;
  transition:var(--transition);
}

input:focus,textarea:focus{
  outline:none;
  border-color:var(--main);
  box-shadow:٠ ٠ ٠ ٣px rgba(٥٩,١٣٠,٢٤٦,٠.١٥);
}

textarea{
  resize:vertical;
  min-height:١٢٠px;
}

.file-box{
  margin-top:١٠px;
  background:#f3f4f6;
  padding:١٠px;
  border-radius:١٠px;
  font-size:١٤px;
  color:var(--muted);
}

button{
  margin-top:٢٤px;
  width:١٠٠٪;
  background:var(--main);
  color:#fff;
  border:none;
  padding:١٤px;
  border-radius:١٢px;
  font-size:١٦px;
  cursor:pointer;
  transition:var(--transition);
}

button:hover{
  background:#٢٥٦٣eb;
}

#err{
  margin-top:١٢px;
  color:var(--danger);
  font-weight:bold;
}

#output{
  margin-top:٢٤px;
  background:#f9fafb;
  font-family:"Courier New",monospace;
  border:١px dashed #d1d5db;
}

.footer-note{
  margin-top:١٦px;
  text-align:center;
  font-size:١٣px;
  color:var(--muted);
}

/* موبايل */
@media (max-width:٦٠٠px){
  .container{
    margin:١٢px;
    padding:١٨px;
  }
}
</style>
</head>

<body>

<div class="container">
<h1>التحضير السيادي للحصة</h1>

<div class="section-note">
هذا النموذج مصمَّم ليكون هادئًا، بسيطًا، ويخدم التفكير قبل أي شيء.
</div>

<label>المادة</label>
<input id="subject">

<label>الصف</label>
<input id="grade">

<label>اسم الدرس</label>
<input id="lesson">

<label>مدة الحصة (بالدقائق)</label>
<input id="duration">

<label>سؤال الحصة الواحد *</label>
<input id="question">

<label>الفكرة المقفولة *</label>
<input id="concept">

<label>ملف الكتاب (اختياري)</label>
<input type="file" id="bookFile" accept=".pdf,image/*">
<div id="fileName" class="file-box">لم يتم إرفاق ملف</div>

<div id="err"></div>

<button onclick="build()">بناء التحضير بهدوء</button>

<textarea id="output" readonly placeholder="سيظهر التحضير هنا…"></textarea>

<div class="footer-note">
الهدوء يحمي العقل — والعقل هو أداة التعلّم.
</div>
</div>

<script>
"use strict";

const $=id=>document.getElementById(id);
const safe=t=>t.replace(/[<>]/g,"");

$("bookFile").addEventListener("change",()=>{
  const f=$("bookFile").files[٠];
  $("fileName").textContent=f?`📘 ${f.name}`:"لم يتم إرفاق ملف";
});

function build(){
  $("err").textContent="";
  const q=safe($("question").value.trim());
  const c=safe($("concept").value.trim());
  if(!q||!c){
    $("err").textContent="❌ السؤال والفكرة المقفولة مطلوبان";
    return;
  }
  $("output").value=`
تحضير حصة سيادية

المادة: ${safe($("subject").value)||"—"}
الصف: ${safe($("grade").value)||"—"}
الدرس: ${safe($("lesson").value)||"—"}
المدة: ${safe($("duration").value)||"—"} دقيقة

سؤال الحصة:
«${q}»

الفكرة المقفولة:
«${c}»

بنية التنفيذ:
١) سؤال واحد
٢) مثال واحد
٣) صمت مقصود
٤) نطق طفل واحد
٥) تثبيت وإغلاق
`.trim();
}
</script>

</body>
</html>
