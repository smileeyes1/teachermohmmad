<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محاكاة حصة صفية جاهزة للتنفيذ</title>

<style>
body{
  font-family: Tahoma, Arial, sans-serif;
  background:#f4f6f8;
  margin:0; padding:16px; direction:rtl;
}
.container{
  background:#fff;
  max-width:900px;
  margin:auto;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 8px rgba(0,0,0,.1);
}
h1{text-align:center;}
label{font-weight:bold;display:block;margin-top:10px;}
input,select,textarea{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:15px;
  direction:rtl;
}
textarea{resize:vertical;}
.actions{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:16px 0;
}
button{
  padding:12px;
  font-size:15px;
  border:none;
  border-radius:6px;
  background:#1976d2;
  color:#fff;
  cursor:pointer;
}
button.alt{background:#009688;}
button.warn{background:#ffa000;}
button.danger{background:#d32f2f;}
button:hover{opacity:.9;}
.output textarea{
  height:600px;
  white-space:pre-wrap;
  font-size:14.5px;
  line-height:1.8;
}
.teacher-note{
  background:#eef3f8;
  border-right:4px solid #1976d2;
  padding:10px;
  margin-top:12px;
}
@media print{
  .actions,label,input,select{display:none!important;}
  .container{box-shadow:none;}
  .output textarea{
    border:none;height:auto;font-size:14pt;line-height:1.9;
  }
}
</style>
</head>

<body>
<div class="container">

<h1>محاكاة حصة صفية واقعية</h1>

<label>المادة</label>
<input id="subject" placeholder="رياضيات / علوم / لغة عربية">

<label>الصف</label>
<input id="grade" placeholder="الثاني / الخامس">

<label>الدرس</label>
<input id="lesson" placeholder="المقارنة بين عددين">

<label>مدة الحصة</label>
<select id="duration">
  <option value="40">٤٠ دقيقة</option>
  <option value="45">٤٥ دقيقة</option>
</select>

<label>طريقة التنفيذ</label>
<select id="delivery">
  <option value="face">وجاهي</option>
  <option value="teams">عبر Teams</option>
</select>

<div class="actions">
  <button onclick="build()">🧠 إنشـاء المحاكاة</button>
  <button class="alt" onclick="path('good')">🟢 الطلاب متفاعلون</button>
  <button class="warn" onclick="path('mixed')">🟡 الطلاب مختلفون</button>
  <button class="danger" onclick="path('weak')">🔴 الطلاب متعثرون</button>
  <button onclick="window.print()">🖨️ طباعة</button>
</div>

<div class="output">
<textarea id="out"></textarea>
</div>

</div>

<script>
function build(){
  const s=subject.value||"غير محددة";
  const g=grade.value||"غير محدد";
  const l=lesson.value||"غير محدد";
  const d=duration.value;
  const m=delivery.value;

  out.value = `
محاكاة حصة صفية – جاهزة للتنفيذ

المادة: ${s}
الصف: ${g}
الدرس: ${l}
مدة الحصة: ${d} دقيقة
طريقة التنفيذ: ${m=="face"?"وجاهي":"Teams"}

━━━━━━━━━━━━━━━━━━━━

① بداية الحصة (5 دقائق)
• اكتب مثالًا مناسبًا للدرس على اللوح.
• اسأل: «أي نتيجة أدق؟ ولماذا؟»
• لا تشرح. لا تصحّح الآن.

② أثناء النقاش
• استمع لإجابات الطلاب فقط.

③ قرار الحصة
• اطلب قرارًا واحدًا فقط مع سبب واحد:
  «كيف نقرر هنا؟»

④ متى أقدّم القاعدة؟
• إذا قال طالب سببًا صحيحًا بوضوح.
• عندها فقط اذكر اسم القاعدة.
• لا تطِل الشرح.

⑤ تطبيق (7 دقائق)
• مثال جديد أو تمرين شفهي.
• طالب يجيب، وآخر يبرر.

⑥ نهاية الحصة
• مثال أخير.
• اسأل سؤالًا واحدًا.
• اصمت 20 ثانية.

━━━━━━━━━━━━━━━━━━━━

تنبيه للمعلم:
• الصمت جزء من الدرس.
• لا تنقذ الطالب بالإجابة.
• المهم كيف فكر، لا ماذا قال.
`;

  if(m=="teams"){
    out.value += `

ملاحظة لـ Teams:
• حدّد زمن التفكير (30 ثانية).
• اسمح بالإجابة عبر الدردشة.
• اختر طالبًا واحدًا للتبرير الصوتي.
`;
  }
}

function path(t){
  if(t=="good"){
    out.value += `

🟢 الطلاب متفاعلون:
• أعط مثالًا أصعب قليلًا.
• اسأل: «هل ينطبق هذا دائمًا؟»
• لا تذكر القاعدة سريعًا.
`;
  }
  if(t=="mixed"){
    out.value += `

🟡 الطلاب مختلفون:
• اطلب تفكيك المثال خطوة خطوة.
• اسأل: «ما أول شيء ننظر إليه؟»
`;
  }
  if(t=="weak"){
    out.value += `

🔴 الطلاب متعثرون:
• لا تقل «خطأ».
• استخدم تمثيلًا حسيًا أو رسمة.
• عد لسؤال أبسط.
`;
  }
}
</script>

</body>
</html>
