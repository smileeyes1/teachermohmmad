<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النظام السيادي لتحضير الحصة — سؤال واحد، فكرة واحدة</title>

<style>
:root{
  --main:#1976d2;
  --soft:#f2f4f7;
  --ink:#333;
}
body{
  font-family: Tahoma, Arial, sans-serif;
  background:var(--soft);
  margin:0;
  padding:١٢px;
  color:var(--ink);
}
.container{
  max-width:٨٢٠px;
  margin:auto;
  background:#fff;
  padding:١٦px;
  border-radius:١٢px;
  box-shadow:0 ٤px ١٠px rgba(0,0,0,.08);
}
h1{
  text-align:center;
  font-size:٢٠px;
  margin-bottom:١٦px;
}
label{
  display:block;
  font-weight:bold;
  margin-top:١٢px;
  font-size:١٥px;
}
input,select,textarea,button{
  width:١٠٠%;
  padding:١٤px;
  margin-top:٦px;
  font-size:١٥px;
  border-radius:١٠px;
  border:١px solid #ccc;
  direction:rtl;
}
textarea{
  height:٥٦٠px;
  resize:vertical;
  white-space:pre-wrap;
  line-height:١.٩;
}
.hint{
  background:#f8f9fa;
  border:١px solid #e0e0e0;
  border-radius:٨px;
  padding:٨px ١٠px;
  margin-top:٦px;
  font-size:١٣.٥px;
  color:#٤٤٤;
}
button{
  margin-top:١٨px;
  background:var(--main);
  color:#fff;
  border:none;
  font-size:١٦px;
  cursor:pointer;
}
button:active{opacity:.٨٥}
.badge{
  text-align:center;
  margin-top:١٤px;
  padding:٨px;
  border-radius:٨px;
  font-size:١٤.٥px;
  background:#e٨f٥e٩;
  color:#١b٥e٢٠;
}
@media print{
  label,input,select,button,.hint,.badge{display:none}
  textarea{
    border:none;
    height:auto;
    font-size:١٤pt;
  }
}
</style>
</head>

<body>

<div class="container">
<h1>النظام السيادي لتحضير الحصة</h1>

<label>المادة</label>
<select id="subject">
  <option>اللغة العربية</option>
  <option>الرياضيات</option>
</select>

<label>الصف</label>
<select id="grade">
  <option>الصف الأول</option>
  <option>الصف الثاني</option>
</select>

<label>عنوان الدرس</label>
<input id="lesson" placeholder="كما ورد في الكتاب">

<label>سؤال الحصة الواحد 🔒</label>
<input id="question" placeholder="سؤال واحد لا يتغير">
<div class="hint">
سؤال ثابت يُطرح من الدقيقة الأولى حتى الأخيرة.<br>
لا تفريع، لا تشتيت.
</div>

<label>الفكرة المقفولة 🔒</label>
<input id="concept" placeholder="جملة قصيرة سينطقها تلميذ">
<div class="hint">
لا تُغلق الحصة حتى ينطقها <b>تلميذ</b> بوضوح.
</div>

<label>مدة الحصة</label>
<select id="duration">
  <option value="٤٠">٤٠ دقيقة</option>
  <option value="٤٥">٤٥ دقيقة</option>
</select>

<button onclick="build()">✅ توليد الحصة السيادية</button>
<button onclick="window.print()">🖨️ طباعة</button>

<div class="badge">🛡️ التلميذ يفكّر — المعلّم يُدير الصمت</div>

<textarea id="output" placeholder="ستظهر الحصة الجاهزة هنا..."></textarea>
</div>

<script>
function build(){
  const subject  = document.getElementById("subject").value;
  const grade    = document.getElementById("grade").value;
  const lesson   = document.getElementById("lesson").value || "—";
  const question = document.getElementById("question").value.trim();
  const concept  = document.getElementById("concept").value.trim();
  const duration = document.getElementById("duration").value;
  const out      = document.getElementById("output");

  if(!question || !concept){
    alert("سؤال الحصة والفكرة المقفولة عنصران إلزاميان");
    return;
  }

  out.value =
`تحضير حصة صفّية سيادية

المادة: ${subject}
الصف: ${grade}
الدرس: ${lesson}
المدة: ${duration} دقيقة

سؤال الحصة الواحد:
«${question}»

الفكرة المقفولة:
«${concept}»

بنية التنفيذ السيادي:
١) أطرح السؤال فقط — دون شرح.
٢) مثال واحد من الكتاب.
٣) صمت مقصود للتفكير.
٤) تلميذ واحد ينطق الفكرة.
٥) تثبيت قصير ثم إغلاق.

قرارات غير قابلة للنقاش:
– لا شرح طويل.
– لا أسئلة متعددة.
– لا سبورة مزدحمة.

تذكير للمعلم:
الصمت أداة.
التفكير هدف.
النطق دليل الفهم.
`;
}
</script>

</body>
</html>
