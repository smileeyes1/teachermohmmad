<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>أداة مساندة المعلّم — التدريس بالاختيار</title>

<style>
:root{
  --main:#١a٥fb٤;
  --bg:#f٣f٥f٨;
  --card:#ffffff;
  --soft:#eef٢f٦;
  --ink:#٢٢٢;
  --muted:#٦b٧٢٨٠;
  --ok:#٢e٧d٣٢;
}

*{box-sizing:border-box}

body{
  margin:٠;
  font-family:Tahoma, Arial, sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:١.٨;
}

.app{
  max-width:٨٤٠px;
  margin:٢٤px auto;
  padding:١٦px;
}

.header{
  background:var(--card);
  padding:٢٢px;
  border-radius:١٦px;
  text-align:center;
  box-shadow:٠ ٦px ٢٠px rgba(٠,٠,٠,.٠٦);
  margin-bottom:٢٠px;
}
.header h1{
  margin:٠;
  font-size:٢٢px;
  color:var(--main);
}
.header p{
  margin-top:٨px;
  font-size:١٤px;
  color:var(--muted);
}

.card{
  background:var(--card);
  padding:٢٢px;
  border-radius:١٦px;
  box-shadow:٠ ٤px ١٦px rgba(٠,٠,٠,.٠٦);
  margin-bottom:٢٠px;
}

h2{
  margin:٠ ٠ ١٢px ٠;
  font-size:١٨px;
}

.buttons{
  display:flex;
  flex-wrap:wrap;
  gap:١٢px;
  margin-top:١٢px;
}

button{
  flex:١;
  min-width:١٦٠px;
  padding:١٤px ١٦px;
  border-radius:١٤px;
  border:٠;
  cursor:pointer;
  font-size:١٥px;
  background:var(--main);
  color:#fff;
}
button.alt{ background:#٤٥٥a٦٤; }
button.ok{ background:var(--ok); }

#whisper{
  display:none;
  background:var(--soft);
  padding:٢٢px;
  border-radius:١٦px;
  font-size:١٦px;
  margin-bottom:٢٠px;
}

#end{
  display:none;
  background:#e٨f٥e٩;
  padding:٢٢px;
  border-radius:١٦px;
  font-size:١٦px;
  color:var(--ok);
  margin-bottom:٢٠px;
}

.footer{
  text-align:center;
  font-size:١٣px;
  color:var(--muted);
  margin-top:٢٠px;
}

@media print{
  button,.buttons,.footer{display:none}
}
</style>
</head>

<body>

<div class="app">

  <!-- العنوان -->
  <div class="header">
    <h1>أداة مساندة المعلّم</h1>
    <p>اختر فقط — الإرشاد يهمس — ثم ينسحب</p>
  </div>

  <!-- الخطوة ١: اختيار الصف (سياق فقط) -->
  <div class="card" id="step١">
    <h2>أين أنت الآن؟</h2>
    <div class="buttons">
      <button onclick="next(١)">الصف الأوّل</button>
      <button onclick="next(١)">الصف الثاني</button>
      <button onclick="next(١)">الصف الثالث</button>
    </div>
  </div>

  <!-- الخطوة ٢: نوع الدرس (بديل العنوان) -->
  <div class="card" id="step٢" style="display:none">
    <h2>هذا الدرس من نوع:</h2>
    <div class="buttons">
      <button onclick="next(٢)">قراءة</button>
      <button onclick="next(٢)">حساب</button>
      <button onclick="next(٢)">لغة</button>
      <button onclick="next(٢)">نشاط</button>
      <button onclick="next(٢)">مراجعة</button>
    </div>
  </div>

  <!-- الخطوة ٣: اللحظة الصفّية (القلب) -->
  <div class="card" id="step٣" style="display:none">
    <h2>أي وصف أقرب لما يحدث الآن؟</h2>
    <div class="buttons">
      <button onclick="whisper('🧭 انتظر محاولة واحدة فقط. لا تشرح.')">
        التلاميذ يحاولون لكن مترددون
      </button>
      <button onclick="whisper('🧭 توقّف عن الإضافة. عدّ للأبسط.')">
        الشرح بدأ يطول
      </button>
      <button class="ok" onclick="finish()">
        أشعر أنهم فهموا
      </button>
    </div>
  </div>

  <!-- الهمس -->
  <div id="whisper"></div>

  <!-- الإغلاق الطبيعي -->
  <div id="end">
    ✅ التعلّم حدث.  
    يمكنك التوقّف الآن دون شعور بالتقصير.
  </div>

  <!-- إعادة -->
  <div class="buttons" id="resetBar" style="display:none">
    <button class="alt" onclick="resetAll()">بدء حصّة جديدة</button>
  </div>

  <div class="footer">
    أداة ترشد المعلّم ولا تُرهقه — بلا كتابة، بلا تحليل، بلا محاسبة.
  </div>

</div>

<script>
function next(step){
  document.getElementById('step'+step).style.display='none';
  document.getElementById('step'+(step+1)).style.display='block';
}
function whisper(text){
  const w=document.getElementById('whisper');
  w.style.display='block';
  w.textContent=text;
}
function finish(){
  document.getElementById('whisper').style.display='none';
  document.getElementById('end').style.display='block';
  document.getElementById('resetBar').style.display='flex';
}
function resetAll(){
  ['step١','step٢','step٣'].forEach(id=>{
    document.getElementById(id).style.display = (id==='step١')?'block':'none';
  });
  document.getElementById('whisper').style.display='none';
  document.getElementById('end').style.display='none';
  document.getElementById('resetBar').style.display='none';
}
</script>

</body>
</html>
