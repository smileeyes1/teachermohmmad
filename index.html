<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>النظام السيادي لتحضير الحصة</title>
<style>
body{
  font-family:Tahoma,Arial;
  background:#f0f3f7;
  padding:١٢px;
}
.box{
  max-width:٨٠٠px;
  margin:auto;
  background:#ffffff;
  padding:٢٠px;
  border-radius:١٢px;
  box-shadow:0 ٤px ١٠px rgba(0,0,0,.1);
}
label{
  font-weight:bold;
  display:block;
  margin-top:١٢px;
}
input,select,textarea,button{
  width:١٠٠%;
  padding:١٢px;
  margin-top:٦px;
  font-size:١٥px;
  direction:rtl;
}
textarea{
  height:٤٠٠px;
  white-space:pre-wrap;
  line-height:١.٨;
}
button{
  background:#١٥٦٥c٠;
  color:#ffffff;
  border:none;
  margin-top:١٦px;
  cursor:pointer;
}
button.test{
  background:#٤٥٥a٦٤;
}
.error{
  color:red;
  font-weight:bold;
  margin-top:١٠px;
}
</style>
</head>

<body>

<div class="box">

<h2>النظام السيادي لتحضير الحصة</h2>
<p><b>محمد وجيه — مدرسة عاطوف المختلطة</b></p>

<label>المادة</label>
<select id="subject">
  <option>اللغة العربية</option>
  <option>الرياضيات</option>
</select>

<label>الصف</label>
<select id="grade">
  <option>الصف الأول</option>
  <option>الصف الثاني</option>
</select>

<label>عنوان الدرس</label>
<input id="lesson">

<label>سؤال الحصة الواحد</label>
<input id="question">

<label>الفكرة المقفولة</label>
<input id="concept">

<label>مدة الحصة</label>
<select id="duration">
  <option value="٤٠">٤٠ دقيقة</option>
  <option value="٤٥">٤٥ دقيقة</option>
</select>

<button onclick="build()">✅ توليد الحصة</button>
<button class="test" onclick="test()">🧪 اختبار فوري</button>

<div id="err" class="error"></div>

<textarea id="output" placeholder="سيظهر التحضير هنا..."></textarea>

</div>

<script>
function build(){
  const out = document.getElementById("output");
  const err = document.getElementById("err");
  err.textContent = "";

  try{
    const subject  = document.getElementById("subject").value;
    const grade    = document.getElementById("grade").value;
    const lesson   = document.getElementById("lesson").value || "—";
    const question = document.getElementById("question").value.trim();
    const concept  = document.getElementById("concept").value.trim();
    const duration = document.getElementById("duration").value;

    if(!question || !concept){
      err.textContent = "❌ يجب إدخال سؤال الحصة والفكرة المقفولة";
      return;
    }

    out.value =
`تحضير حصة صفّية سيادية

المدرسة: عاطوف المختلطة
المعلّم: محمد وجيه

المادة: ${subject}
الصف: ${grade}
الدرس: ${lesson}
المدة: ${duration} دقيقة

سؤال الحصة الواحد:
«${question}»

الفكرة المقفولة:
«${concept}»

بنية التنفيذ:
١) سؤال واحد فقط.
٢) مثال واحد.
٣) صمت للتفكير.
٤) نطق تلميذ.
٥) إغلاق الحصة.

مبدأ العمل:
الصمت أداة.
التفكير هدف.
النطق دليل الفهم.
`;
  }catch(e){
    err.textContent = "❌ خطأ تقني: " + e.message;
  }
}

function test(){
  document.getElementById("lesson").value="درس تجريبي";
  document.getElementById("question").value="ما الحرف الأول؟";
  document.getElementById("concept").value="الحرف الأول هو ب";
  build();
}
</script>

</body>
</html>
