<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>الخبير التربوي المرافق — تنفيذ الحصّة</title>

<!-- OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
:root{
--main:#0d47a1;--ok:#2e7d32;--bg:#f4f6f8;--card:#fff;--ink:#222;--soft:#e3f2fd;
}
*{box-sizing:border-box}
body{margin:0;font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.85}
.hidden{display:none}
.app{max-width:1000px;margin:auto;padding:16px}
.card{background:var(--card);padding:24px;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);margin-bottom:20px}
h1,h3{text-align:center;color:var(--main);margin:0 0 12px}
button,input{width:100%;padding:16px;margin-top:12px;border:0;border-radius:14px;font-size:17px}
button{background:var(--main);color:#fff}
button.ok{background:var(--ok)}
button:disabled{opacity:.5}
.box{background:var(--soft);padding:16px;border-radius:14px;white-space:pre-wrap}
.progress{height:10px;background:#ddd;border-radius:8px;overflow:hidden}
.progress span{display:block;height:100%;width:0;background:var(--main)}
.small{text-align:center;font-size:13.5px;color:#666}
</style>
</head>

<body>
<div class="app">

<div class="card">
<h1>الخبير التربوي المرافق</h1>
<p class="small">فكرة واحدة • صمت • محاولة • إغلاق</p>
</div>

<div class="card">
<h3>📘 اسم الدرس</h3>
<input id="lessonName" placeholder="مثال: الجمع حتى ١٠">
<button id="confirmBtn" class="ok">تأكيد</button>
</div>

<div class="card hidden" id="uploadCard">
<h3>📂 صفحات الدرس</h3>
<input type="file" id="fileInput" multiple accept="image/*,.pdf">
<p class="small">📌 يُفضَّل رفع صور الصفحات لضمان دقة القراءة</p>
<div class="progress"><span id="bar"></span></div>
<button id="startBtn" class="ok" disabled>ابدأ القراءة المركّزة</button>
</div>

<div class="card">
<h3>📝 النص المركّز</h3>
<div id="rawText" class="box">— في الانتظار —</div>
</div>

<div class="card">
<h3>🧭 التحضير التنفيذي</h3>
<div id="prep" class="box"></div>
<button id="buildBtn" class="ok" disabled>إنشاء التحضير</button>
<button class="ok" onclick="copyText('prep')">📋 نسخ التحضير</button>
</div>

<div class="card">
<h3>🚦 وضع الحصّة</h3>
<button id="closeBtn" class="ok hidden">نُطقت الفكرة — أُغلقت الحصّة</button>
<div id="log" class="box"></div>
</div>

</div>

<script>
let lesson="",extractedText="";

const lessonMap={
"جمع":"كم أصبح لدينا؟",
"طرح":"كم تبقّى؟",
"حرف":"أين نسمع هذا الحرف؟",
"عدد":"كم نرى؟"
};

const confirmBtn=document.getElementById("confirmBtn");
const uploadCard=document.getElementById("uploadCard");
const fileInput=document.getElementById("fileInput");
const startBtn=document.getElementById("startBtn");
const bar=document.getElementById("bar");
const rawText=document.getElementById("rawText");
const buildBtn=document.getElementById("buildBtn");
const prep=document.getElementById("prep");
const closeBtn=document.getElementById("closeBtn");
const log=document.getElementById("log");

confirmBtn.onclick=()=>{
lesson=lessonName.value.trim();
if(!lesson)return;
uploadCard.classList.remove("hidden");
confirmBtn.disabled=true;
};

fileInput.onchange=()=>startBtn.disabled=!fileInput.files.length;

function focusText(text,key){
const keys=key.split(" ").filter(w=>w.length>٢);
return text.split("\n").filter(line=>keys.some(k=>line.includes(k))).join("\n");
}

startBtn.onclick=async()=>{
extractedText="";
bar.style.width="5%";
for(let i=0;i<fileInput.files.length;i++){
try{
const r=await Tesseract.recognize(fileInput.files[i],"ara");
extractedText+=r.data.text+"\n";
}catch{
extractedText+="[تعذّر قراءة هذه الصفحة]\n";
}
bar.style.width=Math.round((i+1)/fileInput.files.length*100)+"%";
}
const focused=focusText(extractedText,lesson);
rawText.textContent=focused||"⚠ لم يظهر نص واضح متعلق بالدرس.";
buildBtn.disabled=false;
};

buildBtn.onclick=()=>{
const key=Object.keys(lessonMap).find(k=>lesson.includes(k));
prep.textContent=
`التحضير التنفيذي
درس: ${lesson}

السؤال المحوري:
${lessonMap[key]||"ماذا نلاحظ؟"}

التسلسل:
١) عرض هادئ
٢) صمت واعٍ
٣) محاولة
٤) تثبيت
٥) إغلاق مهني`;
closeBtn.classList.remove("hidden");
};

closeBtn.onclick=()=>{
log.textContent="✅ نُطقت الفكرة — أُغلقت الحصّة\n⛔ يُمنع أي شرح إضافي";
buildBtn.disabled=true;
startBtn.disabled=true;
closeBtn.disabled=true;
};

function copyText(id){
const t=document.getElementById(id).innerText;
navigator.clipboard.writeText(t);
}
</script>

</body>
</html>
