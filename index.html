<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النظام السيادي الذكي الشامل لدعم المعلّم</title>

<!-- ✅ تحميل OCR بالطريقة الصحيحة -->
https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.jsscript>

<style>
:root{
  --main:#0d47a1;
  --bg:#f4f6f8;
  --card:#ffffff;
  --ink:#222;
  --ok:#2e7d32;
  --expert:#6a1b9a;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Tahoma, Arial, sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.9;
}

.app{
  max-width:900px;
  margin:auto;
  padding:16px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  box-shadow:0 6px 20px rgba(0,0,0,.1);
  margin-bottom:16px;
}

h1{text-align:center;color:var(--main)}

button,input,select{
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:14px;
  font-size:16px;
}

button{
  background:var(--main);
  color:#fff;
  cursor:pointer;
}

button.ok{background:var(--ok)}

.box{
  background:#fafafa;
  padding:16px;
  border-radius:14px;
  margin-top:12px;
  white-space:pre-wrap;
}

.expert{border-right:6px solid var(--expert)}
.hidden{display:none}
</style>
</head>

<body>

<div class="app">

<h1>النظام السيادي الذكي الشامل</h1>

<div class="card">
  <h3>📘 إدراج صفحة الدرس</h3>
  <input type="file" accept="image/*" id="imageInput">
  <div id="status" class="box">— بانتظار رفع الصورة —</div>
</div>

<div class="card hidden" id="controls">
  <label>مدة الحصّة</label>
  <select id="duration">
    <option value="30">٣٠ دقيقة</option>
    <option value="40">٤٠ دقيقة</option>
    <option value="45">٤٥ دقيقة</option>
  </select>

  <button class="ok" id="startBtn">▶ ابدأ الحصّة الآن (أقل جهد)</button>

  <div id="prep" class="box"></div>
  <div id="sim" class="box"></div>
  <div id="expertBox" class="box expert"></div>
  <div id="support" class="box"></div>
</div>

</div>

<script>
const statusBox = document.getElementById("status");
const controls = document.getElementById("controls");
const imageInput = document.getElementById("imageInput");
const duration = document.getElementById("duration");
const prep = document.getElementById("prep");
const sim = document.getElementById("sim");
const expertBox = document.getElementById("expertBox");
const support = document.getElementById("support");

let imageFile = null;
let extractedText = "";
let coreQuestion = "ماذا لاحظت؟";
let lessonType = "استكشاف";
let attempts = 0;
let startTime = 0;

imageInput.addEventListener("change", loadImage);
document.getElementById("startBtn").addEventListener("click", startLesson);

function loadImage(e){
  imageFile = e.target.files[0];
  if(!imageFile) return;
  statusBox.textContent = "🔍 جارٍ قراءة الصفحة…";
  readImage();
}

async function readImage(){
  try{
    const result = await Tesseract.recognize(imageFile,"ara");
    extractedText = result.data.text || "";
    statusBox.textContent = "✅ تم استخراج النص من الصفحة";
  }catch(e){
    extractedText = "";
    statusBox.textContent = "⚠️ تعذّر الاستخراج – استخدام خطة آمنة";
  }
  analyzeText();
  controls.classList.remove("hidden");
}

function analyzeText(){
  if(/جمع|طرح|احسب|يساوي|عدد/.test(extractedText)){
    lessonType = "رياضيات";
    coreQuestion = "كيف توصلت إلى الناتج؟";
  }else if(/اقرأ|نص|كلمة|جملة/.test(extractedText)){
    lessonType = "لغة عربية";
    coreQuestion = "ماذا فهمت من النص؟";
  }else{
    lessonType = "استكشاف";
    coreQuestion = "ماذا لاحظت في الصفحة؟";
  }
}

function startLesson(){
  attempts = 1;
  startTime = Date.now();
  const mins = parseInt(duration.value,10);

  prep.textContent =
`📘 التحضير التنفيذي المبني على الصفحة:

نوع الدرس: ${lessonType}

ما يقوله المعلم حرفيًا:
"انظروا إلى الصفحة."
ثم:
«${coreQuestion}»
صمت ٣٠ ثانية.
محاولة طالب واحد فقط.
توقّف عند الفهم.`;

  sim.textContent =
`🎬 المحاكاة الصفّية الواقعية:

عرض المحتوى كما هو.
سؤال من نفس النص.
صمت.
محاولة واحدة.
تثبيت بجملة قصيرة.
إنهاء.`;

  expertBox.textContent =
`🧠 الخبير التربوي:
لا تُضِف شيئًا خارج الصفحة.
الصمت هنا يعمل.
الإنهاء المبكر جودة تربوية.`;

  support.textContent =
`📊 الدعم الكمي والنوعي والسلوكي:
عدد المحاولات: ${attempts}
الزمن التقريبي: ${Math.round((Date.now()-startTime)/60000)} دقيقة

الوصف النوعي:
"محاولة واحدة مستقلة – أداء مناسب."

التوصية السلوكية:
جملة رحيمة واحدة ثم التوقّف.`;
}
</script>

</body>
</html>
