<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الخبير التربوي — PRO</title>

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.7.2/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{font-family:Tahoma;background:#f4f6f8;margin:0}
.app{max-width:900px;margin:auto;padding:15px}
.card{background:#fff;padding:18px;margin:15px 0;border-radius:14px;box-shadow:0 5px 15px rgba(0,0,0,.08)}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:10px;background:#0d47a1;color:#fff;font-size:16px}
.box{background:#eef5ff;padding:12px;border-radius:10px;margin-top:10px;white-space:pre-wrap}
.progress{height:8px;background:#ddd;border-radius:10px;margin-top:10px}
.progress span{display:block;height:100%;width:0;background:#0d47a1}
</style>
</head>

<body>
<div class="app">

<div class="card">
<h3>📂 رفع الملفات</h3>
<input type="file" id="fileInput" multiple>
<button onclick="start()">ابدأ التحليل</button>
<div class="progress"><span id="bar"></span></div>
<div id="status" class="box">جاهز</div>
</div>

<div class="card">
<h3>🧠 التحليل الذكي</h3>
<div id="analysis" class="box"></div>
<button onclick="generateLesson()">🎯 توليد التحضير الكامل</button>
</div>

<div class="card">
<h3>📘 التحضير الجاهز</h3>
<div id="lesson" class="box"></div>
</div>

<div class="card">
<h3>🎛️ أدوات صفية</h3>
<button onclick="silent()">🛑 صمت 20 ثانية</button>
<div id="timer" class="box"></div>
</div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.js';

let files = [];
let fullText = "";
let worker = null;

// ================= START =================
async function start(){
  const input = document.getElementById("fileInput");
  files = Array.from(input.files).slice(0,3);

  if(files.length === 0) return;

  fullText = "";
  update("🔍 بدء التحليل...");

  for(let i=0;i<files.length;i++){
    const f = files[i];
    update(`📄 معالجة: ${f.name}`);

    let text = "";

    if(f.name.endsWith(".pdf")) text = await readPDF(f);
    else if(f.name.endsWith(".docx")) text = await readDOCX(f);
    else if(f.type.startsWith("image")) text = await readIMG(f);

    fullText += text + "\n\n";
    progress((i+1)/files.length);
  }

  update("✅ تم استخراج النص");
  analyze();
}

// ================= READERS =================
async function readPDF(file){
  const pdf = await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
  let text="";
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const c=await page.getTextContent();
    text+=c.items.map(i=>i.str).join(" ")+"\n";
  }
  return text;
}

async function readDOCX(file){
  const res = await mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()});
  return res.value;
}

async function readIMG(file){
  if(!worker){
    worker = await Tesseract.createWorker('ara');
    await worker.loadLanguage('ara');
    await worker.initialize('ara');
  }
  const r = await worker.recognize(file);
  return r.data.text;
}

// ================= ANALYSIS =================
function analyze(){
  const text = fullText.toLowerCase();

  let type="عام";
  if(/جمع|طرح|عدد|احسب/.test(text)) type="رياضيات";
  if(/حرف|كلمة|نص|قراءة/.test(text)) type="لغة";

  let keywords = extractKeywords(text);

  document.getElementById("analysis").textContent =
`📊 نوع المحتوى: ${type}

🧩 كلمات مفتاحية:
${keywords.join(" - ")}

🧠 حجم النص: ${text.length} حرف
`;

  window.lessonData = {type,keywords,text};
}

// ================= KEYWORDS =================
function extractKeywords(text){
  const words = text.split(/\s+/);
  const freq = {};
  words.forEach(w=>{
    if(w.length>3){
      freq[w]=(freq[w]||0)+1;
    }
  });

  return Object.entries(freq)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5)
    .map(x=>x[0]);
}

// ================= LESSON =================
function generateLesson(){

  const {type,keywords} = window.lessonData;

  let idea = `فهم ${keywords[0]}`;
  let question = `كيف نفسر ${keywords[0]}؟`;

  let lesson = `
🎯 الفكرة:
${idea}

❓ السؤال المركزي:
${question}

🎓 الأهداف:
- أن يفهم الطالب المفهوم
- أن يطبقه عملياً

🚀 النشاط:
اعرض مثال من الملف واطلب من الطلاب الحل

🧠 التفاعل:
فكر – شارك – ناقش

📏 التقييم:
سؤال تطبيقي مباشر

🔚 الإغلاق:
تلخيص سريع + سؤال أخير
`;

  document.getElementById("lesson").textContent = lesson;
}

// ================= TIMER =================
function silent(){
  let t=20;
  const el=document.getElementById("timer");

  const i=setInterval(()=>{
    el.textContent = `⏳ صمت: ${t}`;
    t--;
    if(t<0){
      clearInterval(i);
      el.textContent="✅ انتهى";
    }
  },1000);
}

// ================= HELPERS =================
function update(msg){
  document.getElementById("status").textContent = msg;
}

function progress(p){
  document.getElementById("bar").style.width = (p*100)+"%";
}

</script>
</body>
</html>
