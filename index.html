<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام المحاكاة التعليمية العميقة</title>

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f4f6f8;
  margin: 0;
  padding: 16px;
}

.container {
  background: #ffffff;
  max-width: 640px;
  margin: auto;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

label {
  font-weight: bold;
  display: block;
  margin-top: 12px;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 16px;
}

textarea {
  resize: vertical;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  font-size: 18px;
  background-color: #1976d2;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background-color: #125aa0;
}

.output textarea {
  height: 420px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="container">
<h2>إنشاء محاكاة تعليمية عميقة</h2>

<label>المادة</label>
<input id="subject">

<label>الصف</label>
<input id="grade">

<label>الوحدة</label>
<input id="unit">

<label>الدرس أو المفهوم</label>
<input id="lesson">

<label>مستوى الطلبة</label>
<select id="level">
  <option>ضعاف</option>
  <option selected>عادي</option>
  <option>موهوبين</option>
</select>

<label>نوع المحاكاة</label>
<select id="type">
  <option>عميقة</option>
  <option>علاجية</option>
  <option>إثرائية</option>
</select>

<label>الهدف العميق</label>
<textarea id="deepGoal"></textarea>

<button onclick="generateSimulation()">إنشاء المحاكاة</button>

<label>ناتج المحاكاة</label>
<textarea id="output"></textarea>
</div>

<script>
const GEMINI_API_KEY = "PUT_YOUR_API_KEY_HERE";

async function generateSimulation() {
  const subject = subject = document.getElementById("subject").value;
  const grade = document.getElementById("grade").value;
  const unit = document.getElementById("unit").value;
  const lesson = document.getElementById("lesson").value;
  const level = document.getElementById("level").value;
  const type = document.getElementById("type").value;
  const goal = document.getElementById("deepGoal").value;

  const prompt = `
أنت خبير تربوي معماري.
أنشئ محاكاة تعليمية ${type} عميقة موجّهة بالأسئلة.

المادة: ${subject}
الصف: ${grade}
الوحدة: ${unit}
الدرس: ${lesson}
مستوى الطلبة: ${level}
الهدف: ${goal}

التزم بالهيكل:
- افتراض حدسي
- موقف كاشف
- أسئلة موجِّهة
- تحوّل مفاهيمي
- تطبيق
- نقل تعلم
- تقويم عميق
`;

  output.value = "⏳ يتم التوليد...";

  try {
    const res = await fetch(
      "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash-latest:generateContent?key=" + GEMINI_API_KEY,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ role: "user", parts: [{ text: prompt }] }]
        })
      }
    );

    const data = await res.json();

    if (data.error) {
      output.value = "❌ خطأ:\n" + JSON.stringify(data.error, null, 2);
      return;
    }

    output.value = data.candidates[0].content.parts[0].text;

  } catch (e) {
    output.value = "❌ فشل الاتصال";
  }
}
</script>

</body>
</html>
