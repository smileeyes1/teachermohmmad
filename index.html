<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>النظام السيادي لتحضير الحصة</title>

<style>
:root{
  --main:#١٥٦٥c٠;
  --bg:#f٠f٣f٧;
  --card:#ffffff;
  --ink:#٣٣٣;
}
body{
  margin:٠;
  padding:١٢px;
  font-family:Tahoma, Arial, sans-serif;
  background:var(--bg);
  color:var(--ink);
}
.container{
  max-width:٨٥٠px;
  margin:auto;
  background:var(--card);
  padding:٢٠px;
  border-radius:١٦px;
  box-shadow:٠ ٦px ١٦px rgba(٠,٠,٠,.١٢);
}
header{
  text-align:center;
  margin-bottom:٢٠px;
}
header h١{
  margin:٠;
  font-size:٢٢px;
  color:var(--main);
}
header .sub{
  margin-top:٦px;
  font-size:١٤.٥px;
  color:#٤٤٤;
}
label{
  display:block;
  margin-top:١٤px;
  font-weight:bold;
  font-size:١٥px;
}
input,select,textarea,button{
  width:١٠٠%;
  margin-top:٦px;
  padding:١٤px;
  font-size:١٥px;
  border-radius:١٠px;
  border:١px solid #ccc;
  direction:rtl;
}
textarea{
  height:٥٤٠px;
  resize:vertical;
  white-space:pre-wrap;
  line-height:١.٩;
}
.hint{
  margin-top:٦px;
  padding:٨px ١٠px;
  background:#f٩fafa;
  border:١px dashed #ccc;
  border-radius:٨px;
  font-size:١٣.٥px;
  color:#٥٥٥;
}
.file-box{
  margin-top:١٢px;
  background:#f١f٥ff;
  border:١px solid #c٣d٣ff;
  border-radius:١٠px;
  padding:١٢px;
}
.file-name{
  margin-top:٨px;
  font-size:١٤px;
  color:#٠d٤٧a١;
}
.actions{
  display:flex;
  gap:١٠px;
  margin-top:٢٠px;
}
button{
  flex:١;
  background:var(--main);
  color:#fff;
  border:none;
  font-size:١٦px;
  cursor:pointer;
}
button.secondary{
  background:#٤٥٥a٦٤;
}
button:active{opacity:.٨٥}
.badge{
  margin-top:١٦px;
  padding:١٠px;
  text-align:center;
  font-size:١٤.٥px;
  border-radius:١٠px;
  background:#e٨f٥e٩;
  color:#١b٥e٢٠;
}
.error{
  margin-top:١٠px;
  font-weight:bold;
  color:#b٧١c١c;
}

@media print{
  header,label,input,select,button,.hint,.badge,.file-box,.error{display:none}
  textarea{
    border:none;
    height:auto;
    font-size:١٤pt;
  }
}
</style>
</head>

<body>

<div class="container">

<header>
  <h١>النظام السيادي لتحضير الحصة</h١>
  <div class="sub">
    إعداد: <b>محمد وجيه</b> — مدرسة <b>عاطوف المختلطة</b>
  </div>
</header>

<label>المادة</label>
<select id="subject">
  <option>اللغة العربية</option>
  <option>الرياضيات</option>
</select>

<label>الصف</label>
<select id="grade">
  <option>الصف الأول</option>
  <option>الصف الثاني</option>
</select>

<label>عنوان الدرس</label>
<input id="lesson" placeholder="كما ورد في الكتاب">

<label>رفع ملف الكتاب (PDF أو صورة)</label>
<div class="file-box">
  <input type="file" id="bookFile" accept=".pdf,image/*">
  <div id="fileName" class="file-name">لم يتم رفع ملف بعد</div>
  <div class="hint">
    الغرض تنظيمي فقط — لا شرح، لا تحليل محتوى
  </div>
</div>

<div id="err" class="error"></div>

<label>سؤال الحصة الواحد 🔒</label>
<input id="question" placeholder="سؤال واحد ثابت من البداية للنهاية">

<label>الفكرة المقفولة 🔒</label>
<input id="concept" placeholder="جملة قصيرة سينطقها تلميذ">

<label>مدة الحصة</label>
<select id="duration">
  <option value="٤٠">٤٠ دقيقة</option>
  <option value="٤٥">٤٥ دقيقة</option>
</select>

<div class="actions">
  <button onclick="build()">✅ توليد الحصة</button>
  <button class="secondary" onclick="window.print()">🖨️ طباعة</button>
</div>

<div class="badge">
🛡️ التلميذ يفكّر — المعلّم يُدير الصمت
</div>

<textarea id="output" placeholder="ستظهر الحصة الجاهزة هنا..."></textarea>

</div>

<script>
const MAX_SIZE_MB = ٥;

const fileInput   = document.getElementById("bookFile");
const fileNameBox = document.getElementById("fileName");
const errBox      = document.getElementById("err");

fileInput.addEventListener("change", function(){
  const f = this.files[٠];
  errBox.textContent = "";
  fileNameBox.textContent = "لم يتم رفع ملف بعد";

  if(!f) return;

  const allowed = f.type === "application/pdf" || f.type.startsWith("image/");
  if(!allowed){
    this.value="";
    error("❌ نوع الملف غير مدعوم — PDF أو صورة فقط");
    return;
  }

  const sizeMB = (f.size/(١٠٢٤*١٠٢٤)).toFixed(٢);
  if(sizeMB > MAX_SIZE_MB){
    this.value="";
    error("❌ حجم الملف أكبر من المسموح (٥ MB)");
    return;
  }

  fileNameBox.innerHTML =
    `📘 <b>${f.name}</b><br>
     النوع: ${f.type}<br>
     الحجم: ${sizeMB} MB`;

  if(f.type.startsWith("image/")){
    const reader=new FileReader();
    reader.onload=e=>{
      const img=document.createElement("img");
      img.src=e.target.result;
      img.style.maxWidth="١٠٠%";
      img.style.marginTop="١٠px";
      img.style.borderRadius="١٠px";
      fileNameBox.appendChild(img);
    };
    reader.readAsDataURL(f);
  }
});

function error(msg){
  errBox.textContent = msg;
}

function build(){
  errBox.textContent = "";
  const subject  = subjectEl().value;
  const grade    = gradeEl().value;
  const lesson   = lessonEl().value || "—";
  const question = questionEl().value.trim();
  const concept  = conceptEl().value.trim();
  const duration = durationEl().value;
  const file     = fileInput.files[٠];
  const out      = document.getElementById("output");

  if(!question || !concept){
    error("❌ سؤال الحصة والفكرة المقفولة عنصران إلزاميان");
    return;
  }

  out.value =
`تحضير حصة صفّية سيادية

المدرسة: عاطوف المختلطة
المعلّم: محمد وجيه

المادة: ${subject}
الصف: ${grade}
الدرس: ${lesson}
المدة: ${duration} دقيقة

ملف الكتاب:
${file ? file.name + " (" + (file.size/(١٠٢٤*١٠٢٤)).toFixed(٢) + " MB)" : "غير مرفق"}

سؤال الحصة الواحد:
«${question}»

الفكرة المقفولة:
«${concept}»

بنية التنفيذ السيادي:
١) طرح السؤال فقط.
٢) مثال واحد من الكتاب.
٣) صمت مقصود للتفكير.
٤) تلميذ واحد ينطق الفكرة.
٥) تثبيت قصير ثم إغلاق.

مبدأ الحصة:
الصمت أداة.
التفكير هدف.
النطق دليل الفهم.
`;
}

const subjectEl  = ()=>document.getElementById("subject");
const gradeEl    = ()=>document.getElementById("grade");
const lessonEl   = ()=>document.getElementById("lesson");
const questionEl = ()=>document.getElementById("question");
const conceptEl  = ()=>document.getElementById("concept");
const durationEl = ()=>document.getElementById("duration");
</script>

</body>
</html>
