<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النظام السيادي لتحضير الحصة</title>

<style>
:root{
  --main:#1565c0;
  --bg:#eef2f6;
  --card:#ffffff;
  --ink:#333;
}
body{
  margin:٠;
  padding:١٢px;
  font-family: Tahoma, Arial, sans-serif;
  background:linear-gradient(135deg,#e3f2fd,#f1f8e9);
  color:var(--ink);
}
.container{
  max-width:٨٥٠px;
  margin:auto;
  background:var(--card);
  padding:٢٠px;
  border-radius:١٦px;
  box-shadow:0 ٦px ١٦px rgba(0,0,0,.١٢);
}
header{
  text-align:center;
  margin-bottom:٢٠px;
}
header h1{
  margin:٠;
  font-size:٢٢px;
  color:var(--main);
}
header p{
  margin-top:٦px;
  font-size:١٤.٥px;
}
label{
  display:block;
  margin-top:١٤px;
  font-weight:bold;
}
input,select,textarea,button{
  width:١٠٠%;
  margin-top:٦px;
  padding:١٤px;
  font-size:١٥px;
  border-radius:١٠px;
  border:١px solid #ccc;
  direction:rtl;
}
textarea{
  height:٤٨٠px;
  resize:vertical;
  white-space:pre-wrap;
  line-height:١.٨;
}
.file-box{
  margin-top:١٢px;
  background:#f1f5ff;
  border:١px solid #c3d3ff;
  border-radius:١٠px;
  padding:١٢px;
}
.file-name{
  margin-top:٨px;
  font-size:١٤px;
  color:#0d47a1;
}
.actions{
  display:flex;
  gap:١٠px;
  margin-top:٢٠px;
}
button{
  flex:١;
  background:var(--main);
  color:#ffffff;
  border:none;
  font-size:١٦px;
  cursor:pointer;
}
button.secondary{
  background:#455a64;
}
button:active{opacity:.٨٥}
.notice{
  margin-top:١٠px;
  color:red;
  font-weight:bold;
}
.badge{
  margin-top:١٦px;
  padding:١٠px;
  text-align:center;
  font-size:١٤.٥px;
  border-radius:١٠px;
  background:#e8f5e9;
  color:#1b5e20;
}
@media print{
  header,label,input,select,button,.notice,.badge,.file-box{display:none}
  textarea{border:none;height:auto;font-size:١٤pt}
}
</style>
</head>

<body>

<div class="container">

<header>
  <h1>النظام السيادي لتحضير الحصة</h1>
  <p><b>محمد وجيه</b> — مدرسة <b>عاطوف المختلطة</b></p>
</header>

<label>المادة</label>
<select id="subject">
  <option>اللغة العربية</option>
  <option>الرياضيات</option>
</select>

<label>الصف</label>
<select id="grade">
  <option>الصف الأول</option>
  <option>الصف الثاني</option>
</select>

<label>عنوان الدرس</label>
<input id="lesson" placeholder="كما ورد في الكتاب">

<label>رفع ملف الكتاب (PDF أو صورة)</label>
<div class="file-box">
  <input type="file" id="bookFile" accept=".pdf,image/*">
  <div id="fileName" class="file-name">لم يتم رفع ملف بعد</div>
</div>

<label>سؤال الحصة الواحد 🔒</label>
<input id="question">

<label>الفكرة المقفولة 🔒</label>
<input id="concept">

<label>مدة الحصة</label>
<select id="duration">
  <option value="٤٠">٤٠ دقيقة</option>
  <option value="٤٥">٤٥ دقيقة</option>
</select>

<div class="actions">
  <button onclick="build()">✅ توليد الحصة</button>
  <button class="secondary" onclick="test()">🧪 اختبار فوري</button>
</div>

<div id="err" class="notice"></div>

<div class="badge">
🛡️ التلميذ يفكّر — المعلّم يُدير الصمت
</div>

<textarea id="output" placeholder="ستظهر الحصة الجاهزة هنا..."></textarea>

</div>

<script>
document.getElementById("bookFile").addEventListener("change",function(){
  const f=this.files[٠];
  document.getElementById("fileName").textContent =
    f ? "📘 تم رفع الملف: " + f.name : "لم يتم رفع ملف بعد";
});

function build(){
  const err=document.getElementById("err");
  const out=document.getElementById("output");
  err.textContent="";

  const subject=document.getElementById("subject").value;
  const grade=document.getElementById("grade").value;
  const lesson=document.getElementById("lesson").value || "—";
  const question=document.getElementById("question").value.trim();
  const concept=document.getElementById("concept").value.trim();
  const duration=document.getElementById("duration").value;
  const fileEl=document.getElementById("bookFile");
  const file=fileEl.files[٠];

  if(!question || !concept){
    err.textContent="❌ يجب إدخال سؤال الحصة والفكرة المقفولة";
    return;
  }

  out.value =
`تحضير حصة صفّية سيادية

المدرسة: عاطوف المختلطة
المعلّم: محمد وجيه

المادة: ${subject}
الصف: ${grade}
الدرس: ${lesson}
المدة: ${duration} دقيقة
الكتاب المرفق: ${file ? file.name : "غير مرفق"}

سؤال الحصة الواحد:
«${question}»

الفكرة المقفولة:
«${concept}»

بنية التنفيذ السيادي:
١) طرح السؤال فقط.
٢) مثال واحد من الكتاب.
٣) صمت مقصود للتفكير.
٤) تلميذ واحد ينطق الفكرة.
٥) تثبيت قصير ثم إغلاق.

مبدأ الحصة:
الصمت أداة.
التفكير هدف.
النطق دليل الفهم.
`;
}

function test(){
  document.getElementById("lesson").value="درس تجريبي";
  document.getElementById("question").value="ما الحرف الأول؟";
  document.getElementById("concept").value="الحرف الأول هو ب";
  build();
}
</script>

</body>
</html>
