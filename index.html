<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النظام السيادي الذكي الشامل</title>

<!-- ✅ تحميل صحيح لـ Tesseract.js -->
https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js</script>

<!-- ✅ سياسة أمان متوافقة مع OCR -->
<meta http-equiv="Content-Security-Policy"
content="
default-src 'self';
script-src 'self' https://cdn.jsdelivr.net 'unsafe-eval';
worker-src 'self' blob: https://cdn.jsdelivr.net;
connect-src 'self' https://cdn.jsdelivr.net;
img-src 'self' data: blob:;
style-src 'self' 'unsafe-inline';
base-uri 'none';
">

<style>
:root{
  --main:#0d47a1;
  --bg:#f4f6f8;
  --card:#ffffff;
  --ink:#222;
  --ok:#2e7d32;
  --warn:#777;
}

body{
  margin:0;
  font-family:Tahoma,Arial,sans-serif;
  background:var(--bg);
  color:var(--ink);
}

.app{
  max-width:900px;
  margin:auto;
  padding:16px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  box-shadow:0 6px 20px rgba(0,0,0,.08);
  margin-bottom:16px;
}

h1{text-align:center;color:var(--main)}

button,input,select{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  font-size:16px;
}

button{background:var(--main);color:#fff;cursor:pointer}
button.ok{background:var(--ok)}
button.warn{background:var(--warn)}
button:disabled{opacity:.6}

.box{
  background:#fafafa;
  padding:16px;
  border-radius:14px;
  margin-top:12px;
  white-space:pre-wrap;
}

.progress{
  height:8px;
  background:#ddd;
  border-radius:8px;
  overflow:hidden;
  margin-top:10px;
}
.progress span{
  display:block;
  height:100%;
  width:0%;
  background:var(--main);
}

.hidden{display:none}

body.class-mode{
  background:#fff;
}
body.class-mode .card:not(#lessonCard){display:none}
body.class-mode h1{display:none}
</style>
</head>

<body>

<div class="app">
<h1>النظام السيادي الذكي الشامل</h1>

<div class="card">
<h3>📘 إدراج صفحة الدرس</h3>
<input type="file" id="fileInput" accept="image/*">
<div class="progress"><span id="bar"></span></div>
<div id="status" class="box">— بانتظار اختيار صورة —</div>
</div>

<div class="card hidden" id="lessonCard">

<label>مدة الحصة</label>
<select id="duration">
  <option value="30">٣٠ دقيقة</option>
  <option value="40">٤٠ دقيقة</option>
  <option value="45">٤٥ دقيقة</option>
</select>

<button class="ok" id="startBtn" disabled>▶ ابدأ الحصة</button>
<button class="warn" onclick="enterClassMode()">🎯 وضع الصف</button>
<button class="warn" onclick="smartSilence()">🛑 صمت ذكي</button>

<div id="prep" class="box"></div>
<div id="sim" class="box"></div>
<div id="support" class="box"></div>

</div>
</div>

<script>
const $=id=>document.getElementById(id);

const state={
  text:"",
  type:"استكشاف",
  question:"ماذا ترى في الصفحة؟"
};

const fileInput=$("fileInput");
const status=$("status");
const bar=$("bar");
const lessonCard=$("lessonCard");
const startBtn=$("startBtn");
const duration=$("duration");
const prep=$("prep");
const sim=$("sim");
const support=$("support");

fileInput.addEventListener("change",handleImage);
startBtn.addEventListener("click",startLesson);

function normalizeArabic(t){
  return (t||"")
  .replace(/[^\u0600-\u06FF\s]/g,"")
  .replace(/\s+/g," ")
  .trim();
}

function validImage(f){
  return f && f.type.startsWith("image/") && f.size<=5*1024*1024;
}

async function handleImage(){
  const file=fileInput.files[0];
  if(!validImage(file)){
    status.textContent="⚠️ يرجى اختيار صورة صالحة بحجم آمن.";
    return;
  }

  status.textContent="🔍 جارٍ قراءة الصفحة...";
  bar.style.width="10%";
  startBtn.disabled=true;

  try{
    const res=await Tesseract.recognize(file,"ara",{
      logger:m=>{
        if(m.progress!=null){
          bar.style.width=Math.round(m.progress*80+10)+"%";
        }
      }
    });
    state.text=normalizeArabic(res.data.text);
    analyze();
    status.textContent="✅ تم استخراج النص.";
  }catch{
    state.text="";
    analyze();
    status.textContent="✅ تعذّر الاستخراج — سنعمل مباشرة.";
  }

  bar.style.width="100%";
  lessonCard.classList.remove("hidden");
  startBtn.disabled=false;
}

function analyze(){
  const t=state.text;

  if(/جمع|طرح|يساوي|احسب/.test(t)){
    state.type="رياضيات";
    state.question="كيف توصلت للإجابة؟";
  }
  else if(/اقرأ|كلمة|نص|جملة/.test(t)){
    state.type="لغة عربية";
    state.question="ماذا فهمت من النص؟";
  }
  else{
    state.type="استكشاف";
    state.question="ماذا ترى في الصفحة؟";
  }
}

function startLesson(){
  prep.textContent=
`📘 نوع الدرس: ${state.type}
ما سيقوله المعلم:
"انظروا إلى الصفحة."
«${state.question}»
صمت.`

  sim.textContent=
`🎬 التنفيذ:
عرض الصفحة.
سؤال واحد.
محاولة واحدة.
الإنهاء المبكر مقبول.`

  support.textContent=
`⏱️ المدة المختارة: ${duration.value} دقيقة
القاعدة:
القليل المتقن خير من الكثير المربك.`

  startBtn.disabled=true;
}

function smartSilence(){
  prep.textContent="✅ الصف يعمل.";
  sim.textContent="";
  support.textContent="";
}

function enterClassMode(){
  document.body.classList.toggle("class-mode");
}
</script>

</body>
</html>
