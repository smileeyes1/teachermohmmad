<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>التحضير السيادي للحصّة</title>

  <style>
    body{
      font-family: "Tahoma", Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .container{
      max-width: 700px;
      margin: 20px auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    h1{
      margin-top: 0;
      text-align: center;
      color: #2c3e50;
    }

    label{
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, select, textarea{
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
      box-sizing: border-box;
    }

    textarea{
      resize: vertical;
    }

    button{
      margin-top: 20px;
      width: 100%;
      background: #2c7be5;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover{
      background: #1a5fc2;
    }

    .file-box{
      margin-top: 10px;
      background: #f0f3f7;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
    }

    #err{
      margin-top: 10px;
      color: #c0392b;
      font-weight: bold;
    }

    #output{
      margin-top: 20px;
      height: 260px;
      font-family: "Courier New", monospace;
    }

    small{
      color: #666;
      display: block;
      margin-top: 5px;
    }

    @media (max-width: 600px){
      .container{
        margin: 10px;
        padding: 15px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>التحضير السيادي للحصّة</h1>

  <label>المادة</label>
  <input id="subject">

  <label>الصف</label>
  <input id="grade">

  <label>اسم الدرس</label>
  <input id="lesson">

  <label>مدة الحصة (بالدقائق)</label>
  <input id="duration">

  <label>سؤال الحصة الواحد</label>
  <input id="question">

  <label>الفكرة المقفولة</label>
  <input id="concept">

  <label>ملف الكتاب (PDF أو صورة)</label>
  <input type="file" id="bookFile" accept=".pdf,image/*">
  <small>📎 مسموح أي حجم ملف</small>

  <div id="fileName" class="file-box">
    لم يتم رفع ملف بعد
  </div>

  <div id="err"></div>

  <button onclick="build()">بناء التحضير</button>

  <textarea id="output" readonly placeholder="سيظهر التحضير هنا..."></textarea>
</div>

<script>
"use strict";

/* العناصر */
const fileInput   = document.getElementById("bookFile");
const fileNameBox = document.getElementById("fileName");
const errBox      = document.getElementById("err");
const outputBox   = document.getElementById("output");

/* اختصارات */
const subjectEl  = () => document.getElementById("subject");
const gradeEl    = () => document.getElementById("grade");
const lessonEl   = () => document.getElementById("lesson");
const questionEl = () => document.getElementById("question");
const conceptEl  = () => document.getElementById("concept");
const durationEl = () => document.getElementById("duration");

function clearUI(){
  errBox.textContent = "";
  fileNameBox.textContent = "لم يتم رفع ملف بعد";
}

function error(msg){
  errBox.textContent = msg;
}

/* رفع الملف */
fileInput.addEventListener("change", function(){
  clearUI();
  const file = this.files[٠];
  if(!file) return;

  const allowed =
    file.type === "application/pdf" ||
    file.type.startsWith("image/");

  if(!allowed){
    this.value = "";
    error("❌ نوع الملف غير مدعوم (PDF أو صورة فقط)");
    return;
  }

  const sizeMB = (file.size / (١٠٢٤ * ١٠٢٤)).toFixed(٢);

  fileNameBox.innerHTML = `
📘 <b>${file.name}</b><br>
النوع: ${file.type}<br>
الحجم: ${sizeMB} MB
  `;

  if(file.type.startsWith("image/")){
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.src = e.target.result;
      img.style.maxWidth = "١٠٠٪";
      img.style.marginTop = "١٠px";
      img.style.borderRadius = "١٠px";
      fileNameBox.appendChild(img);
    };
    reader.readAsDataURL(file);
  }
});

/* بناء التحضير */
function build(){
  errBox.textContent = "";

  const subject  = subjectEl().value;
  const grade    = gradeEl().value;
  const lesson   = lessonEl().value || "—";
  const question = questionEl().value.trim();
  const concept  = conceptEl().value.trim();
  const duration = durationEl().value;
  const file     = fileInput.files[٠];

  if(!question || !concept){
    error("❌ يجب إدخال سؤال الحصة والفكرة المقفولة");
    return;
  }

  outputBox.value = `
تحضير حصة صفّية سيادية

المدرسة: عاطوف المختلطة
المعلّم: محمد وجيه

المادة: ${subject}
الصف: ${grade}
الدرس: ${lesson}
المدة: ${duration} دقيقة

ملف الكتاب:
${file ? `${file.name} (${(file.size/١٠٢٤/١٠٢٤).toFixed(٢)} MB)` : "غير مرفق"}

سؤال الحصة الواحد:
«${question}»

الفكرة المقفولة:
«${concept}»

بنية التنفيذ السيادي:
١) طرح السؤال فقط
٢) مثال واحد من الكتاب
٣) صمت مقصود
٤) نطق تلميذ واحد
٥) تثبيت ثم إغلاق

مبدأ الحصة:
الصمت أداة
التفكير هدف
النطق دليل
`.trim();
}
</script>

</body>
</html>
