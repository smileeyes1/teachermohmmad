<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أداة التدريس بالاختيار — الإرشاد الصامت</title>

<style>
:root{
  --main:#1a5fb4;
  --bg:#f3f5f8;
  --card:#ffffff;
  --soft:#eef2f6;
  --ink:#1f2933;
  --muted:#6b7280;
  --success:#2e7d32;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Tahoma, Arial, sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.85;
}

.app{
  max-width:820px;
  margin:24px auto;
  padding:16px;
}

.header{
  background:var(--card);
  padding:22px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 6px 20px rgba(0,0,0,.06);
  margin-bottom:22px;
}

.header h1{
  margin:0;
  font-size:22px;
  color:var(--main);
}

.header p{
  margin-top:8px;
  font-size:14px;
  color:var(--muted);
}

.card{
  background:var(--card);
  padding:22px;
  border-radius:16px;
  box-shadow:0 4px 16px rgba(0,0,0,.06);
  margin-bottom:20px;
}

h2{
  margin:0 0 12px 0;
  font-size:18px;
}

.buttons{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:12px;
}

button{
  flex:1;
  min-width:160px;
  padding:14px 16px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  font-size:15px;
  background:var(--main);
  color:#fff;
}

button.alt{
  background:#455a64;
}

#whisper{
  display:none;
  background:var(--soft);
  padding:22px;
  border-radius:16px;
  font-size:16px;
  margin-bottom:20px;
}

#end{
  display:none;
  background:#e8f5e9;
  padding:22px;
  border-radius:16px;
  font-size:16px;
  color:var(--success);
  margin-bottom:20px;
}

.footer{
  text-align:center;
  font-size:13px;
  color:var(--muted);
  margin-top:22px;
}

@media print{
  button,.buttons{display:none}
}
</style>
</head>

<body>

<div class="app">

<!-- العنوان -->
<div class="header">
  <h1>أداة التدريس بالاختيار</h1>
  <p>اختر فقط — الإرشاد يهمس — ثم ينسحب</p>
</div>

<!-- المرحلة ١: اختيار الصف (اختيار سياقي فقط، بلا كتابة) -->
<div class="card" id="step1">
  <h2>أين أنت الآن؟</h2>
  <div class="buttons">
    <button onclick="goStep(2)">الصف الأوّل</button>
    <button onclick="goStep(2)">الصف الثاني</button>
    <button onclick="goStep(2)">الصف الثالث</button>
  </div>
</div>

<!-- المرحلة ٢: اختيار نوع الدرس (بديل عنوان الدرس) -->
<div class="card" id="step2" style="display:none">
  <h2>هذا الدرس من نوع:</h2>
  <div class="buttons">
    <button onclick="goStep(3)">قراءة</button>
    <button onclick="goStep(3)">حساب</button>
    <button onclick="goStep(3)">لغة</button>
    <button onclick="goStep(3)">نشاط</button>
    <button onclick="goStep(3)">مراجعة</button>
  </div>
</div>

<!-- المرحلة ٣: اختيار اللحظة الصفّية (القلب الحقيقي) -->
<div class="card" id="step3" style="display:none">
  <h2>أي وصف أقرب لما يحدث الآن؟</h2>
  <div class="buttons">
    <button onclick="whisper('🧭 انتظر محاولة واحدة فقط. لا تشرح.')">
      التلاميذ يحاولون لكن مترددون
    </button>
    <button onclick="whisper('🧭 توقّف عن الإضافة. عد للأبسط.')">
      الشرح بدأ يطول
    </button>
    <button onclick="endLesson()">
      أشعر أنهم فهموا
    </button>
  </div>
</div>

<!-- الإرشاد الصامت -->
<div id="whisper"></div>

<!-- الإغلاق الطبيعي -->
<div id="end">
  ✅ التعلّم حدث.  
  يمكنك التوقّف الآن دون شعور بالتقصير.
</div>

<div class="footer">
  أداة داعمة للمعلّم — بلا كتابة، بلا تحليل، بلا محاسبة، وبلا أي اعتماد.
</div>

</div>

<script>
function goStep(n){
  const prev = document.getElementById("step"+(n-1));
  if(prev) prev.style.display="none";
  document.getElementById("step"+n).style.display="block";
}

function whisper(text){
  const w = document.getElementById("whisper");
  w.style.display="block";
  w.textContent = text;
}

function endLesson(){
  const w = document.getElementById("whisper");
  w.style.display="none";
  document.getElementById("end").style.display="block";
}
</script>

</body>
</html>
