<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>محرك المحاكاة الصفّية التربوية – نسخة كاملة</title>

<!--
© حقوق محفوظة
مشروع تعليمي مستقل – استخدام غير تجاري
-->

<style>
body{
  font-family: Tahoma, Arial, sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:16px;
  direction:rtl;
}
.container{
  background:#ffffff;
  max-width:1000px;
  margin:auto;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 8px rgba(0,0,0,.1);
}
h1,h2{text-align:center;}
label{font-weight:bold;display:block;margin-top:10px;}
input, textarea, select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:15px;
  direction:rtl;
  text-align:right;
}
textarea{resize:vertical;}
.actions{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:16px 0;
}
button{
  padding:12px;
  font-size:15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#1976d2;
  color:#fff;
}
button.secondary{background:#455a64;}
button.alt{background:#009688;}
button.warn{background:#ffa000;}
button.danger{background:#d32f2f;}
button:hover{opacity:.9;}

.output textarea{
  height:600px;
  white-space:pre-wrap;
  font-size:14.5px;
  line-height:1.8;
}

.teacher-only{
  background:#eef3f8;
  border-right:4px solid #1976d2;
  padding:10px;
  margin-top:12px;
}
.print-view .teacher-only{display:none;}

@media print{
  .actions,label,input,select,small{display:none!important;}
  .container{box-shadow:none;}
  .output textarea{
    border:none;
    height:auto;
    font-size:14pt;
    line-height:1.9;
  }
}
small{color:#555;}
</style>
</head>

<body>

<div class="container">
<h1>محرك محاكاة الحصة الصفّية التربوية</h1>

<label>المادة</label>
<input id="subject" placeholder="رياضيات – علوم – لغة عربية">

<label>الصف</label>
<input id="grade" placeholder="الثاني – الخامس">

<label>الدرس / المفهوم</label>
<input id="lesson" placeholder="المقارنة بين عددين – الجملة الاسمية">

<label>مدة الحصة</label>
<select id="duration">
  <option value="40">٤٠ دقيقة</option>
  <option value="45">٤٥ دقيقة</option>
</select>

<label>نمط التنفيذ</label>
<select id="delivery">
  <option value="face">وجاهي داخل الصف</option>
  <option value="teams">عبر Microsoft Teams</option>
</select>

<label>نوع المحاكاة</label>
<select id="mode">
  <option value="engine">محاكاة تعليمية منظمة</option>
  <option value="classroom">محاكاة حصة صفية واقعية متعددة المسارات</option>
</select>

<label>رفع ملف كتاب (TXT أو PDF)</label>
<input type="file" id="bookFile" accept=".txt,.pdf">
<small>يستخدم محتوى الكتاب كمرجع تربوي داخل المحاكاة فقط</small>

<div class="actions">
  <button onclick="build()">🧠 إنشاء المحاكاة</button>
  <button class="secondary" onclick="teacherView()">👩‍🏫 عرض المعلم</button>
  <button class="secondary" onclick="printView()">🧾 عرض الطباعة</button>
  <button class="alt" onclick="scenario('good')">🟢 متفاعلون</button>
  <button class="warn" onclick="scenario('mixed')">🟡 مختلفون</button>
  <button class="danger" onclick="scenario('weak')">🔴 متعثرون</button>
  <button onclick="window.print()">🖨️ طباعة / حفظ PDF</button>
</div>

<h2>ناتج المحاكاة</h2>
<div class="output">
<textarea id="out"></textarea>
</div>

<h2>🧠 انعكاس ما بعد الحصة</h2>
<textarea id="reflection" placeholder="
• ماذا نجح؟
• أين تدخّلت أكثر من اللازم؟
• ما الذي سأغيّره في الحصة القادمة؟
"></textarea>
<button onclick="saveReflection()">💾 حفظ الانعكاس</button>

</div>

<!-- مكتبة PDF.js -->
https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.jsscript>

<script>
let bookContent="";

/* قراءة ملف الكتاب */
document.getElementById("bookFile").addEventListener("change", e=>{
  const file=e.target.files[0];
  if(!file)return;
  if(file.name.toLowerCase().endsWith(".txt")){
    const r=new FileReader();
    r.onload=ev=>{bookContent=ev.target.result||"";alert("✅ تم تحميل نص الكتاب");};
    r.readAsText(file,"UTF-8");
  }
  else if(file.name.toLowerCase().endsWith(".pdf")){
    readPDF(file);
  }
  else alert("❌ ملف غير مدعوم");
});

async function readPDF(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let t="";
  for(let i=1;i<=pdf.numPages;i++){
    const p=await pdf.getPage(i);
    const c=await p.getTextContent();
    c.items.forEach(it=>t+=(it.str||" ")+" ");
  }
  bookContent=t;
  alert("✅ تم تحميل كتاب PDF");
}

/* بناء المحاكاة */
function build(){
  const s=val("subject","غير محددة");
  const g=val("grade","غير محدد");
  const l=val("lesson","غير محدد");
  const d=duration.value;
  const del=delivery.value;
  const m=mode.value;

  const timePlan=d=="40"
    ?"تمهيد 5د ✔\nنقاش 15د ✔\nتحول مفاهيمي 8د ✔\nتطبيق 7د ✔\nإغلاق 5د ✔"
    :"تمهيد 7د ✔\nنقاش 18د ✔\nتحول مفاهيمي 8د ✔\nتطبيق 7د ✔\nإغلاق 5د ✔";

  const execGuide=del=="face"
    ?"• استخدم الصمت\n• راقب لغة الجسد\n• حوار مباشر"
    :"• زمن تفكير 30 ثانية\n• الرد عبر الدردشة\n• غرف فرعية";

  const ref=bookContent?bookContent.slice(0,600):"لا يوجد كتاب مرفوع";

  out.value = (m=="engine"
?`
محاكاة تعليمية منظمة

المادة: ${s}
الصف: ${g}
الدرس: ${l}

1) افتراض حدسي ⇒ لماذا يبدو صحيحًا؟
2) موقف كاشف ⇒ إظهار القصور
3) قرار واحد ⇒ تفسير واحد
4) تحول مفاهيمي ⇒ الجوهر
5) تطبيق ونقل تعلم

الإطار الزمني:
${timePlan}

مرجع من الكتاب:
${ref}

`
:`
محاكاة حصة صفية واقعية متعددة المسارات

المادة: ${s}
الصف: ${g}
الدرس: ${l}
مدة الحصة: ${d} دقيقة
نمط التنفيذ: ${del=="face"?"وجاهي":"Teams"}

فتح الحصة بسؤال واقعي مفتوح.

🔀 المسارات:
• صحيح ⇒ تعميم
• مختلف ⇒ تفكيك
• خطأ واسع ⇒ تمثيل حسي

نقطة القرار:
قرار واحد + تبرير

اختبار الصمت:
20 ثانية

الإطار الزمني:
${timePlan}

مرجع من الكتاب:
${ref}

[إرشاد المعلم]
${execGuide}
`
).trim();
}

/* مسارات لحظية */
function scenario(t){
  if(t=="good") out.value+="\n\n✅ المسار الأخضر: تعميق المثال وعدم التسمية المبكرة";
  if(t=="mixed") out.value+="\n\n🟡 المسار الأصفر: طلب التفكيك ومنع الإجابة السريعة";
  if(t=="weak") out.value+="\n\n🔴 المسار الأحمر: تبسيط وتمثيل حسي";
}

/* عرض */
function teacherView(){document.body.classList.remove("print-view");}
function printView(){document.body.classList.add("print-view");}

/* انعكاس */
function saveReflection(){
  if(!reflection.value)return alert("لا يوجد نص");
  const L=JSON.parse(localStorage.getItem("reflections")||"[]");
  L.push({time:new Date().toLocaleString(),text:reflection.value});
  localStorage.setItem("reflections",JSON.stringify(L));
  alert("✅ تم حفظ الانعكاس");
}

/* أداة */
function val(id,def){return document.getElementById(id).value||def;}
</script>

</body>
</html>
