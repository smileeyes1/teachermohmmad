<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محرك المحاكاة التعليمية العميقة – الإصدار 1.0</title>

<style>
body {
  font-family: "Tahoma", Arial, sans-serif;
  background-color: #f4f6f8;
  margin: 0;
  padding: 16px;
  direction: rtl;
}

.container {
  background: #ffffff;
  max-width: 820px;
  margin: auto;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

label {
  font-weight: bold;
  display: block;
  margin-top: 12px;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 15px;
  direction: rtl;
  text-align: right;
}

textarea {
  resize: vertical;
}

small {
  color: #666;
}

button {
  padding: 12px;
  font-size: 15px;
  background-color: #1976d2;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button.secondary { background-color: #455a64; }
button:hover { opacity: 0.9; }

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 16px;
}

.output textarea {
  height: 520px;
  white-space: pre-wrap;
  font-size: 14.5px;
  line-height: 1.7;
}

.teacher-only {
  background: #eef3f8;
  border-right: 4px solid #1976d2;
  padding: 10px;
  margin-top: 12px;
}

/* إخفاء إرشادات المعلم في وضع الطباعة */
.print-view .teacher-only {
  display: none;
}

/* ===== الطباعة العربية ===== */
@media print {
  body { background:#fff; margin:0; }
  .controls, input, select, label, small { display:none !important; }
  .container { box-shadow:none; max-width:100%; padding:10mm 12mm; }
  .output textarea {
    border:none; height:auto;
    font-size:14pt; line-height:1.8;
  }
}
</style>
</head>

<body>

<div class="container">
<h1>محرك المحاكاة التعليمية العميقة</h1>

<label>المادة</label>
<input id="subject" placeholder="رياضيات – علوم – لغة عربية">

<label>الصف</label>
<input id="grade" placeholder="الثاني – الخامس">

<label>الدرس / المفهوم</label>
<input id="lesson" placeholder="المقارنة بين عددين – الجملة الاسمية">

<label>مستوى الطلبة</label>
<select id="level">
  <option>ضعاف</option>
  <option selected>عادي</option>
  <option>موهوبين</option>
</select>

<label>نوع المحاكاة</label>
<select id="type">
  <option>عميقة</option>
  <option>علاجية</option>
  <option>إثرائية</option>
</select>

<label>الهدف العميق (اختياري)</label>
<textarea id="deepGoal" placeholder="ما الذي تريد أن يتغير في طريقة تفكير الطالب؟"></textarea>

<label>رفع ملف الكتاب (TXT أو PDF)</label>
<input type="file" id="bookFile" accept=".txt,.pdf">
<small>يُستخدم محتوى الكتاب كمرجع للمحاكاة دون نسخه أو عرضه كاملًا</small>

<div class="controls">
<button onclick="generateSimulation()">🧠 إنشاء المحاكاة</button>
<button class="secondary" onclick="showTeacherView()">👩‍🏫 عرض المعلم</button>
<button class="secondary" onclick="showPrintView()">🧾 عرض الطباعة</button>
<button onclick="saveSimulation()">💾 حفظ</button>
<button onclick="searchLibrary()">🔍 بحث</button>
<button onclick="window.print()">🖨️ طباعة / حفظ PDF</button>
</div>

<div class="output">
<label>ناتج المحاكاة</label>
<textarea id="output"></textarea>
</div>
</div>

<!-- ================== المنطق ================== -->
https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.jsscript>
<script>
let bookContent = "";

/* قراءة ملف الكتاب */
document.getElementById("bookFile").addEventListener("change", function () {
  const file = this.files[0];
  if (!file) return;

  if (file.name.endsWith(".txt")) {
    const reader = new FileReader();
    reader.onload = e => {
      bookContent = e.target.result;
      alert("✅ تم تحميل نص الكتاب");
    };
    reader.readAsText(file, "UTF-8");

  } else if (file.name.endsWith(".pdf")) {
    readPDF(file);

  } else {
    alert("❌ نوع ملف غير مدعوم");
  }
});

/* قراءة PDF محليًا */
async function readPDF(file) {
  const buffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(item => text += item.str + " ");
  }
  bookContent = text;
  alert("✅ تم تحميل كتاب PDF");
}

/* توليد المحاكاة */
function generateSimulation() {
  const subject = subjectInput();
  const grade = gradeInput();
  const lesson = lessonInput();
  const level = levelSelect.value;
  const type = typeSelect.value;
  const goal = deepGoal.value || "بناء فهم أعمق ومستقر للمفهوم";

  const reference = bookContent
    ? bookContent.slice(0, 600)
    : "لم يتم تحميل كتاب – الاعتماد على خبرة المعلم.";

  const levelMap = {
    "ضعاف": "تبسيط الموقف، تمثيل حسي، سؤال واحد في كل مرة.",
    "عادي": "نقاش جماعي، احتمال أكثر من تفسير.",
    "موهوبين": "إضافة شرط جديد يختبر التفسير الأول."
  };

  output.value = `
محاكاة تعليمية ${type}

المادة: ${subject}
الصف: ${grade}
الدرس: ${lesson}
مستوى الطلبة: ${level}

١) الافتراض الحدسي:
ينطلق الطلبة من فهم أولي بسيط.

سؤال:
لماذا يبدو هذا الفهم صحيحًا في البداية؟

٢) موقف واقعي كاشف:
موقف يجعل هذا الفهم غير كافٍ.

سؤال:
هل تفسيرك يحل المشكلة بالكامل؟

٣) التكييف حسب المستوى:
${levelMap[level]}

٤) لحظة التحول المفاهيمي:
التركيز على جوهر الفكرة لا شكلها.

٥) التطبيق:
نشاط قصير لتثبيت الفهم.

٦) نقل التعلّم:
ربط المفهوم بسياق جديد.

الهدف العميق:
${goal}

--------------------------------
مرجع من الكتاب:
${reference}
--------------------------------

<div class="teacher-only">
بوصلة دور المعلم:
🟢 دع الطلبة يبررون.
🟡 استخدم صمتًا تربويًا.
🔴 لا تُسمِّ القاعدة مبكرًا.

نقطة القرار الواحدة:
قرار واحد فقط للحصة.

اختبار الصمت:
صمت ٢٠ ثانية.

مؤشر النجاح:
اختلاف التبريرات دون طلب الإجابة.
</div>
`.trim();
}

/* عرض */
function showTeacherView() {
  document.body.classList.remove("print-view");
}
function showPrintView() {
  document.body.classList.add("print-view");
}

/* مدخلات */
function subjectInput(){ return subject.value || "غير محددة"; }
function gradeInput(){ return grade.value || "غير محدد"; }
function lessonInput(){ return lesson.value || "غير محدد"; }

/* حفظ وبحث */
function saveSimulation() {
  if (!output.value) return alert("لا يوجد محتوى للحفظ");
  const lib = JSON.parse(localStorage.getItem("simulations") || "[]");
  lib.push({ time:new Date().toLocaleString(), text:output.value });
  localStorage.setItem("simulations", JSON.stringify(lib));
  alert("✅ تم الحفظ");
}

function searchLibrary() {
  const q = prompt("ابحث بكلمة:");
  if (!q) return;
  const lib = JSON.parse(localStorage.getItem("simulations") || "[]");
  const res = lib.filter(x => x.text.includes(q));
  if (!res.length) return alert("لا نتائج");
  const list = res.map((e,i)=>`${i+1}) ${e.time}`).join("\n");
  const idx = prompt(list+"\nاختر رقم:");
  if (res[idx-1]) output.value = res[idx-1].text;
}
</script>

</body>
</html>
