<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحضير حصة بسيطة — سؤال واحد وفكرة واحدة</title>

<style>
body{
  font-family: Tahoma, Arial, sans-serif;
  background:#f2f4f7;
  margin:0;
  padding:١٢px;
}
.container{
  max-width:٨٠٠px;
  margin:auto;
  background:#ffffff;
  padding:١٦px;
  border-radius:١٢px;
  box-shadow:0 ٤px ١٠px rgba(0,0,0,.08);
}
h1{
  text-align:center;
  font-size:٢٠px;
  margin-bottom:١٤px;
}

/* الحقول */
label{
  display:block;
  font-weight:bold;
  margin-top:١٢px;
  font-size:١٥px;
}
input, select, textarea, button{
  width:١٠٠%;
  padding:١٤px;
  margin-top:٦px;
  font-size:١٥px;
  border-radius:١٠px;
  border:١px solid #ccc;
  direction:rtl;
}
textarea{
  height:٥٤٠px;
  resize:vertical;
  white-space:pre-wrap;
  line-height:١.٩;
}

/* تلميحات */
.hint{
  background:#f8f9fa;
  border:١px solid #e0e0e0;
  border-radius:٨px;
  padding:٨px ١٠px;
  margin-top:٦px;
  font-size:١٣.٥px;
  color:#444;
}

/* أزرار */
button{
  margin-top:١٦px;
  background:#1976d2;
  color:#ffffff;
  border:none;
  font-size:١٦px;
}
button:active{opacity:.٨٥}

/* طباعة */
@media print{
  label,input,select,button,.hint{display:none}
  textarea{
    border:none;
    height:auto;
    font-size:١٤pt;
  }
}
</style>
</head>

<body>

<div class="container">
<h1>تحضير حصة صفّية بسيطة</h1>

<label>المادة</label>
<input id="subject" placeholder="اللغة العربية / الرياضيات">

<label>الصف</label>
<input id="grade" placeholder="الصف الأول / الصف الثاني">

<label>عنوان الدرس</label>
<input id="lesson" placeholder="مثال: التنوين / الطرح ضمن ١٠">

<label>سؤال الحصّة</label>
<input id="question" placeholder="اكتب سؤالًا واحدًا فقط">
<div class="hint">
هذا سؤال نردّده طول الحصّة، ولا نغيّره.<br>
مثال: «لماذا نطقنا هذا الصوت؟» أو «كيف عرفت العملية؟»
</div>

<label>فكرة الحصّة</label>
<input id="concept" placeholder="جملة قصيرة وبسيطة">
<div class="hint">
هذه الجملة نريد من <b>تلميذ</b> أن يقولها قبل نهاية الحصّة.<br>
مثال: «كل صوت له علامة» أو «لكل مسألة عملية واحدة».
</div>

<label>مدة الحصّة</label>
<select id="duration">
  <option value="٤٠">٤٠ دقيقة</option>
  <option value="٤٥">٤٥ دقيقة</option>
</select>

<button onclick="build()">✅ حضّر الحصّة</button>

<textarea id="output" placeholder="ستظهر الحصّة الجاهزة هنا..."></textarea>
</div>

<script>
function build(){

  const subject  = document.getElementById("subject").value || "—";
  const grade    = document.getElementById("grade").value || "—";
  const lesson   = document.getElementById("lesson").value || "—";
  const question = document.getElementById("question").value;
  const concept  = document.getElementById("concept").value;
  const duration = document.getElementById("duration").value;
  const out      = document.getElementById("output");

  if(!question || !concept){
    alert("اكتب سؤال الحصّة وفكرتها أولًا");
    return;
  }

  out.value =
`تحضير حصة صفّية

المادة: ${subject}
الصف: ${grade}
الدرس: ${lesson}
المدة: ${duration} دقيقة

سؤال الحصّة:
«${question}»

فكرة الحصّة:
«${concept}»

كيف أُنفّذ؟
١) أطرح السؤال فقط.
٢) أعطي مثالًا واحدًا.
٣) أسكت قليلًا (تفكير).
٤) تلميذ واحد يجيب.
٥) أطلب من تلميذ قول فكرة الحصّة.

قرار الحصّة:
لا شرح طويل.
لا أسئلة كثيرة.
فكرة واحدة تكفي.

تذكير للمعلم:
التلميذ يفكّر.
وأنا أُدير الصمت.
`;
}
</script>

</body>
</html>
